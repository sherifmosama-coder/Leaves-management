   EMPLOYEE PORTAL - FRONTEND JAVASCRIPT

   ============================================================================ */

let history_fullData = [];

/* ============================================================================
   EMPLOYEE PORTAL INITIALIZATION
   ============================================================================ */

/**
 * Initialize employee portal structure and event listeners
 */
function initializeEmployeePortal() {
  console.log('Initializing employee portal...');
  
  // Setup tab navigation
  setupEmployeeTabNavigation();
  
  // Setup modal event listeners
  setupEmployeeModals();
  
  // Setup header button event listeners

}

 */

  document.getElementById('admin-portal-container').style.display = 'none';

/**

      <div class="employee-title">

/* ============================================================================
   TAB NAVIGATION SYSTEM

/**
 * Setup employee tab navigation
 */
function setupEmployeeTabNavigation() {
  const tabButtons = document.querySelectorAll('.employee-tab-button');
  
  tabButtons.forEach(button => {
    button.addEventListener('click', function() {
      const tabId = this.getAttribute('data-tab');
      setActiveEmployeeTab(tabId);
    });
  });
  
  console.log('Employee tab navigation setup complete');
}

/**
 * Set active tab
 */
function setActiveEmployeeTab(tabId) {
  console.log('Setting active employee tab:', tabId);
  
  // Remove active class from all buttons and panes
  const tabButtons = document.querySelectorAll('.employee-tab-button');
  const tabPanes = document.querySelectorAll('.employee-tab-pane');
  
  tabButtons.forEach(btn => btn.classList.remove('active'));
  tabPanes.forEach(pane => pane.classList.remove('active'));
  
  // Add active class to selected button and pane
  const activeButton = document.querySelector(`[data-tab="${tabId}"]`);
  const activePane = document.getElementById(`employee-${tabId}`);
  
  if (activeButton) {
    activeButton.classList.add('active');
  }
  
  if (activePane) {
    activePane.classList.add('active');
    activePane.classList.add('employee-fade-in');
  }
  
  // Initialize tab content based on tab ID
  switch(tabId) {
    case 'leave-requests':
      if (typeof loadLeaveRequestsContent === 'function') {
        loadLeaveRequestsContent();
      }
      break;
      
    case 'weekly-holidays':
      if (typeof initializeWeeklyHolidayTab === 'function') {
        initializeWeeklyHolidayTab();
      }
      break;
      
    case 'official-holidays':
      if (typeof EP_loadOfficialHolidaysTab === 'function') {
        EP_loadOfficialHolidaysTab();
      }
      break;
      
    case 'history':
      if (typeof loadHistoryContent === 'function') {
        loadHistoryContent();
      }
      break;
      
    default:
      console.log('No specific initialization for tab:', tabId);
  }
  
  console.log('Active employee tab set to:', tabId);
}

/* ============================================================================
   MODAL SYSTEM

/**
 * Setup modal event listeners
 */
function setupEmployeeModals() {
  // Calendar modal
  const calendarModal = document.getElementById('employee-calendar-modal');
  if (calendarModal) {
    setupModalCloseEvents(calendarModal);
  }
  
  // Change password modal
  const passwordModal = document.getElementById('employee-password-modal');
  if (passwordModal) {
    setupModalCloseEvents(passwordModal);
  }
  
  console.log('Employee modals setup complete');
}

/**
 * Setup modal close events
 */
function setupModalCloseEvents(modal) {
  const overlay = modal;
  const closeBtn = modal.querySelector('.employee-modal-close');
  
  // Close on overlay click
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      closeEmployeeModal(modal.id);
    }
  });
  
  // Close on close button click
  if (closeBtn) {
    closeBtn.addEventListener('click', function() {
      closeEmployeeModal(modal.id);
    });
  }
  
  // Close on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && modal.classList.contains('active')) {
      closeEmployeeModal(modal.id);
    }
  });
}

/**
 * Open employee modal
 */
function openEmployeeModal(modalId) {
  console.log('Opening employee modal:', modalId);
  
  const modal = document.getElementById(modalId);
  if (modal) {
    modal.classList.add('active');
    document.body.style.overflow = 'hidden'; // Prevent background scrolling
  }
}

/**
 * Close employee modal
 */
function closeEmployeeModal(modalId) {
  console.log('Closing employee modal:', modalId);
  
  const modal = document.getElementById(modalId);
  if (modal) {
    modal.classList.remove('active');
    document.body.style.overflow = ''; // Restore scrolling
  }
}

/**

/* ============================================================================

/**
 * Set button loading state
 */
function setEmployeeButtonLoading(button, isLoading) {
  if (!button) return;
  
  if (isLoading) {
    button.classList.add('employee-btn-loading');
    button.disabled = true;
    
    // Store original content
    if (!button.dataset.originalContent) {
      button.dataset.originalContent = button.innerHTML;
    }
    
    // Set loading content
    button.innerHTML = '<span>' + button.dataset.originalContent + '</span>';
  } else {
    button.classList.remove('employee-btn-loading');
    button.disabled = false;
    
    // Restore original content
    if (button.dataset.originalContent) {
      button.innerHTML = button.dataset.originalContent;
    }
  }
}

/**
 * Show employee toast notification
 */
function showEmployeeToast(message, type = 'info') {
  // Create toast element
  const toast = document.createElement('div');
  toast.className = `employee-toast employee-toast-${type}`;
  toast.innerHTML = `
    <div class="employee-toast-content">
      <i class="fas ${getToastIcon(type)}"></i>
      <span>${message}</span>
    </div>
  `;
  
  // Add to container
  let container = document.getElementById('employee-toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'employee-toast-container';
    container.className = 'employee-toast-container';
    document.body.appendChild(container);
  }
  
  container.appendChild(toast);
  
  // Show with animation
  setTimeout(() => {
    toast.classList.add('show');
  }, 100);
  
  // Auto hide after 4 seconds
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => {
      if (toast.parentNode) {
        toast.parentNode.removeChild(toast);
      }
    }, 300);
  }, 4000);
}

  }
  
  if (typeof loadEmployeeLeaveRequests === 'function') {

}

/**
 * Get toast icon based on type
 */
function getToastIcon(type) {
  const icons = {
    success: 'fa-check-circle',
    error: 'fa-exclamation-circle',
    warning: 'fa-exclamation-triangle',
    info: 'fa-info-circle'
  };
  return icons[type] || icons.info;
}

function parseEmployeeData(dataString) {
  // Expected format: "id|name|email|balance|..." (19-column structure A-S)
  const parts = dataString.split('|');
  
  return {
    id: parts[0] || '',                    // Column A - ID
    name: parts[1] || 'Unknown',           // Column B - Name
    email: parts[2] || '',                 // Column C - E-mail
    balance: parts[3] || '0',              // Column D - Opening Balance
    usableFrom: parts[4] || '',            // Column E - Usable from
    usableTo: parts[5] || '',              // Column F - Usable to
    password: parts[6] || '',              // Column G - Password (not used in frontend)
    addedOn: parts[7] || '',               // Column H - Added on
    emailStatus: parts[8] || 'Pending',    // Column I - Email status
    deactivatedOn: parts[9] || '',         // Column J - Deactivated on
    lastLogin: parts[10] || '',            // Column K - Last Login
    activeInactive: parts[11] || 'Active', // Column L - Active/Inactive
    emergencyLeaves: parts[12] || '0',     // Column M - Opening emergency leaves
    sickLeaves: parts[13] || '0',          // Column N - Opening Sick Leaves
    weeklyHoliday: parts[14] || '',        // Column O - Weekly Holiday
    addedBy: parts[15] || '',              // Column P - Added by
    deactivatedBy: parts[16] || '',        // Column Q - Deactivated BY
    reactivatedOn: parts[17] || '',        // Column R - Reactivated on
    reactivatedBy: parts[18] || ''         // Column S - Reactivated by
  };
}

/**
 * __________________________________________________________________________________
 * =================   [  Load and Render History Content  ] ========================
 * __________________________________________________________________________________
 */
function loadHistoryContent() {
  const container = document.getElementById('employee-history');
  
  // 1. CLEAR AND SHOW LOADING STATE
  // Using custom 'history-spinner' class defined in CSS now
  container.innerHTML = `
    <div class="history-loading-container">
      <div class="history-spinner"></div>
      <p>Fetching your leave history...</p>
    </div>
  `;

  google.script.run
    .withSuccessHandler(function(response) {
      if (response.success) {
        history_fullData = response.data;
        history_renderInterface(container);
        history_applyFilters('All');
      } else {
        container.innerHTML = `
          <div class="alert alert-danger" style="color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: 15px; border-radius: 5px;">
            <i class="fas fa-exclamation-triangle"></i> 
            Error loading history: ${response.error}
          </div>`;
      }
    })
    .withFailureHandler(function(error) {
      container.innerHTML = `
        <div class="alert alert-danger" style="color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: 15px; border-radius: 5px;">
           System Error: ${error.message}
        </div>`;
    })
    .getEmployeeLeaveHistory(currentEmployee.email);
}

/**
 * Render the Filter Bar and Wrapper
 */
function history_renderInterface(container) {
  container.innerHTML = `
    <div class="history-filter-container">
      <span class="history-filter-label">Filter by Status:</span>
      <div class="history-filter-group">
        <button class="history-filter-btn active" onclick="history_applyFilters('All', this)">All</button>
        <button class="history-filter-btn" onclick="history_applyFilters('Approved', this)">Approved</button>
        <button class="history-filter-btn" onclick="history_applyFilters('Pending', this)">Pending</button>
        <button class="history-filter-btn" onclick="history_applyFilters('Rejected', this)">Rejected</button>
      </div>
    </div>

    <div id="history-results-wrapper" class="history-results-wrapper"></div>
  `;
}

/**
 * Filter Data and Render 3-Column Grid
 */
function history_applyFilters(statusFilter, btnElement) {
  // Update Button UI
  if (btnElement) {
    document.querySelectorAll('.history-filter-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
  }

  // Master Filter: Filter full dataset by Status first
  const filteredData = statusFilter === 'All' 
    ? history_fullData 
    : history_fullData.filter(item => item.status === statusFilter);

  const wrapper = document.getElementById('history-results-wrapper');
  wrapper.innerHTML = '';

  // Create Grid Container
  const grid = document.createElement('div');
  grid.className = 'history-grid-container';

  // Define the 3 Fixed Columns
  const leaveTypes = ['Annual', 'Sick', 'Emergency'];

  leaveTypes.forEach(type => {
    // Filter for this specific column
    const columnData = filteredData.filter(item => item.type === type);
    
    // Create Column Element
    const col = document.createElement('div');
    col.className = 'history-column';
    
    // Header
    const typeLower = type.toLowerCase();
    const countBadge = columnData.length > 0 
      ? `<span class="history-col-badge history-bg-${typeLower}">${columnData.length}</span>` 
      : '';

    let colHtml = `
      <div class="history-col-header history-header-${typeLower}">
        <div class="history-col-title">
          <i class="fas ${history_getGroupIcon(type)}"></i>
          <h3>${type}</h3>
        </div>
        ${countBadge}
      </div>
      <div class="history-col-content">
    `;

    // Content: Check if data exists for this column
    if (columnData.length > 0) {
      columnData.forEach(item => {
        colHtml += history_createCard(item); // Uses the detailed card function
      });
    } else {
      // FALLBACK STYLING
      const statusText = statusFilter === 'All' ? '' : statusFilter.toLowerCase();
      colHtml += `
        <div class="history-empty-col history-empty-${typeLower}">
          <div class="history-empty-icon">
            <i class="fas ${history_getGroupIcon(type)}"></i>
          </div>
          <p>No ${statusText} ${type.toLowerCase()} leaves</p>
        </div>
      `;
    }

    colHtml += `</div>`; // Close content div
    col.innerHTML = colHtml;
    grid.appendChild(col);
  });

  wrapper.appendChild(grid);
}

function history_getGroupIcon(type) {
  switch(type) {
    case 'Annual': return 'fa-calendar-day';       // Green Icon
    case 'Sick': return 'fa-user-md';              // Orange Icon
    case 'Emergency': return 'fa-exclamation-triangle'; // Red Icon
    default: return 'fa-calendar';
  }
}

/**
 * Create HTML for a single history card
 * Uses Absolute Positioning Structure
 */
function history_createCard(item) {
  let statusIcon = 'fa-circle';
  if (item.statusKey === 'approved') statusIcon = 'fa-check';
  if (item.statusKey === 'rejected') statusIcon = 'fa-times';
  if (item.statusKey === 'pending') statusIcon = 'fa-clock';

  const dateObj = new Date(item.startDate);
  
  // 1. Admin Comment Block
  const commentHtml = item.adminComment 
    ? `<div class="history-comment-box">
         <div class="history-comment-label"><i class="fas fa-comment-dots"></i> Admin Note</div>
         <div class="history-comment-text">${item.adminComment}</div>
       </div>`
    : '';

  // 2. Meta Info (Footer)
  const respondOnHtml = item.respondOn 
    ? `<span class="history-meta-item"><i class="fas fa-reply"></i> Responded: ${item.respondOn}</span>` 
    : '';
    
  const respondByHtml = item.respondBy 
    ? `<span class="history-meta-item"><i class="fas fa-user-shield"></i> By: ${item.respondBy}</span>` 
    : '';

  // 3. Main Card HTML
  return `
    <div class="history-item-card">
      
      <div class="history-date-badge">
        <span class="history-db-month">${dateObj.toLocaleDateString('en-US', {month:'short'})}</span>
        <span class="history-db-day">${dateObj.getDate()}</span>
      </div>
      
      <div class="history-status-pill history-status-${item.statusKey}">
        <i class="fas ${statusIcon}"></i> ${item.status}
      </div>

      <div class="history-card-content">
        <div class="history-header-row">
           <span class="history-req-id">#${item.id}</span>
           <span class="history-duration-badge">${item.duration} Day${item.duration > 1 ? 's' : ''}</span>
        </div>
        
        <div class="history-date-range">
          <i class="fas fa-calendar-alt"></i> ${item.dateRange} 
        </div>
        
        <div class="history-reason-text">
          <span class="history-label">Reason:</span> ${item.reason}
        </div>
      </div>

      ${commentHtml}

      <div class="history-card-footer">
        <span class="history-meta-item"><i class="fas fa-paper-plane"></i> Requested: ${item.requestedOn}</span>
        ${respondOnHtml}
        ${respondByHtml}
      </div>

    </div>
  `;
}

/**
 * Handle password change for logged-in employee (from employee portal)
 * Requires current password, new password, and confirmation
 */
function handleEmployeePasswordChange() {
  console.log('🔐 Handling employee password change...');
  
  if (!currentEmployee || !currentEmployee.email) {
    showEmployeeToast('Session expired. Please login again.', 'error');
    return;
  }
  
  const form = document.getElementById('employee-password-form');
  const submitBtn = document.getElementById('employee-password-submit');
  
  if (!form || !submitBtn) {
    showEmployeeToast('Form not found', 'error');
    return;
  }
  
  // Get form data
  const currentPassword = document.getElementById('current-password')?.value.trim();
  const newPassword = document.getElementById('new-password')?.value.trim();
  const confirmPassword = document.getElementById('confirm-password')?.value.trim();
  
  // Validation
  if (!currentPassword) {
    showEmployeeToast('Please enter your current password', 'error');
    document.getElementById('current-password').focus();
    return;
  }
  
  if (!newPassword || !confirmPassword) {
    showEmployeeToast('Please fill in all fields', 'error');
    return;
  }
  
  if (newPassword.length < 4) {
    showEmployeeToast('Password must be at least 4 characters long', 'error');
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showEmployeeToast('New passwords do not match', 'error');
    return;
  }
  
  // Set loading state
  setEmployeeButtonLoading(submitBtn, true);
  
  // Call backend
  google.script.run
    .withSuccessHandler(function(result) {
      setEmployeeButtonLoading(submitBtn, false);
      
      if (result && result.success) {
        showEmployeeToast('Password changed successfully! A confirmation email has been sent.', 'success');
        form.reset();
        closeEmployeeModal('employee-password-modal');
      } else {
        const errorMsg = result && result.error ? result.error : 'Failed to change password';
        showEmployeeToast(errorMsg, 'error');
      }
    })
    .withFailureHandler(function(error) {
      setEmployeeButtonLoading(submitBtn, false);
      showEmployeeToast('Error: ' + (error.message || 'Network error'), 'error');
    })
    .changeEmployeePasswordLoggedIn(currentEmployee.email, currentPassword, newPassword);
}

/**
 * Setup employee password form submit handler
 * Call this when opening the password modal
 */
function setupEmployeePasswordForm() {
  const form = document.getElementById('employee-password-form');
  const submitBtn = document.getElementById('employee-password-submit');
  
  if (form && submitBtn) {
    // Remove existing listeners
    submitBtn.onclick = null;
    
    // Add click handler
    submitBtn.addEventListener('click', function(e) {
      e.preventDefault();
      handleEmployeePasswordChange();
    });
    
    console.log('✅ Employee password form setup complete');
  }
}

function parseRequestsData(dataString) {
  const requests = [];
  if (!dataString) return requests;
  
  const requestStrings = dataString.split(';');
  
  requestStrings.forEach(reqStr => {
    try {
      const parts = reqStr.split('|');
      if (parts.length >= 15) {
        const days = parts[14] ? parts[14].split('#').map(dayStr => {
          const dayParts = dayStr.split('~');
          return {
            date: new Date(dayParts[0]),
            weekDay: dayParts[1] || '',
            weeklyHoliday: dayParts[2] === 'true',
            responseStatus: dayParts[3] || 'Pending',
            responseTimestamp: dayParts[4] || '',
            respondedBy: dayParts[5] || '',
            adminComment: dayParts[6] || '',
            used: dayParts[7] || 'Not yet'
          };
        }) : [];
        
        // Parse weekly holiday badges (new field)
        const weeklyHolidayDays = parts[15] ? parts[15].split(',').filter(day => day.trim() !== '') : [];
        
        const request = {
          id: parts[0] || '',
          type: parts[1] || '',
          reason: parts[2] || '',
          requestTimestamp: new Date(parts[3]),
          startDate: new Date(parts[4]),
          endDate: new Date(parts[5]),
          totalDays: parseInt(parts[6]) || 0,
          netDays: parseInt(parts[7]) || 0,
          summary: {
            approved: parseInt(parts[8]) || 0,
            rejected: parseInt(parts[9]) || 0,
            pending: parseInt(parts[10]) || 0,
            status: parts[11] || 'Pending'
          },
          isPending: parts[12] === 'true',
          hasResponse: parts[13] === 'true',
          days: days,
          weeklyHolidayDays: weeklyHolidayDays
        };
        
        // Validate that we have complete day data
        if (request.totalDays > 0 && days.length !== request.totalDays) {
          console.warn(`Request ${request.id}: Expected ${request.totalDays} days, got ${days.length} days. Will generate complete breakdown.`);
        }
        
        requests.push(request);
      }
    } catch (error) {
      console.warn('Error parsing request:', error);
    }
  });
  
  return requests;
}

/**
 * NEW: Handle calendar date selection
 * FUNCTION TO ADD in script-employee.html
 */
function selectCalendarDate(dateString) {
  // FIXED: calendar-day → EP-calendar-day
  const dayElement = document.querySelector(`[data-date="${dateString}"]`);
  
  // FIXED: disabled → EP-disabled
  if (dayElement && dayElement.classList.contains('EP-disabled')) {
    return; // Don't allow selection of disabled dates
  }
  
  const date = new Date(dateString);
  
  // Handle selection logic
  if (!selectedStartDate) {
    selectedStartDate = date;
    // FIXED: selected → EP-selected
    dayElement.classList.add('EP-selected');
    updateSelectionInfo();
  } else if (!selectedEndDate) {
    if (date < selectedStartDate) {
      // If clicking before start date, make it the new start
      // FIXED: selected → EP-selected
      document.querySelector('.EP-selected').classList.remove('EP-selected');
      selectedStartDate = date;
      dayElement.classList.add('EP-selected');
    } else {
      selectedEndDate = date;
      // Select range
      selectDateRange(selectedStartDate, selectedEndDate);
    }
    updateSelectionInfo();
  } else {
    // Reset selection
    clearSelection();
    selectedStartDate = date;
    // FIXED: selected → EP-selected
    dayElement.classList.add('EP-selected');
    updateSelectionInfo();
  }
}

function clearSelection() {
  selectedStartDate = null;
  selectedEndDate = null;
  
  // FIXED: selected → EP-selected
  document.querySelectorAll('.EP-selected').forEach(el => {
    el.classList.remove('EP-selected');
  });
  
  updateSelectionInfo();
}

function selectDateRange(startDate, endDate) {
  const start = new Date(startDate);
  const end = new Date(endDate);
  
  // Clear previous selections
  // FIXED: selected → EP-selected
  document.querySelectorAll('.EP-selected').forEach(el => {
    el.classList.remove('EP-selected');
  });
  
  // Select all dates in range
  const currentDate = new Date(start);
  while (currentDate <= end) {
    const dateString = currentDate.toISOString().split('T')[0];
    const dayElement = document.querySelector(`[data-date="${dateString}"]`);
    if (dayElement) {
      // FIXED: selected → EP-selected
      dayElement.classList.add('EP-selected');
    }
    currentDate.setDate(currentDate.getDate() + 1);
  }
}

/**
 * NEW: Update calendar selection display
 * FUNCTION TO ADD in script-employee.html
 */
function updateCalendarSelectionDisplay() {
  const selection = window.calendarSelection;
  const selectionInfo = document.getElementById('selection-info');
  const selectionDetails = document.getElementById('selection-details');
  const applyBtn = document.getElementById('apply-selection-btn');
  
  if (!selection.start) {
    selectionInfo.querySelector('.selection-status').textContent = 'Click dates to select your leave period';
    selectionDetails.style.display = 'none';
    applyBtn.disabled = true;
    return;
  }
  
  if (selection.start && !selection.end) {
    selectionInfo.querySelector('.selection-status').textContent = 'Click end date to complete selection';
    selectionDetails.style.display = 'none';
    applyBtn.disabled = true;
    return;
  }
  
  if (selection.start && selection.end) {
    const startStr = formatDate(selection.start);
    const endStr = formatDate(selection.end);
    const duration = calculateRequestDuration(selection.start, selection.end);
    
    document.getElementById('selected-range-text').textContent = 
      selection.start.getTime() === selection.end.getTime() ? startStr : `${startStr} - ${endStr}`;
    document.getElementById('selected-duration-text').textContent = `${duration} day${duration !== 1 ? 's' : ''}`;
    
    selectionInfo.querySelector('.selection-status').textContent = 'Selection complete';
    selectionDetails.style.display = 'block';
    applyBtn.disabled = false;
  }
}

/**
 * NEW: Update visual selection on calendar
 * FUNCTION TO ADD in script-employee.html
 */
function updateCalendarVisualSelection() {
  const selection = window.calendarSelection;
  
  // Clear previous selection
  document.querySelectorAll('.calendar-day').forEach(day => {
    day.classList.remove('selected', 'selection-start', 'selection-end', 'selection-range');
  });
  
  if (!selection.start) return;
  
  // Highlight selected range
  const startTime = selection.start.getTime();
  const endTime = selection.end ? selection.end.getTime() : startTime;
  
  document.querySelectorAll('.calendar-day').forEach(day => {
    const dateStr = day.getAttribute('data-date');
    if (!dateStr) return;
    
    const dayTime = new Date(dateStr).getTime();
    
    if (dayTime === startTime && dayTime === endTime) {
      day.classList.add('selected');
    } else if (dayTime === startTime) {
      day.classList.add('selection-start');
    } else if (dayTime === endTime) {
      day.classList.add('selection-end');
    } else if (dayTime > startTime && dayTime < endTime) {
      day.classList.add('selection-range');
    }
  });
}

function loadSystemDates() {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.success) {
          resolve({
            startDate: new Date(response.startDate),
            endDate: new Date(response.endDate)
          });
        } else {
          reject(new Error(response.error || 'Failed to load system dates'));
        }
      })
      .withFailureHandler(reject)
      .getSystemDateLimits();
  });
}

/**
 * NEW: Load calendar data with employee context
 * FUNCTION TO ADD in script-employee.html
 */
function loadCalendarData(employeeEmail) {
  return new Promise((resolve, reject) => {
    const startDate = new Date();
    const endDate = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000); // 1 year ahead
    
    google.script.run
      .withSuccessHandler(function(response) {
        if (response.startsWith('SUCCESS:')) {
          if (response !== 'SUCCESS:EMPTY') {
            const data = parseCalendarData(response.substring(8));
            resolve(data);
          } else {
            resolve([]);
          }
        } else {
          reject(new Error('Failed to load calendar data'));
        }
      })
      .withFailureHandler(reject)
      .getCalendarData(employeeEmail, startDate.toISOString(), endDate.toISOString());
  });
}

function parseCalendarData(dataString) {
  const data = [];
  const dataStrings = dataString.split(';');
  
  dataStrings.forEach(str => {
    const parts = str.split('|');
    if (parts.length >= 3) {
      data.push({
        date: new Date(parts[0]),
        employeeId: parts[1],
        type: parts[2]

    }
  });
  
  return data;
}

function renderCalendarGrid(month, year) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const today = new Date();
  
  let html = '<div class="calendar-days-header">';
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  dayNames.forEach(day => {
    html += `<div class="calendar-day-header">${day}</div>`;
  });
  html += '</div><div class="calendar-days">';
  
  // Empty cells for days before month starts
  for (let i = 0; i < firstDay.getDay(); i++) {
    html += '<div class="calendar-day empty"></div>';
  }
  
  // Days of the month
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(year, month, day);
    const dateString = date.toISOString().split('T')[0];
    
    let classes = ['calendar-day'];
    if (date.toDateString() === today.toDateString()) classes.push('today');
    if (date < today) classes.push('past');
    
    // Check for official holidays
    const isOfficialHoliday = officialHolidays.some(h => 
      h.date.toDateString() === date.toDateString()
    );
    if (isOfficialHoliday) {
      classes.push('official-holiday');
      if (selectedLeaveType === 'annual') classes.push('disabled');
    }
    
    // Check for employee weekly holidays
    const dayName = date.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
    if (employeeWeeklyHolidays[dayName]) {
      classes.push('weekly-holiday');
    }
    
    // Check for other employees' days off
    const hasOtherEmployeeOff = calendarData.some(cd => 
      cd.date.toDateString() === date.toDateString()
    );
    if (hasOtherEmployeeOff) {
      classes.push('other-employee-off');
    }
    
    html += `
      <div class="${classes.join(' ')}" data-date="${dateString}" onclick="selectCalendarDate('${dateString}')">
        <span class="day-number">${day}</span>
        ${employeeWeeklyHolidays[dayName] ? '<i class="fas fa-home weekly-icon"></i>' : ''}
        ${isOfficialHoliday ? '<i class="fas fa-star official-icon"></i>' : ''}
      </div>
    `;
  }
  
  html += '</div>';
  return html;
}

/**

function formatDate(dateInput) {
  if (!dateInput) return '';
  
  const date = new Date(dateInput);
  if (isNaN(date.getTime())) return '';
  
  const options = { day: 'numeric', month: 'short', year: 'numeric' };
  return date.toLocaleDateString('en-GB', options);
}

/**
 * Format date and time for display
 */
function formatDateTime(dateTimeInput) {
  if (!dateTimeInput) return '';
  
  const date = new Date(dateTimeInput);
  if (isNaN(date.getTime())) return '';
  
  const dateOptions = { day: 'numeric', month: 'short', year: 'numeric' };
  const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
  
  return date.toLocaleDateString('en-GB', dateOptions) + ' at ' + 
         date.toLocaleTimeString('en-GB', timeOptions);
}

// Calendar selection variables
let calendarSelection = { start: null, end: null };

/**
 * Handle calendar date selection
 */
function selectCalendarDate(dateString) {
  const date = new Date(dateString);
  const cell = document.querySelector(`[data-date="${dateString}"]`);
  
  if (cell.classList.contains('disabled') || cell.classList.contains('past')) {
    return;
  }
  
  if (!calendarSelection.start || (calendarSelection.start && calendarSelection.end)) {
    // Start new selection
    clearCalendarSelection();
    calendarSelection.start = date;
    calendarSelection.end = null;
    cell.classList.add('selected', 'range-start');
  } else {
    // Complete range selection
    if (date < calendarSelection.start) {
      calendarSelection.end = calendarSelection.start;
      calendarSelection.start = date;
    } else {
      calendarSelection.end = date;
    }
    
    updateCalendarRange();
  }
  
  updateSelectionInfo();
  validateCalendarSelection();
}

function clearCalendarSelection() {
  document.querySelectorAll('.calendar-day').forEach(cell => {
    cell.classList.remove('selected', 'range-start', 'range-end', 'range-middle');
  });
}

/**
 * Update calendar range display
 */
function updateCalendarRange() {
  clearCalendarSelection();
  
  if (!calendarSelection.start) return;
  
  const start = calendarSelection.start;
  const end = calendarSelection.end || start;
  
  const current = new Date(start);
  while (current <= end) {
    const dateString = current.toISOString().split('T')[0];
    const cell = document.querySelector(`[data-date="${dateString}"]`);
    
    if (cell) {
      cell.classList.add('selected');
      if (current.getTime() === start.getTime()) cell.classList.add('range-start');
      if (current.getTime() === end.getTime()) cell.classList.add('range-end');
      if (current > start && current < end) cell.classList.add('range-middle');
    }
    
    current.setDate(current.getDate() + 1);
  }
}

function updateSelectionInfo() {
  const selectionInfo = document.getElementById('selection-info');
  const selectionDetails = document.getElementById('selection-details');
  const applyBtn = document.getElementById('apply-selection-btn');

  const durationText = document.getElementById('selected-duration-text');

    const duration = calculateDuration(selectedStartDate, selectedEndDate);

/**
 * Sort requests according to plan requirements
 * FUNCTION TO ADD in script-employee.html
 */
function sortRequestsByPlan(requests) {
  if (!requests || requests.length === 0) return [];
  
  return requests.sort((a, b) => {
    // First: Pending requests come before responded requests
    if (a.isPending && !b.isPending) return -1;
    if (!a.isPending && b.isPending) return 1;
    
    // Within each group: Annual, then Sick, then Emergency
    const typeOrder = { annual: 0, sick: 1, emergency: 2 };
    const aTypeOrder = typeOrder[a.type.toLowerCase()] || 3;
    const bTypeOrder = typeOrder[b.type.toLowerCase()] || 3;
    
    if (aTypeOrder !== bTypeOrder) {
      return aTypeOrder - bTypeOrder;
    }
    
    // Within each type: Sort by start date ascending
    return new Date(a.startDate) - new Date(b.startDate);
  });
}

/**
 * Check if request is in progress (has started but not finished)
 * FUNCTION TO ADD in script-employee.html
 */
function isRequestInProgress(request) {
  const today = new Date();
  const startDate = new Date(request.startDate);
  const endDate = new Date(request.endDate);
  
  today.setHours(0, 0, 0, 0);
  startDate.setHours(0, 0, 0, 0);
  endDate.setHours(0, 0, 0, 0);
  
  return today >= startDate && today <= endDate;
}

/**
 * Check if request is upcoming (start date is in the future)
 * FUNCTION TO ADD in script-employee.html
 */
function isRequestUpcoming(request) {
  const today = new Date();
  const startDate = new Date(request.startDate);
  
  today.setHours(0, 0, 0, 0);
  startDate.setHours(0, 0, 0, 0);
  
  return startDate > today;
}

function getRequestTimingStatus(request) {
  if (isRequestInProgress(request)) {
    return { class: 'in-progress', text: 'In Progress', icon: 'fa-play-circle' };
  } else if (isRequestUpcoming(request)) {
    return { class: 'upcoming', text: 'Upcoming', icon: 'fa-clock' };
  } else {
    return { class: 'past', text: 'Past', icon: 'fa-history' };

}

function isEmployeeWeeklyHoliday(date) {
  if (!employeeWeeklyHolidays || Object.keys(employeeWeeklyHolidays).length === 0) {
    return false;
  }
  
  const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  const dayOfWeek = dayNames[date.getDay()];
  
  return employeeWeeklyHolidays[dayOfWeek] || false;
}

/**
 * NEW: Calculate request duration helper
 * FUNCTION TO ADD in script-employee.html
 */
function calculateRequestDuration(startDate, endDate) {
  try {
    const start = new Date(startDate);
    const end = new Date(endDate);
    
    start.setHours(0, 0, 0, 0);
    end.setHours(0, 0, 0, 0);
    
    const timeDiff = end.getTime() - start.getTime();
    const daysDiff = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
    
    return daysDiff + 1; // Include both start and end dates
  } catch (error) {
    console.error('Error calculating duration:', error);
    return 0;
  }
}

 */
function getWeeklyHolidayBadges(weeklyHolidayDays) {
  // Input validation - expecting string format
  if (!weeklyHolidayDays || typeof weeklyHolidayDays !== 'string' || weeklyHolidayDays.trim() === '') {
    return '';
  }
  
  // Parse the string into array of weekday abbreviations
  const weeklyHolidayAbbreviations = weeklyHolidayDays
    .split(',')
    .map(day => day.trim())
    .filter(day => day !== ''); // Remove empty strings
  
  // Return empty string if no weekly holidays found after parsing
  if (weeklyHolidayAbbreviations.length === 0) {

  }
  
  // Generate HTML badges for weekly holidays
  const badges = weeklyHolidayAbbreviations.map(day => {
    return `<span class="weekly-holiday-badge" title="Weekly Holiday: ${day}">

/**
 * Enhanced frontend data parsing with detailed logging
 * ADD to script-employee.html in parseLeaveRequestsData function
 */
function parseLeaveRequestsData(response) {
  console.log('🔍 === FRONTEND DATA PARSING DEBUG START ===');
  console.log('📨 Raw response from backend:', response);
  console.log('📨 Response type:', typeof response);
  console.log('📨 Response length:', response ? response.length : 'N/A');
  
  if (!response || typeof response !== 'string') {
    console.error('❌ Invalid response format');
    return [];
  }
  
  if (response.startsWith('ERROR:')) {
    console.error('❌ Backend error:', response);
    return [];
  }
  
  if (!response.startsWith('SUCCESS:')) {
    console.error('❌ Unexpected response format:', response.substring(0, 100));
    return [];
  }
  
  const dataString = response.replace('SUCCESS:', '');
  console.log('📋 Data string after SUCCESS removal:', dataString.substring(0, 200) + '...');
  
  if (!dataString.trim()) {
    console.log('📝 Empty data string - no requests found');
    return [];
  }
  
  const requestStrings = dataString.split(';');
  console.log(`📊 Split into ${requestStrings.length} request strings`);
  
  const requests = [];
  
  requestStrings.forEach((requestStr, index) => {
    console.log(`\n📋 Processing request ${index + 1}:`);
    console.log(`📝 Request string: ${requestStr}`);
    
    if (!requestStr.trim()) {
      console.warn(`⚠️ Empty request string at index ${index}`);
      return;
    }
    
    try {
      const parts = requestStr.split('|');
      console.log(`🔧 Split into ${parts.length} parts:`, parts.map((p, i) => `${i}: ${p}`));
      
      if (parts.length < 15) {
        console.error(`❌ Insufficient parts: expected 15+, got ${parts.length}`);
        return;
      }
      
      // Parse days string
      console.log('📅 Parsing days data from part 14:', parts[14]);
      const days = parts[14] ? 
        parts[14].split('#').map((dayStr, dayIndex) => {
          console.log(`  📅 Day ${dayIndex + 1} string: ${dayStr}`);
          
          const dayParts = dayStr.split('~');
          console.log(`    🔧 Day parts:`, dayParts);
          
          const dayData = {
            date: new Date(dayParts[0]),
            weekDay: dayParts[1] || '',
            weeklyHoliday: dayParts[2] === 'true',
            responseStatus: dayParts[3] || 'Pending',
            responseTimestamp: dayParts[4] || '',
            respondedBy: dayParts[5] || '',
            adminComment: dayParts[6] || '',
            used: dayParts[7] || 'Not yet'
          };
          
          console.log(`    📊 Parsed day data:`, {
            date: dayData.date.toISOString(),
            weekDay: dayData.weekDay,
            weeklyHoliday: dayData.weeklyHoliday,
            responseStatus: dayData.responseStatus,
            used: dayData.used
          });
          
          return dayData;
        }) : [];
        
      console.log(`📊 Parsed ${days.length} days for this request`);
      
      // Parse weekly holiday badges  
      console.log('🏠 Parsing weekly holiday badges from part 15:', parts[15]);
      const weeklyHolidayDays = parts[15] ? 
        parts[15].split(',').filter(day => day.trim() !== '') : [];
      console.log('🏠 Weekly holiday days:', weeklyHolidayDays);
      
      const request = {
        id: parts[0] || '',
        type: parts[1] || '',
        reason: parts[2] || '',
        requestTimestamp: new Date(parts[3]),
        startDate: new Date(parts[4]),
        endDate: new Date(parts[5]),
        totalDays: parseInt(parts[6]) || 0,
        netDays: parseInt(parts[7]) || 0,
        summary: {
          approved: parseInt(parts[8]) || 0,
          rejected: parseInt(parts[9]) || 0,
          pending: parseInt(parts[10]) || 0,
          status: parts[11] || 'Pending'
        },
        isPending: parts[12] === 'true',
        hasResponse: parts[13] === 'true',
        days: days,
        weeklyHolidayDays: weeklyHolidayDays
      };
      
      console.log('📋 Final parsed request:', {
        id: request.id,
        type: request.type,
        startDate: request.startDate.toISOString(),
        endDate: request.endDate.toISOString(),
        totalDays: request.totalDays,
        netDays: request.netDays,
        daysCount: request.days.length,
        weeklyHolidayDays: request.weeklyHolidayDays,
        isPending: request.isPending
      });
      
      // Validate data integrity
      if (request.totalDays > 0 && days.length !== request.totalDays) {
        console.warn(`⚠️ Data mismatch for ${request.id}:`);
        console.warn(`  Expected days: ${request.totalDays}`);
        console.warn(`  Actual days: ${days.length}`);
        console.warn(`  Will proceed but data may be incomplete`);
      }
      
      requests.push(request);
      console.log(`✅ Successfully parsed request ${request.id}`);
      
    } catch (error) {
      console.error(`❌ Error parsing request ${index + 1}:`, error);
      console.error(`❌ Problematic string:`, requestStr);
    }
  });
  
  console.log('📊 Final parsing results:');
  console.log(`  📈 Total requests parsed: ${requests.length}`);
  console.log(`  📈 Pending requests: ${requests.filter(r => r.isPending).length}`);
  console.log(`  📈 Responded requests: ${requests.filter(r => !r.isPending).length}`);
  
  console.log('🔍 === FRONTEND DATA PARSING DEBUG END ===\n');
  
  return requests;
}

function EP_validateForm() {

  EP_updateFormValidationUI();
  EP_updateSubmitButton();
  
  return Object.keys(errors).length === 0;
}

/**
 * Enhanced date range validation
 */
function EP_validateDateRange(startDate, endDate) {
  const result = { isValid: true, error: null };
  
  if (!startDate || !endDate) {
    result.isValid = false;
    result.error = 'Both start and end dates are required';
    return result;
  }
  
  const startDateObj = new Date(startDate);
  const endDateObj = new Date(endDate);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  // Check valid date objects
  if (isNaN(startDateObj.getTime()) || isNaN(endDateObj.getTime())) {
    result.isValid = false;
    result.error = 'Invalid date format';
    return result;
  }
  
  // Check date order
  if (startDateObj > endDateObj) {
    result.isValid = false;
    result.error = 'Start date cannot be after end date';
    return result;
  }
  
  // Check for annual leave past date restriction
  if (EP_selectedLeaveType === 'annual' && startDateObj <= today) {
    result.isValid = false;
    result.error = 'Annual leave cannot be requested for past or current dates';
    return result;
  }
  
  // Check against system dates if available
  if (EP_systemDates) {
    const systemStart = new Date(EP_systemDates.startDate);
    const systemEnd = new Date(EP_systemDates.endDate);
    
    if (startDateObj < systemStart || endDateObj > systemEnd) {
      result.isValid = false;
      result.error = `Dates must be within system period: ${formatDate(systemStart)} to ${formatDate(systemEnd)}`;
      return result;
    }
  }
  
  // Check maximum duration (configurable)
  const daysDiff = Math.ceil((endDateObj - startDateObj) / (1000 * 60 * 60 * 24)) + 1;
  const maxDuration = EP_getMaxDurationForLeaveType(EP_selectedLeaveType);
  
  if (daysDiff > maxDuration) {
    result.isValid = false;
    result.error = `${EP_selectedLeaveType} leave cannot exceed ${maxDuration} days`;
    return result;
  }
  
  return result;
}

/**
 * Get maximum duration for leave type
 */
function EP_getMaxDurationForLeaveType(leaveType) {
  const maxDurations = {
    'annual': 30,
    'sick': 14,
    'emergency': 7
  };
  
  return maxDurations[leaveType] || 30;
}

/**

function EP_setupReasonCharacterCounter() {
  const reasonInput = document.getElementById('EP-leave-reason');
  if (!reasonInput) return;
  
  const container = reasonInput.parentElement;
  
  // Add character counter
  const counter = document.createElement('div');
  counter.className = 'EP-character-counter';
  counter.innerHTML = '<span id="EP-char-count">0</span> / 500 characters';
  container.appendChild(counter);
  
  // Update counter on input
  reasonInput.addEventListener('input', function() {
    const count = this.value.length;
    const counterSpan = document.getElementById('EP-char-count');
    
    if (counterSpan) {
      counterSpan.textContent = count;
      
      // Update styling based on count
      counter.className = 'EP-character-counter';
      if (count > 450) {
        counter.classList.add('EP-warning');
      }
      if (count >= 500) {
        counter.classList.add('EP-danger');
      }
    }
  });

/**
 * Utility function: Debounce
 */
function EP_debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

/**
 * Utility function: Capitalize first letter
 */
function EP_capitalizeFirst(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

/**
 * Utility function: Get month name
 */
function EP_getMonthName(monthIndex) {
  const months = [
    'January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'
  ];
  return months[monthIndex] || '';
}

/**
 * Utility function: Format date
 */
function EP_formatDate(date) {
  if (!date) return '';
  const dateObj = new Date(date);
  return dateObj.toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
}

    if (!data || data === '') {

    parseAndRenderWeeklyHolidayCalendar(data);
  } else {

    showWeeklyHolidayErrorState('Unexpected response format');
  }
}

/**
 * Parse and render weekly holiday calendar
 * FUNCTION TO ADD in script-employee.html
 */
function parseAndRenderWeeklyHolidayCalendar(data) {
  try {
    console.log('Parsing weekly holiday data...');
    console.log('Raw data:', data);
    
    const parts = data.split('|');
    console.log('Split parts:', parts.length);
    
    if (parts.length !== 2) {
      console.error('Invalid data format - expected 2 parts, got:', parts.length);
      showWeeklyHolidayErrorState('Invalid data format');
      return;
    }
    
    const currentEmpStr = parts[0].trim();
    const otherEmpsStr = parts[1].trim();
    
    console.log('Current employee string:', currentEmpStr);
    console.log('Other employees string length:', otherEmpsStr.length);
    
    const parseEmployee = function(empStr) {
      if (!empStr || empStr === '') return null;
      
      const empParts = empStr.split('~');
      console.log('Parsing employee, parts count:', empParts.length);
      
      // Format: id~name~7days~7pausedDays = 16 parts total
      if (empParts.length !== 16) {
        console.warn('Invalid employee format - expected 16 parts, got:', empParts.length);
        return null;
      }
      
      return {
        id: empParts[0],
        name: empParts[1],
        friday: parseDayData(empParts[2]),
        saturday: parseDayData(empParts[3]),
        sunday: parseDayData(empParts[4]),
        monday: parseDayData(empParts[5]),
        tuesday: parseDayData(empParts[6]),
        wednesday: parseDayData(empParts[7]),
        thursday: parseDayData(empParts[8]),
        friday_paused: parseDayData(empParts[9]),
        saturday_paused: parseDayData(empParts[10]),
        sunday_paused: parseDayData(empParts[11]),
        monday_paused: parseDayData(empParts[12]),
        tuesday_paused: parseDayData(empParts[13]),
        wednesday_paused: parseDayData(empParts[14]),
        thursday_paused: parseDayData(empParts[15])
      };
    };
    
    const parseDayData = function(dayStr) {
      if (!dayStr || dayStr === 'none') {
        return { status: 'none', type: '', startDate: '', endDate: '', reactivationDate: '' };
      }
      // Format: status:type:startDate:endDate:reactivationDate
      const dayParts = dayStr.split(':');
      return {
        status: dayParts[0] || 'none',
        type: dayParts[1] || '',
        startDate: dayParts[2] || '',
        endDate: dayParts[3] || '',
        reactivationDate: dayParts[4] || ''
      };
    };
    
    const currentEmployee = parseEmployee(currentEmpStr);
    
    if (!currentEmployee) {
      console.error('Could not parse current employee');
      showWeeklyHolidayErrorState('Could not parse current employee data');
      return;
    }
    
    console.log('Current employee parsed:', currentEmployee.name);
    
    const otherEmployees = [];
    if (otherEmpsStr && otherEmpsStr !== '') {
      const otherEmpStrings = otherEmpsStr.split(';');
      console.log('Other employees count:', otherEmpStrings.length);
      
      for (let i = 0; i < otherEmpStrings.length; i++) {
        const empStr = otherEmpStrings[i];
        if (empStr && empStr.trim() !== '') {
          const emp = parseEmployee(empStr.trim());
          if (emp) {
            otherEmployees.push(emp);
          }
        }
      }
    }
    
    console.log('Total other employees parsed:', otherEmployees.length);
    
    weeklyHolidayCalendarData = {
      current: currentEmployee,
      others: otherEmployees
    };
    
    renderWeeklyHolidayCalendar();
    
  } catch (error) {
    console.error('Error parsing weekly holiday data:', error);
    console.error('Error stack:', error.stack);
    showWeeklyHolidayErrorState('Error parsing calendar data: ' + error.message);
  }
}

/**
 * Render single employee row (Replaces old row render)
 */
function renderWeeklyHolidayEmployeeRow(employee, days, isCurrentUser) {
  const rowClass = isCurrentUser ? 'ewh-row ewh-row-current' : 'ewh-row';
  const iconClass = isCurrentUser ? 'fa-user' : 'fa-user-circle';
  const nameLabel = isCurrentUser ? `${employee.name} (You)` : employee.name;
  
  let html = `<tr class="${rowClass}">`;
  
  // Name Cell
  html += `
    <td class="ewh-col-name">
      <div class="ewh-user-info">
        <div class="ewh-avatar"><i class="fas ${iconClass}"></i></div>
        <span>${nameLabel}</span>
      </div>
    </td>
  `;
  
  // Day Cells
  for (let i = 0; i < days.length; i++) {
    const day = days[i];
    const dayData = employee[day];
    const pausedData = employee[day + '_paused'];
    
    let cellContent = '';
    
    // Logic: Active Data (Center) OR Paused Data (Corner)
    if (dayData && dayData.status !== 'none') {
      cellContent += renderWeeklyHolidayDayCell(dayData, false);
    }
    
    if (pausedData && pausedData.status === 'inactive') {
      cellContent += renderWeeklyHolidayDayCell(pausedData, true);
    }
    
    html += `<td class="ewh-cell">${cellContent}</td>`;
  }
  
  html += '</tr>';
  return html;
}

/**
 * Render day cell content (Replaces old cell render)
 * Logic stays exactly the same, only classes change.
 */
function renderWeeklyHolidayDayCell(dayData, isPaused) {
  if (!dayData || dayData.status === 'none') return '';
  
  let iconClass = '';
  let positionClass = ''; // 'ewh-status-marker' (center) or 'ewh-corner-icon'
  let tooltipData = '';
  let iconType = 'fa-check-circle'; // Default icon
  
  // --- LOGIC START (Preserved) ---
  if (isPaused) {
    // Paused Standard (Corner)
    iconClass = 'ewh-inactive-std';
    positionClass = 'ewh-corner-icon';
    iconType = 'fa-pause-circle'; // Distinct icon for paused
    
    tooltipData = `PAUSED STANDARD|Valid: ${dayData.startDate || 'N/A'} to ${dayData.endDate || 'Ongoing'}|Paused until: ${dayData.reactivationDate || 'N/A'}`;
    
  } else {
    if (dayData.status === 'active') {
      // Active Standard
      if (dayData.type === 'standard') {
        iconClass = 'ewh-active-std';
        positionClass = 'ewh-status-marker';
        tooltipData = `ACTIVE STANDARD|Valid: ${dayData.startDate || 'N/A'} to ${dayData.endDate || 'Ongoing'}|Status: Active`;
      } 
      // Active Temp
      else if (dayData.type === 'temp') {
        iconClass = 'ewh-active-tmp';
        positionClass = 'ewh-status-marker';
        tooltipData = `ACTIVE TEMPORARY|Valid: ${dayData.startDate || 'N/A'} - ${dayData.endDate || 'N/A'}|Status: Active Override`;
      }
    } else if (dayData.status === 'inactive') {
      // Future Standard
      if (dayData.type === 'standard') {
        iconClass = 'ewh-inactive-std';
        positionClass = 'ewh-corner-icon';
        iconType = 'fa-clock'; // Clock for future
        tooltipData = `FUTURE STANDARD|Valid: ${dayData.startDate || 'N/A'} to ${dayData.endDate || 'Ongoing'}|Status: Upcoming`;
      } 
      // Future Temp
      else if (dayData.type === 'temp') {
        iconClass = 'ewh-inactive-tmp';
        positionClass = 'ewh-corner-icon';
        iconType = 'fa-clock';
        tooltipData = `FUTURE TEMPORARY|Valid: ${dayData.startDate || 'N/A'} - ${dayData.endDate || 'N/A'}|Status: Upcoming Override`;
      }
    }
  }
  // --- LOGIC END ---

  // Render HTML based on position (Center vs Corner)
  if (positionClass === 'ewh-corner-icon') {
    // Wrap corner icons to ensure they position relative to the cell
    return `
      <div class="ewh-inactive-wrapper">
        <div class="${positionClass} ewh-tooltip-trigger" data-tooltip="${tooltipData}">
          <i class="fas ${iconType} ${iconClass}"></i>
        </div>
      </div>
    `;
  } else {
    // Center big icon
    return `
      <div class="${positionClass} ewh-tooltip-trigger" data-tooltip="${tooltipData}">
        <i class="fas ${iconType} ${iconClass} ewh-icon"></i>
      </div>
    `;
  }
}

/**
 * Updated Tooltip Logic for new classes
 */
function addWeeklyHolidayTooltips() {
  const triggers = document.querySelectorAll('.ewh-tooltip-trigger');
  
  triggers.forEach(trigger => {
    trigger.addEventListener('mouseenter', e => {
      const data = trigger.getAttribute('data-tooltip');
      if (!data) return;
      
      const parts = data.split('|');
      const title = parts[0];
      const body = parts.slice(1).join('\n');
      
      let tooltip = document.getElementById('ewh-tooltip-el');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'ewh-tooltip-el';
        tooltip.className = 'ewh-tooltip';
        document.body.appendChild(tooltip);
      }
      
      tooltip.innerHTML = `<div class="ewh-tooltip-header">${title}</div>${body}`;
      tooltip.classList.add('visible');
      
      // Position logic
      const rect = trigger.getBoundingClientRect();
      const tipRect = tooltip.getBoundingClientRect();
      
      let top = rect.top - tipRect.height - 10;
      let left = rect.left + (rect.width / 2) - (tipRect.width / 2);
      
      // Prevent off-screen
      if (left < 10) left = 10;
      if (top < 10) top = rect.bottom + 10; // Flip to bottom if no space on top
      
      tooltip.style.top = `${top}px`;
      tooltip.style.left = `${left}px`;
    });
    
    trigger.addEventListener('mouseleave', () => {
      const tooltip = document.getElementById('ewh-tooltip-el');
      if (tooltip) tooltip.classList.remove('visible');
    });
  });
}

/**
 * Format date range for display
 */
function EP_formatDateRange(startDateStr, endDateStr) {
  const start = new Date(startDateStr);
  const end = new Date(endDateStr);
  
  const startFormatted = start.toLocaleDateString('en-US', { 
    month: 'short', 
    day: 'numeric', 
    year: 'numeric' 
  });
  
  if (startDateStr === endDateStr) {
    return startFormatted;
  }
  
  const endFormatted = end.toLocaleDateString('en-US', { 
    month: 'short', 
    day: 'numeric', 
    year: 'numeric' 
  });
  
  return `${startFormatted} - ${endFormatted}`;
}

// Global variables
let empCalendarData = null;
let empCalCurrentMonth = new Date().getMonth() + 1;
let empCalCurrentYear = new Date().getFullYear();
let empCalSystemBoundaries = null;
let empCalFilters = {
  employee: 'all',
  leaveType: 'all',
  status: 'all'
};

/**
 * Open employee calendar modal
 * Called from calendar button in employee portal header
 */
function openEmployeeCalendar() {
  console.log('Opening employee calendar...');
  
  const modal = document.getElementById('emp-cal-modal-overlay');
  if (modal) {
    modal.style.display = 'flex';
    
    // Initialize calendar
    const today = new Date();
    empCalCurrentMonth = today.getMonth() + 1;
    empCalCurrentYear = today.getFullYear();
    
    empCalLoadData();
  }
}

/**
 * Close employee calendar modal
 */
function closeEmployeeCalendar() {
  const modal = document.getElementById('emp-cal-modal-overlay');
  if (modal) {
    modal.style.display = 'none';
  }
}

/**
 * Load calendar data from backend
 */
function empCalLoadData() {
  console.log('Loading calendar data:', empCalCurrentMonth, empCalCurrentYear);
  empCalShowLoading(true);
  
  google.script.run
    .withSuccessHandler(empCalHandleDataSuccess)
    .withFailureHandler(empCalHandleDataError)
    .getAdminCalendarData(String(empCalCurrentMonth), String(empCalCurrentYear));
}

/**
 * Handle successful data load
 */
function empCalHandleDataSuccess(response) {
  console.log('Calendar response:', response);
  empCalShowLoading(false);
  
  if (response.startsWith('ERROR:')) {
    alert(response.replace('ERROR:', ''));
    return;
  }
  
  if (response.startsWith('SUCCESS:')) {
    const dataStr = response.replace('SUCCESS:', '');
    try {
      empCalendarData = JSON.parse(dataStr);
      empCalSystemBoundaries = {
        start: new Date(empCalendarData.systemStartDate),
        end: new Date(empCalendarData.systemEndDate)
      };
      
      empCalUpdateHeader();
      empCalPopulateEmployeeFilter();
      empCalRenderDays();
    } catch (error) {
      console.error('Parse error:', error);
      alert('Failed to parse calendar data');
    }
  }
}

/**
 * Handle data load error
 */
function empCalHandleDataError(error) {
  console.error('Load error:', error);
  empCalShowLoading(false);
  alert('Failed to load calendar: ' + error.message);
}

/**
 * Show/hide loading state
 */
function empCalShowLoading(show) {
  const loading = document.getElementById('emp-cal-loading');
  const container = document.getElementById('emp-cal-container');
  
  if (loading) loading.style.display = show ? 'flex' : 'none';
  if (container) container.style.display = show ? 'none' : 'flex';
}

/**
 * Update calendar header
 */
function empCalUpdateHeader() {
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                     'July', 'August', 'September', 'October', 'November', 'December'];
  const elem = document.getElementById('emp-cal-month-year');
  if (elem) {
    elem.textContent = `${monthNames[empCalCurrentMonth - 1]} ${empCalCurrentYear}`;
  }
  empCalUpdateNavButtons();
}

/**
 * Update navigation buttons state
 */
function empCalUpdateNavButtons() {
  if (!empCalSystemBoundaries) return;
  
  const prevBtn = document.getElementById('emp-cal-prev-month');
  const nextBtn = document.getElementById('emp-cal-next-month');
  
  if (prevBtn && nextBtn) {
    const prevMonth = new Date(empCalCurrentYear, empCalCurrentMonth - 2, 1);
    prevBtn.disabled = prevMonth < empCalSystemBoundaries.start;
    
    const nextMonth = new Date(empCalCurrentYear, empCalCurrentMonth, 1);
    nextBtn.disabled = nextMonth > empCalSystemBoundaries.end;
  }
}

/**
 * Change calendar month
 */
function empCalChangeMonth(direction) {
  empCalCurrentMonth += direction;
  
  if (empCalCurrentMonth > 12) {
    empCalCurrentMonth = 1;
    empCalCurrentYear++;
  } else if (empCalCurrentMonth < 1) {
    empCalCurrentMonth = 12;
    empCalCurrentYear--;
  }
  
  empCalLoadData();
}

/**

 */
function empCalGoToToday() {
  const today = new Date();
  empCalCurrentMonth = today.getMonth() + 1;
  empCalCurrentYear = today.getFullYear();
  empCalLoadData();
}

/**
 * Populate employee filter
 */
function empCalPopulateEmployeeFilter() {
  if (!empCalendarData || !empCalendarData.days) return;
  
  const filter = document.getElementById('emp-cal-filter-employee');
  if (!filter) return;
  
  const employees = new Set();
  
  empCalendarData.days.forEach(day => {
    if (day.employeesData) {
      day.employeesData.forEach(emp => {
        if (emp.id && emp.name) employees.add(`${emp.id}|${emp.name}`);
      });
    }
  });
  
  let options = '<option value="all">All Employees</option>';
  
  const sorted = Array.from(employees).sort((a, b) => {
    const nameA = a.split('|')[1];
    const nameB = b.split('|')[1];
    return nameA.localeCompare(nameB);
  });
  
  sorted.forEach(emp => {
    const [id, name] = emp.split('|');
    options += `<option value="${id}">${name}</option>`;
  });
  
  filter.innerHTML = options;
}

/**
 * Apply filters
 */
function empCalApplyFilters() {

  empCalFilters.leaveType = document.getElementById('emp-cal-filter-leave-type').value;
  empCalFilters.status = document.getElementById('emp-cal-filter-status').value;

/**
 * Render calendar days
 */
function empCalRenderDays() {
  if (!empCalendarData || !empCalendarData.days) return;
  
  const grid = document.getElementById('emp-cal-days-grid');
  if (!grid) return;
  
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const firstDay = new Date(empCalCurrentYear, empCalCurrentMonth - 1, 1);
  const firstDayOfWeek = firstDay.getDay();
  
  grid.innerHTML = '';
  
  // Empty cells before month starts
  for (let i = 0; i < firstDayOfWeek; i++) {
    const empty = document.createElement('div');
    empty.className = 'emp-cal-day emp-cal-day-empty';
    grid.appendChild(empty);
  }
  
  const holidayPeriods = empCalGroupHolidayPeriods();
  
  empCalendarData.days.forEach(dayData => {
    const dayCell = empCalCreateDayCell(dayData, today, holidayPeriods);
    grid.appendChild(dayCell);
  });
}

/**
 * Group holiday periods
 */
function empCalGroupHolidayPeriods() {
  if (!empCalendarData || !empCalendarData.days) return {};
  
  const periods = {};
  
  empCalendarData.days.forEach((day, index) => {
    if (day.isOfficialHoliday && day.officialHolidayName) {
      const date = new Date(day.date);
      const firstDayOfMonth = new Date(empCalCurrentYear, empCalCurrentMonth - 1, 1);
      const daysSinceStart = Math.floor((date - firstDayOfMonth) / (1000 * 60 * 60 * 24));
      const weekRow = Math.floor((firstDayOfMonth.getDay() + daysSinceStart) / 7);
      const key = `${day.officialHolidayName}_week${weekRow}`;
      
      if (!periods[key]) {
        periods[key] = { name: day.officialHolidayName, weekRow: weekRow, days: [] };
      }
      
      periods[key].days.push(day.date);
    }
  });
  
  return periods;
}

/**
 * Create day cell
 */
function empCalCreateDayCell(dayData, today, holidayPeriods) {
  const dayCell = document.createElement('div');
  dayCell.className = 'emp-cal-day';
  
  const cellDate = new Date(dayData.date + 'T00:00:00');
  cellDate.setHours(0, 0, 0, 0);
  
  if (cellDate.getTime() === today.getTime()) {
    dayCell.classList.add('emp-cal-day-today');
  }
  
  if (dayData.isOfficialHoliday) {
    dayCell.classList.add('emp-cal-day-official-holiday');
    
    const date = new Date(dayData.date + 'T00:00:00');
    const firstDayOfMonth = new Date(empCalCurrentYear, empCalCurrentMonth - 1, 1);
    const daysSinceStart = Math.floor((date - firstDayOfMonth) / (1000 * 60 * 60 * 24));
    const weekRow = Math.floor((firstDayOfMonth.getDay() + daysSinceStart) / 7);
    const key = `${dayData.officialHolidayName}_week${weekRow}`;
    
    if (holidayPeriods[key] && holidayPeriods[key].days.length > 1) {
      const holidayBox = document.createElement('div');
      holidayBox.className = 'emp-cal-day-holiday-box';
      dayCell.appendChild(holidayBox);
    }
  }
  
  const dayNum = document.createElement('div');
  dayNum.className = 'emp-cal-day-number';
  dayNum.textContent = new Date(dayData.date + 'T00:00:00').getDate();
  dayCell.appendChild(dayNum);
  
  const dayInfo = document.createElement('div');
  dayInfo.className = 'emp-cal-day-info';
  
  const filteredCounts = empCalApplyFiltersToCounts(dayData);
  
  if (filteredCounts.approvedLeaves > 0) {
    const approvedDiv = document.createElement('div');
    approvedDiv.className = 'emp-cal-day-stat emp-cal-day-stat-approved';
    approvedDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${filteredCounts.approvedLeaves}`;
    approvedDiv.title = `${filteredCounts.approvedLeaves} Approved Leave${filteredCounts.approvedLeaves > 1 ? 's' : ''}`;
    dayInfo.appendChild(approvedDiv);
  }
  
  if (filteredCounts.pendingRequests > 0) {
    const pendingDiv = document.createElement('div');
    pendingDiv.className = 'emp-cal-day-stat emp-cal-day-stat-pending';
    pendingDiv.innerHTML = `<i class="fas fa-clock"></i> ${filteredCounts.pendingRequests}`;
    pendingDiv.title = `${filteredCounts.pendingRequests} Pending Request${filteredCounts.pendingRequests > 1 ? 's' : ''}`;
    dayInfo.appendChild(pendingDiv);
  }
  
  if (filteredCounts.weeklyHolidays > 0) {
    const weeklyDiv = document.createElement('div');
    weeklyDiv.className = 'emp-cal-day-stat emp-cal-day-stat-weekly';
    weeklyDiv.innerHTML = `<i class="fas fa-calendar-week"></i> ${filteredCounts.weeklyHolidays}`;
    weeklyDiv.title = `${filteredCounts.weeklyHolidays} Weekly Holiday${filteredCounts.weeklyHolidays > 1 ? 's' : ''}`;
    dayInfo.appendChild(weeklyDiv);

    officialDiv.className = 'emp-cal-day-stat emp-cal-day-stat-official';

    officialDiv.title = `${filteredCounts.officialHolidayOff} Off for Official Holiday`;
    dayInfo.appendChild(officialDiv);
  }
  
  dayCell.appendChild(dayInfo);
  dayCell.onclick = () => empCalShowDayModal(dayData);
  
  return dayCell;
}

/**
 * Apply filters to counts
 */
function empCalApplyFiltersToCounts(dayData) {
  if (empCalFilters.employee === 'all' && 
      empCalFilters.leaveType === 'all' && 
      empCalFilters.status === 'all') {
    return dayData.counts;
  }
  
  const detailed = empCalCalculateDayCounts(dayData);
  
  return {
    totalActive: dayData.counts.totalActive,
    working: detailed.working,
    approvedLeaves: dayData.counts.approvedLeaves,
    pendingRequests: dayData.counts.pendingRequests,
    weeklyHolidays: dayData.counts.weeklyHolidays,
    officialHolidayOff: dayData.counts.officialHolidayOff
  };
}

/**
 * Calculate day counts
 */
function empCalCalculateDayCounts(dayData) {
  const counts = { off: 0, working: 0, pending: 0 };
  
  if (!dayData.employeesData) return counts;
  
  const employeeMap = {};
  
  dayData.employeesData.forEach(empData => {
    if (!employeeMap[empData.id]) {
      employeeMap[empData.id] = {
        id: empData.id,
        name: empData.name,
        leaves: [],
        weeklyHoliday: false,
        officialHoliday: false
      };
    }
    
    const emp = employeeMap[empData.id];
    
    if (empData.type === 'Weekly Holidays') {
      if (empData.value === 'true' || empData.value === true) {
        emp.weeklyHoliday = true;
      }
    } else if (empData.type === 'Official Holidays') {
      if (empData.value === 'Off' || empData.value === 'Pending') {
        emp.officialHoliday = true;
      }
    } else if (['Annual Leaves', 'Sick Leaves', 'Emergency Leaves'].includes(empData.type)) {
      if (empData.value) {
        emp.leaves.push({ type: empData.type, status: empData.value });
      }
    }
  });
  
  Object.values(employeeMap).forEach(emp => {
    if (empCalFilters.employee !== 'all' && emp.id !== empCalFilters.employee) return;
    
    let isOff = false;
    let isPending = false;
    
    if (emp.weeklyHoliday || emp.officialHoliday) {
      isOff = true;
    }
    
    emp.leaves.forEach(leave => {
      if (empCalFilters.leaveType !== 'all') {
        const typeMap = {
          'annual': 'Annual Leaves',
          'sick': 'Sick Leaves',
          'emergency': 'Emergency Leaves'
        };
        if (leave.type !== typeMap[empCalFilters.leaveType]) return;
      }
      
      if (empCalFilters.status !== 'all') {
        const status = empCalParseStatus(leave.status);
        if (status.toLowerCase() !== empCalFilters.status) return;
      }
      
      const status = empCalParseStatus(leave.status);
      if (status === 'Approved') isOff = true;
      if (status === 'Pending') isPending = true;
    });
    
    if (isOff) counts.off++;
    else if (isPending) counts.pending++;
    else counts.working++;
  });
  
  return counts;
}

/**
 * Parse leave status
 */
function empCalParseStatus(value) {
  if (!value) return 'Unknown';
  const valueStr = String(value).toLowerCase();
  if (valueStr.includes('approved')) return 'Approved';
  if (valueStr.includes('rejected')) return 'Rejected';
  if (valueStr.includes('pending')) return 'Pending';
  return 'Unknown';
}

/**
 * Organize employees for modal
 */
function empCalOrganizeEmployees(dayData) {
  const categories = {
    weeklyHolidays: [],
    officialHolidaysOff: [],
    annualLeaves: { approved: [], rejected: [], pending: [] },
    sickLeaves: { approved: [], rejected: [], pending: [] },
    emergencyLeaves: { approved: [], rejected: [], pending: [] },
    summary: { off: 0, working: 0, pending: 0 }
  };
  
  if (!dayData.employeesData) return categories;
  
  const employeeMap = {};
  
  dayData.employeesData.forEach(empData => {
    if (!employeeMap[empData.id]) {
      employeeMap[empData.id] = {
        id: empData.id,
        name: empData.name,
        weeklyHoliday: false,
        officialHolidayOff: false,
        leaves: []
      };
    }
    
    const emp = employeeMap[empData.id];
    
    if (empData.type === 'Weekly Holidays') {
      if (empData.value === 'true' || empData.value === true) {
        emp.weeklyHoliday = true;
      }
    } else if (empData.type === 'Official Holidays') {
      if (empData.value === 'Off' || empData.value === 'Pending') {
        emp.officialHolidayOff = true;
      }
    } else if (['Annual Leaves', 'Sick Leaves', 'Emergency Leaves'].includes(empData.type)) {
      if (empData.value) {
        emp.leaves.push({ type: empData.type, status: empData.value });
      }
    }
  });
  
  Object.values(employeeMap).forEach(emp => {
    let isOff = false;
    let isPending = false;
    
    if (emp.weeklyHoliday) {
      categories.weeklyHolidays.push({ name: emp.name });
      isOff = true;
    }
    
    if (emp.officialHolidayOff) {
      categories.officialHolidaysOff.push({ name: emp.name });
      isOff = true;
    }
    
    emp.leaves.forEach(leave => {
      const status = empCalParseStatus(leave.status);
      const empInfo = { name: emp.name, status: status };
      
      if (leave.type === 'Annual Leaves') {
        if (status === 'Approved') categories.annualLeaves.approved.push(empInfo);
        else if (status === 'Rejected') categories.annualLeaves.rejected.push(empInfo);
        else if (status === 'Pending') categories.annualLeaves.pending.push(empInfo);
      } else if (leave.type === 'Sick Leaves') {
        if (status === 'Approved') categories.sickLeaves.approved.push(empInfo);
        else if (status === 'Rejected') categories.sickLeaves.rejected.push(empInfo);
        else if (status === 'Pending') categories.sickLeaves.pending.push(empInfo);
      } else if (leave.type === 'Emergency Leaves') {
        if (status === 'Approved') categories.emergencyLeaves.approved.push(empInfo);
        else if (status === 'Rejected') categories.emergencyLeaves.rejected.push(empInfo);
        else if (status === 'Pending') categories.emergencyLeaves.pending.push(empInfo);
      }
      
      if (status === 'Approved') isOff = true;
      if (status === 'Pending') isPending = true;
    });
    
    if (isOff) categories.summary.off++;
    else if (isPending) categories.summary.pending++;
    else categories.summary.working++;
  });
  
  return categories;
}

/**

 */
function empCalBuildLeavesSection(title, icon, leavesData) {
  const total = leavesData.approved.length + leavesData.rejected.length + leavesData.pending.length;
  
  if (total === 0) return '';
  
  let html = `
    <div class="emp-cal-modal-section">
      <div class="emp-cal-modal-section-title">
        <i class="fas fa-${icon}"></i> ${title}
      </div>
      <div class="emp-cal-modal-employee-list">
  `;
  
  leavesData.approved.forEach(emp => {
    html += `
      <div class="emp-cal-modal-employee-item">
        <span class="emp-cal-modal-employee-name">${emp.name}</span>
        <span class="emp-cal-modal-employee-status emp-cal-modal-status-approved">
          <i class="fas fa-check-circle"></i> Approved
        </span>
      </div>
    `;
  });
  
  leavesData.rejected.forEach(emp => {
    html += `
      <div class="emp-cal-modal-employee-item">
        <span class="emp-cal-modal-employee-name">${emp.name}</span>
        <span class="emp-cal-modal-employee-status emp-cal-modal-status-rejected">
          <i class="fas fa-times-circle"></i> Rejected
        </span>
      </div>
    `;
  });
  
  leavesData.pending.forEach(emp => {
    html += `
      <div class="emp-cal-modal-employee-item">
        <span class="emp-cal-modal-employee-name">${emp.name}</span>
        <span class="emp-cal-modal-employee-status emp-cal-modal-status-pending">
          <i class="fas fa-clock"></i> Pending
        </span>

    `;
  });
  
  html += `</div></div>`;
  
  return html;
}

// Global Variables

let LRDS_employeeEmail = null;
let LRDS_employeeId = null;
let LRDS_currentMonth = new Date().getMonth() + 1;
let LRDS_currentYear = new Date().getFullYear();
let LRDS_calendarData = null;
let LRDS_systemBoundaries = null;
let LRDS_employeeRequests = [];
let LRDS_officialHolidays = [];
let LRDS_weeklyHolidays = {};
let LRDS_selectedStartDate = null;
let LRDS_selectedEndDate = null;

/**

/**
 * Load all necessary data
 */
function LRDS_loadData() {
  LRDS_showLoading(true);

  // Load calendar data
  google.script.run
    .withSuccessHandler(LRDS_handleCalendarDataSuccess)
    .withFailureHandler(LRDS_handleDataError)
    .getAdminCalendarData(String(LRDS_currentMonth), String(LRDS_currentYear));
}

/**
 * Handle calendar data success
 */
function LRDS_handleCalendarDataSuccess(response) {
  if (response.startsWith('ERROR:')) {
    alert(response.replace('ERROR:', ''));
    LRDS_showLoading(false);
    return;
  }

  if (response.startsWith('SUCCESS:')) {
    const dataStr = response.replace('SUCCESS:', '');
    try {
      LRDS_calendarData = JSON.parse(dataStr);
      LRDS_systemBoundaries = {
        start: new Date(LRDS_calendarData.systemStartDate),
        end: new Date(LRDS_calendarData.systemEndDate)
      };

      // Extract official holidays
      LRDS_extractOfficialHolidays();

      // Load employee-specific data
      LRDS_loadEmployeeData();

    } catch (error) {
      console.error('Parse error:', error);
      alert('Failed to parse calendar data');
      LRDS_showLoading(false);
    }
  }
}

/**
 * Extract official holidays from calendar data
 */
function LRDS_extractOfficialHolidays() {
  LRDS_officialHolidays = [];
  
  if (LRDS_calendarData && LRDS_calendarData.days) {
    LRDS_calendarData.days.forEach(day => {
      if (day.isOfficialHoliday) {
        LRDS_officialHolidays.push(day.date);
      }
    });
  }
}

/**
 * Load employee-specific data
 */
function LRDS_loadEmployeeData() {
  // Load employee requests
  google.script.run
    .withSuccessHandler(LRDS_handleEmployeeRequestsSuccess)
    .withFailureHandler(LRDS_handleDataError)
    .getEmployeeLeaveRequests(LRDS_employeeEmail);
}

/**
 * Handle employee requests success
 */
function LRDS_handleEmployeeRequestsSuccess(response) {
  if (response.startsWith('ERROR:')) {
    console.warn('Could not load employee requests:', response);
    LRDS_employeeRequests = [];
  } else if (response.startsWith('SUCCESS:')) {
    const dataStr = response.replace('SUCCESS:', '');
    try {
      // Parse string format: semicolon-separated requests
      const requestStrings = dataStr.split(';').filter(s => s.trim());
      LRDS_employeeRequests = requestStrings.map(reqStr => {
        const parts = reqStr.split('|');
        
        // Parse days data (field index 14)
        const daysString = parts[14] || '';
        const days = daysString.split('#').filter(d => d.trim()).map(dayStr => {
          const dayParts = dayStr.split('~');
          return {
            date: dayParts[0] ? new Date(dayParts[0]).toISOString().split('T')[0] : '',
            weekDay: dayParts[1] || '',
            weeklyHoliday: dayParts[2] === 'true',
            responseStatus: dayParts[3] || 'Pending'
          };
        });
        
        return {
          id: parts[0] || '',
          type: parts[1] || '',
          reason: parts[2] || '',
          requestTimestamp: parts[3] || '',
          startDate: parts[4] ? new Date(parts[4]).toISOString().split('T')[0] : '',
          endDate: parts[5] ? new Date(parts[5]).toISOString().split('T')[0] : '',
          totalDays: parseInt(parts[6]) || 0,
          netDays: parseInt(parts[7]) || 0,
          summary: {
            approved: parseInt(parts[8]) || 0,
            rejected: parseInt(parts[9]) || 0,
            pending: parseInt(parts[10]) || 0,
            status: parts[11] || 'Pending'
          },
          isPending: parts[12] === 'true',
          hasResponse: parts[13] === 'true',
          days: days
        };
      });
      
      console.log('Parsed employee requests:', LRDS_employeeRequests.length);
    } catch (error) {
      console.error('Parse error:', error);
      LRDS_employeeRequests = [];
    }
  }

  // Load weekly holidays
  google.script.run
    .withSuccessHandler(LRDS_handleWeeklyHolidaysSuccess)
    .withFailureHandler(LRDS_handleDataError)
    .getEmployeeWeeklyHolidays(LRDS_employeeEmail);
}

/**
 * Handle weekly holidays success
 */
function LRDS_handleWeeklyHolidaysSuccess(response) {
  try {
    if (typeof response === 'string' && response.startsWith('ERROR:')) {
      console.warn('Could not load weekly holidays:', response);
      LRDS_weeklyHolidays = {};
    } else if (typeof response === 'object' && response.success) {
      // Response is an object
      LRDS_weeklyHolidays = response.data || {};
    } else if (typeof response === 'string' && response.startsWith('SUCCESS:')) {
      // Response is a string
      const dataStr = response.replace('SUCCESS:', '');
      LRDS_weeklyHolidays = LRDS_parseWeeklyHolidays(dataStr);
    } else {
      console.warn('Unexpected weekly holidays format:', response);
      LRDS_weeklyHolidays = {};
    }
  } catch (error) {
    console.error('Error parsing weekly holidays:', error);
    LRDS_weeklyHolidays = {};
  }

  // All data loaded, render calendar
  LRDS_showLoading(false);
  LRDS_renderCalendar();
}

/**
 * Parse weekly holidays from string format
 */
function LRDS_parseWeeklyHolidays(dataString) {
  const parts = dataString.split('|');
  if (parts.length >= 8) {
    return {
      friday: parts[1] === 'true',
      saturday: parts[2] === 'true',
      sunday: parts[3] === 'true',
      monday: parts[4] === 'true',
      tuesday: parts[5] === 'true',
      wednesday: parts[6] === 'true',
      thursday: parts[7] === 'true'
    };
  }
  return {};
}

/**
 * Handle data error
 */
function LRDS_handleDataError(error) {
  console.error('Data load error:', error);
  alert('Failed to load calendar data: ' + error.message);
  LRDS_showLoading(false);
}

 * Show/hide loading

  if (loading) loading.style.display = show ? 'flex' : 'none';

/**
