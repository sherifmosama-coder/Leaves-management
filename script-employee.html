function LRDS_updateNavButtons() {
  if (!LRDS_systemBoundaries) return;
  
  const prevBtn = document.getElementById('LRDS-prev-month');
  const nextBtn = document.getElementById('LRDS-next-month');
  
  if (prevBtn && nextBtn) {

/**
 * Render calendar grid
 */
function LRDS_renderGrid() {
  const grid = document.getElementById('LRDS-calendar-grid');
  if (!grid) return;

  grid.innerHTML = '';

  const firstDay = new Date(LRDS_currentYear, LRDS_currentMonth - 1, 1);
  const lastDay = new Date(LRDS_currentYear, LRDS_currentMonth, 0);
  const firstDayOfWeek = firstDay.getDay();

  // Empty cells before month starts
  for (let i = 0; i < firstDayOfWeek; i++) {
    const empty = document.createElement('div');
    empty.className = 'LRDS-day LRDS-day-empty';
    grid.appendChild(empty);
  }

  // Days of month
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(LRDS_currentYear, LRDS_currentMonth - 1, day);
    const cell = LRDS_createDayCell(date);
    grid.appendChild(cell);
  }
}

/**
 * Create day cell
 */
function LRDS_createDayCell(date) {
  const cell = document.createElement('div');
  cell.className = 'LRDS-day';
  
  const dateString = LRDS_formatDate(date);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  date.setHours(0, 0, 0, 0);

  // Find day data from calendar
  const dayData = LRDS_calendarData.days.find(d => d.date === dateString);

  // Check if today
  if (date.getTime() === today.getTime()) {
    cell.classList.add('LRDS-day-today');
  }

  // Check if selected
  if (LRDS_selectedStartDate && LRDS_selectedEndDate) {
    const startTime = new Date(LRDS_selectedStartDate).getTime();
    const endTime = new Date(LRDS_selectedEndDate).getTime();
    const dateTime = date.getTime();

    if (dateTime === startTime) {
      cell.classList.add('LRDS-day-selected-start');
    } else if (dateTime === endTime) {
      cell.classList.add('LRDS-day-selected-end');
    } else if (dateTime > startTime && dateTime < endTime) {
      cell.classList.add('LRDS-day-selected-range');
    }
  } else if (LRDS_selectedStartDate && dateString === LRDS_selectedStartDate) {
    cell.classList.add('LRDS-day-selected-start');
  }

  // Day number
  const dayNum = document.createElement('div');
  dayNum.className = 'LRDS-day-number';
  dayNum.textContent = date.getDate();
  cell.appendChild(dayNum);

  // Indicators container
  const indicators = document.createElement('div');
  indicators.className = 'LRDS-day-indicators';

  // Check restrictions
  const validation = LRDS_validateDate(date, dateString);

  // Add indicators
  if (validation.isOfficialHoliday) {
    const indicator = document.createElement('div');
    indicator.className = 'LRDS-indicator LRDS-indicator-official';
    indicator.innerHTML = '<i class="fas fa-star"></i> Official';
    indicators.appendChild(indicator);
  }

  if (validation.isWeeklyHoliday) {
    const indicator = document.createElement('div');
    indicator.className = 'LRDS-indicator LRDS-indicator-weekly';
    indicator.innerHTML = '<i class="fas fa-calendar-week"></i> Weekly';
    indicators.appendChild(indicator);
  }

  if (validation.hasOverlap) {
    const indicator = document.createElement('div');
    indicator.className = 'LRDS-indicator LRDS-indicator-overlap';
    indicator.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Overlap';
    indicators.appendChild(indicator);
  }

  // Show other employees data from calendar
  if (dayData && dayData.counts) {
    // Show approved leaves
    if (dayData.counts.approvedLeaves > 0) {
      const indicator = document.createElement('div');
      indicator.className = 'LRDS-indicator';
      indicator.style.background = '#d4edda';
      indicator.style.color = '#155724';
      indicator.innerHTML = `<i class="fas fa-check-circle"></i> ${dayData.counts.approvedLeaves} off`;
      indicators.appendChild(indicator);
    }
    
    // Show weekly holidays
    if (dayData.counts.weeklyHolidays > 0) {
      const indicator = document.createElement('div');
      indicator.className = 'LRDS-indicator';
      indicator.style.background = '#d1ecf1';
      indicator.style.color = '#0c5460';
      indicator.innerHTML = `<i class="fas fa-calendar-week"></i> ${dayData.counts.weeklyHolidays} weekly`;
      indicators.appendChild(indicator);
    }
    
    // Show pending requests
    if (dayData.counts.pendingRequests > 0) {
      const indicator = document.createElement('div');
      indicator.className = 'LRDS-indicator';
      indicator.style.background = '#fff3cd';
      indicator.style.color = '#856404';
      indicator.innerHTML = `<i class="fas fa-clock"></i> ${dayData.counts.pendingRequests} pending`;
      indicators.appendChild(indicator);
    }
  }

  cell.appendChild(indicators);

  // Determine if day is selectable
  let isSelectable = true;
  let isBlocked = false;

  if (!validation.withinSystem) {
    cell.classList.add('LRDS-day-disabled');
    isSelectable = false;
  } else if (LRDS_selectedLeaveType === 'annual') {
    // Annual restrictions
    if (date <= today) {
      cell.classList.add('LRDS-day-disabled');
      isSelectable = false;
    } else if (validation.isOfficialHoliday || validation.hasOverlap) {
      cell.classList.add('LRDS-day-blocked');
      isBlocked = true;
      isSelectable = false;
    }
  } else {
    // Sick/Emergency restrictions
    if (validation.hasOverlap) {
      cell.classList.add('LRDS-day-blocked');
      isBlocked = true;
      isSelectable = false;
    }
  }

  // Check end date restrictions
  if (LRDS_selectedStartDate && !LRDS_selectedEndDate && isSelectable) {
    const startDate = new Date(LRDS_selectedStartDate);
    if (date < startDate) {
      cell.classList.add('LRDS-day-blocked-for-end');
      isSelectable = false;
    } else if (date > startDate) {
      // Check if range is valid
      if (!LRDS_isRangeValid(startDate, date)) {
        cell.classList.add('LRDS-day-blocked-for-end');
        isSelectable = false;
      }
    }
  }

  // Cell click handler for day details - attach to cell itself
  cell.addEventListener('click', function(e) {
    // Only trigger if not clicking toggle button
    if (!e.target.closest('.LRDS-toggle-btn')) {
      if (dayData) {
        LRDS_showDayDetails(dayData);
      }
    }
  });

// Toggle button
  if (isSelectable) {
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'LRDS-toggle-btn';
    toggleBtn.onclick = (e) => {
      e.stopPropagation();
      LRDS_toggleDate(dateString);
    };
    
    // Check if this date is part of current selection
    let isPartOfSelection = false;
    if (LRDS_selectedStartDate && LRDS_selectedEndDate) {
      const cellDate = new Date(dateString);
      const startDate = new Date(LRDS_selectedStartDate);
      const endDate = new Date(LRDS_selectedEndDate);
      cellDate.setHours(0, 0, 0, 0);
      startDate.setHours(0, 0, 0, 0);
      endDate.setHours(0, 0, 0, 0);
      
      isPartOfSelection = (cellDate >= startDate && cellDate <= endDate);
    }
    
    // Set button text
    if (!LRDS_selectedStartDate) {
      toggleBtn.innerHTML = '<i class="fas fa-check"></i> Select Start';
    } else if (LRDS_selectedStartDate && !LRDS_selectedEndDate) {
      if (dateString === LRDS_selectedStartDate) {
        toggleBtn.innerHTML = '<i class="fas fa-check-double"></i> Start Date';
      } else {
        toggleBtn.innerHTML = '<i class="fas fa-check"></i> Select End';
      }
    } else if (LRDS_selectedStartDate && LRDS_selectedEndDate) {
      // Both dates selected
      if (isPartOfSelection) {
        toggleBtn.innerHTML = '<i class="fas fa-redo"></i> Reset';
      } else {
        toggleBtn.innerHTML = '<i class="fas fa-check"></i> New Selection';
      }
    }
    
    cell.appendChild(toggleBtn);
  }

  LRDS_ensureSelectionHighlight(cell, dateString);
  return cell;
}

/**
 * Validate date
 */
function LRDS_validateDate(date, dateString) {
  const result = {
    withinSystem: true,
    isOfficialHoliday: false,
    isWeeklyHoliday: false,
    hasOverlap: false
  };

  // Check system boundaries
  if (LRDS_systemBoundaries) {
    if (date < LRDS_systemBoundaries.start || date > LRDS_systemBoundaries.end) {
      result.withinSystem = false;
      return result;
    }
  }

  // Check official holiday
  result.isOfficialHoliday = LRDS_officialHolidays.includes(dateString);

  // Check weekly holiday
  const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  const dayName = dayNames[date.getDay()];
  result.isWeeklyHoliday = LRDS_weeklyHolidays[dayName] === true;

  // Check overlap with existing requests
  result.hasOverlap = LRDS_checkOverlap(dateString);

  return result;
}

/**
 * Check overlap with existing requests
 */
function LRDS_checkOverlap(dateString) {
  if (!LRDS_employeeRequests || LRDS_employeeRequests.length === 0) {
    return false;
  }

  const checkDate = new Date(dateString);
  checkDate.setHours(0, 0, 0, 0);

  for (const request of LRDS_employeeRequests) {
    // Only check same leave type
    if (request.type !== LRDS_selectedLeaveType) continue;

    // Only check pending/approved requests
    if (!request.isPending && request.summary.status !== 'Approved' && 
        request.summary.status !== 'Partially approved') {
      continue;
    }

    // Check if date is within request range
    const startDate = new Date(request.startDate);
    const endDate = new Date(request.endDate);
    startDate.setHours(0, 0, 0, 0);
    endDate.setHours(0, 0, 0, 0);

    if (checkDate >= startDate && checkDate <= endDate) {
      return true;
    }
  }

  return false;
}

/**
 * Check if range is valid
 */
function LRDS_isRangeValid(startDate, endDate) {
  const current = new Date(startDate);
  current.setHours(0, 0, 0, 0);
  const end = new Date(endDate);
  end.setHours(0, 0, 0, 0);

  while (current <= end) {
    const dateString = LRDS_formatDate(current);
    const validation = LRDS_validateDate(current, dateString);

    // For annual, check official holidays and overlaps
    if (LRDS_selectedLeaveType === 'annual') {
      if (validation.isOfficialHoliday || validation.hasOverlap) {
        return false;
      }
    } else {
      // For sick/emergency, only check overlaps
      if (validation.hasOverlap) {
        return false;
      }
    }

    current.setDate(current.getDate() + 1);
  }

  return true;
}

/**
 * Toggle date selection
 */
function LRDS_toggleDate(dateString) {
  if (!LRDS_selectedStartDate) {
    // Select start date
    LRDS_selectedStartDate = dateString;
  } else if (!LRDS_selectedEndDate) {
    // Select end date
    const startDate = new Date(LRDS_selectedStartDate);
    const endDate = new Date(dateString);
    
    if (endDate < startDate) {
      // Swap dates
      LRDS_selectedEndDate = LRDS_selectedStartDate;
      LRDS_selectedStartDate = dateString;
    } else {
      LRDS_selectedEndDate = dateString;
    }
  } else {
    // Already have both, start new selection
    LRDS_selectedStartDate = dateString;
    LRDS_selectedEndDate = null;
  }

  LRDS_renderGrid();
  LRDS_updateSelectionDisplay();
  LRDS_updateApplyButton();
}

/**
 * Clear selection
 */
function LRDS_clearSelection() {
  LRDS_selectedStartDate = null;
  LRDS_selectedEndDate = null;
  LRDS_renderGrid();
  LRDS_updateSelectionDisplay();
  LRDS_updateApplyButton();
}

/**
 * Update selection display
 */
function LRDS_updateSelectionDisplay() {
  const startDisplay = document.getElementById('LRDS-start-display');
  const endDisplay = document.getElementById('LRDS-end-display');
  const durationDisplay = document.getElementById('LRDS-duration-display');
  const clearBtn = document.getElementById('LRDS-clear-btn');

  if (startDisplay) {
    startDisplay.textContent = LRDS_selectedStartDate ? 
      LRDS_formatDisplayDate(LRDS_selectedStartDate) : 'Not selected';
  }

  if (endDisplay) {
    endDisplay.textContent = LRDS_selectedEndDate ? 
      LRDS_formatDisplayDate(LRDS_selectedEndDate) : 'Not selected';
  }

  if (durationDisplay) {
    if (LRDS_selectedStartDate && LRDS_selectedEndDate) {
      const duration = LRDS_calculateDuration(LRDS_selectedStartDate, LRDS_selectedEndDate);
      durationDisplay.textContent = `${duration} day${duration !== 1 ? 's' : ''}`;
    } else {
      durationDisplay.textContent = '0 days';
    }
  }

  if (clearBtn) {
    clearBtn.style.display = LRDS_selectedStartDate ? 'flex' : 'none';
  }
}

/**
 * Update apply button
 */
function LRDS_updateApplyButton() {
  const applyBtn = document.getElementById('LRDS-apply-btn');
  if (applyBtn) {
    applyBtn.disabled = !(LRDS_selectedStartDate && LRDS_selectedEndDate);
  }
}

/**
 * Calculate duration
 */
function LRDS_calculateDuration(startDate, endDate) {
  const start = new Date(startDate);
  const end = new Date(endDate);
  const diffTime = Math.abs(end - start);
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  return diffDays + 1; // Include both dates
}

/**
 * Change month
 */
function LRDS_changeMonth(direction) {
  LRDS_currentMonth += direction;

  if (LRDS_currentMonth > 12) {
    LRDS_currentMonth = 1;
    LRDS_currentYear++;
  } else if (LRDS_currentMonth < 1) {
    LRDS_currentMonth = 12;
    LRDS_currentYear--;
  }

  LRDS_loadData();
}

/**
 * Go to today
 */
function LRDS_goToToday() {
  const today = new Date();
  LRDS_currentMonth = today.getMonth() + 1;
  LRDS_currentYear = today.getFullYear();
  LRDS_loadData();
}

/**
 * Apply selection
 */
function LRDS_applySelection() {
  if (!LRDS_selectedStartDate || !LRDS_selectedEndDate) {
    showEmployeeToast('Please select both start and end dates', 'error');
    return;
  }

  // Update form inputs
  const startInput = document.getElementById('EP-start-date');
  const endInput = document.getElementById('EP-end-date');

  if (startInput) startInput.value = LRDS_selectedStartDate;
  if (endInput) endInput.value = LRDS_selectedEndDate;

  // Trigger validation
  if (typeof EP_validateForm === 'function') {
    EP_validateForm();
  }

  // Close modal
  LRDS_closeCalendar();

  // Show success message

  showEmployeeToast(`✓ Selected dates passed to Form`, 'success');
}

/**
 * Format date as YYYY-MM-DD
 */
function LRDS_formatDate(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

/**
 * Format date for display
 */
function LRDS_formatDisplayDate(dateString) {
  const date = new Date(dateString + 'T00:00:00');
  return date.toLocaleDateString('en-US', { 
    month: 'short', 
    day: 'numeric', 
    year: 'numeric' 
  });
}

/**
 * Show day details modal (reuse existing empCal modal)
 */
function LRDS_showDayDetails(dayData) {
  // Call existing employee calendar day modal
  if (typeof empCalShowDayModal === 'function') {
    empCalShowDayModal(dayData);
  } else {
    console.log('Day details:', dayData);
    // Fallback: simple alert
    alert(`Date: ${dayData.date}\nOff: ${dayData.counts.approvedLeaves || 0}\nWorking: ${dayData.counts.working || 0}`);
  }
}

// Fix selection display - call this at end of LRDS_createDayCell
function LRDS_ensureSelectionHighlight(cell, dateString) {
  if (!LRDS_selectedStartDate || !LRDS_selectedEndDate) return;
  
  const cellDate = new Date(dateString);
  const startDate = new Date(LRDS_selectedStartDate);
  const endDate = new Date(LRDS_selectedEndDate);
  
  cellDate.setHours(0, 0, 0, 0);
  startDate.setHours(0, 0, 0, 0);
  endDate.setHours(0, 0, 0, 0);
  
  // Force highlight start date
  if (cellDate.getTime() === startDate.getTime()) {
    cell.classList.add('LRDS-day-selected-start');
  }
  // Force highlight end date
  if (cellDate.getTime() === endDate.getTime()) {
    cell.classList.add('LRDS-day-selected-end');
  }
  // Force highlight range
  if (cellDate > startDate && cellDate < endDate) {
    cell.classList.add('LRDS-day-selected-range');
  }
}
</script>
