  }
  
  // Initialize calendar with current month
  const today = new Date();
  calendarCurrentMonth = today.getMonth() + 1;
  calendarCurrentYear = today.getFullYear();
  
  // Setup event listeners
  setupCalendarEventListeners();
  
  // Load calendar data
  loadAdminCalendarData();
}

/**
 * Setup calendar event listeners
 */
function setupCalendarEventListeners() {
  // Navigation buttons
  const prevBtn = document.getElementById('cal-prev-month');
  const nextBtn = document.getElementById('cal-next-month');
  const todayBtn = document.getElementById('cal-today-btn');
  const refreshBtn = document.getElementById('cal-refresh-btn');
  
  if (prevBtn) prevBtn.onclick = () => adminChangeCalendarMonth(-1);
  if (nextBtn) nextBtn.onclick = () => adminChangeCalendarMonth(1);
  if (todayBtn) todayBtn.onclick = () => goToToday();
  if (refreshBtn) refreshBtn.onclick = () => loadAdminCalendarData();
  
  // Filter dropdowns
  const employeeFilter = document.getElementById('cal-filter-employee');
  const leaveTypeFilter = document.getElementById('cal-filter-leave-type');
  const statusFilter = document.getElementById('cal-filter-status');
  const clearFiltersBtn = document.getElementById('cal-clear-filters');
  
  if (employeeFilter) {
    employeeFilter.onchange = () => {
      calendarFilters.employee = employeeFilter.value;
      renderCalendarDays();
    };
  }
  
  if (leaveTypeFilter) {
    leaveTypeFilter.onchange = () => {
      calendarFilters.leaveType = leaveTypeFilter.value;
      renderCalendarDays();
    };
  }
  
  if (statusFilter) {
    statusFilter.onchange = () => {
      calendarFilters.status = statusFilter.value;
      renderCalendarDays();
    };
  }
  
  if (clearFiltersBtn) clearFiltersBtn.onclick = () => clearCalendarFilters();
  
  // Modal close
  const modalClose = document.getElementById('cal-modal-close');
  const modalCloseBtn = document.getElementById('cal-modal-close-btn');
  const modalOverlay = document.getElementById('cal-day-modal');
  
  if (modalClose) modalClose.onclick = () => closeCalendarModal();
  if (modalCloseBtn) modalCloseBtn.onclick = () => closeCalendarModal();
  if (modalOverlay) {
    modalOverlay.onclick = (e) => {
      if (e.target === modalOverlay) closeCalendarModal();
    };
  }
}

/**
 * Load calendar data from backend
 */
function loadAdminCalendarData() {
  console.log('Loading calendar data for:', calendarCurrentMonth, calendarCurrentYear);
  showCalendarLoading(true);
  
  google.script.run
    .withSuccessHandler(handleCalendarDataSuccess)
    .withFailureHandler(handleCalendarDataError)
    .getAdminCalendarData(String(calendarCurrentMonth), String(calendarCurrentYear));
}

/**
 * Handle successful calendar data load
 */
function handleCalendarDataSuccess(response) {
  console.log('Calendar data response:', response);
  showCalendarLoading(false);
  
  if (response.startsWith('ERROR:')) {
    showCalendarError(response.replace('ERROR:', ''));
    return;
  }
  
  if (response.startsWith('SUCCESS:')) {
    const dataStr = response.replace('SUCCESS:', '');
    try {
      adminCalendarData = JSON.parse(dataStr);
      calendarSystemBoundaries = {
        start: new Date(adminCalendarData.systemStartDate),
        end: new Date(adminCalendarData.systemEndDate)
      };
      
      console.log('Calendar data parsed successfully');
      updateCalendarHeader();
      populateEmployeeFilter();
      renderCalendarDays();
    } catch (error) {
      console.error('Error parsing calendar data:', error);
      showCalendarError('Failed to parse calendar data');
    }
  }
}

/**
 * Handle calendar data load error
 */
function handleCalendarDataError(error) {
  console.error('Error loading calendar data:', error);
  showCalendarLoading(false);
  showCalendarError('Failed to load calendar data: ' + error.message);
}

/**
 * Show/hide calendar loading state
 */
function showCalendarLoading(show) {
  const loading = document.getElementById('cal-loading');
  const container = document.getElementById('cal-container');
  
  if (loading) loading.style.display = show ? 'flex' : 'none';
  if (container) container.style.display = show ? 'none' : 'block';
}

/**
 * Show calendar error message
 */
function showCalendarError(message) {
  const container = document.getElementById('cal-days-grid');
  if (container) {
    container.innerHTML = `
      <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #e74c3c;">
        <i class="fas fa-exclamation-triangle fa-3x" style="margin-bottom: 15px;"></i>
        <p style="font-size: 1.1em; margin: 0;">${message}</p>
      </div>
    `;
  }
}

/**
 * Update calendar header with current month/year
 */
function updateCalendarHeader() {
  const monthYearElement = document.getElementById('cal-month-year');
  if (monthYearElement) {
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                       'July', 'August', 'September', 'October', 'November', 'December'];
    monthYearElement.textContent = `${monthNames[calendarCurrentMonth - 1]} ${calendarCurrentYear}`;
  }
  updateNavigationButtons();
}

/**
 * Update navigation buttons state
 */
function updateNavigationButtons() {
  if (!calendarSystemBoundaries) return;
  
  const prevBtn = document.getElementById('cal-prev-month');
  const nextBtn = document.getElementById('cal-next-month');
  
  if (prevBtn && nextBtn) {
    const prevMonth = new Date(calendarCurrentYear, calendarCurrentMonth - 2, 1);
    prevBtn.disabled = prevMonth < calendarSystemBoundaries.start;
    
    const nextMonth = new Date(calendarCurrentYear, calendarCurrentMonth, 1);
    nextBtn.disabled = nextMonth > calendarSystemBoundaries.end;
  }
}

/**
 * Change calendar month
 */
function adminChangeCalendarMonth(direction) {
  calendarCurrentMonth += direction;
  
  if (calendarCurrentMonth > 12) {
    calendarCurrentMonth = 1;
    calendarCurrentYear++;
  } else if (calendarCurrentMonth < 1) {
    calendarCurrentMonth = 12;
    calendarCurrentYear--;
  }
  
  loadAdminCalendarData();
}

/**
 * Go to today's month
 */
function goToToday() {
  const today = new Date();
  calendarCurrentMonth = today.getMonth() + 1;
  calendarCurrentYear = today.getFullYear();
  loadAdminCalendarData();
}

/**
 * Populate employee filter dropdown
 */
function populateEmployeeFilter() {
  if (!adminCalendarData || !adminCalendarData.days) return;
  
  const employeeFilter = document.getElementById('cal-filter-employee');
  if (!employeeFilter) return;
  
  const employees = new Set();
  
  adminCalendarData.days.forEach(day => {
    if (day.employeesData) {
      day.employeesData.forEach(emp => {
        if (emp.id && emp.name) employees.add(`${emp.id}|${emp.name}`);
      });
    }
  });
  
  let options = '<option value="all">All Employees</option>';
  
  const sortedEmployees = Array.from(employees).sort((a, b) => {
    const nameA = a.split('|')[1];
    const nameB = b.split('|')[1];
    return nameA.localeCompare(nameB);
  });
  
  sortedEmployees.forEach(emp => {
    const [id, name] = emp.split('|');
    options += `<option value="${id}">${name}</option>`;
  });
  
  employeeFilter.innerHTML = options;
}

/**
 * Clear all calendar filters
 */
function clearCalendarFilters() {
  calendarFilters = { employee: 'all', leaveType: 'all', status: 'all' };
  
  document.getElementById('cal-filter-employee').value = 'all';
  document.getElementById('cal-filter-leave-type').value = 'all';
  document.getElementById('cal-filter-status').value = 'all';
  
  renderCalendarDays();
}

/**
 * Render calendar days grid
 */
function renderCalendarDays() {
  if (!adminCalendarData || !adminCalendarData.days) return;
  
  const grid = document.getElementById('cal-days-grid');
  if (!grid) return;
  
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  const firstDay = new Date(calendarCurrentYear, calendarCurrentMonth - 1, 1);
  const firstDayOfWeek = firstDay.getDay();
  
  grid.innerHTML = '';
  
  // Add empty cells
  for (let i = 0; i < firstDayOfWeek; i++) {
    const emptyCell = document.createElement('div');
    emptyCell.className = 'cal-day cal-day-empty';
    grid.appendChild(emptyCell);
  }
  
  const holidayPeriods = groupOfficialHolidayPeriods();
  
  adminCalendarData.days.forEach(dayData => {
    const dayCell = createDayCell(dayData, today, holidayPeriods);
    grid.appendChild(dayCell);
  });
}

/**
 * Group official holidays into periods
 */
function groupOfficialHolidayPeriods() {
  if (!adminCalendarData || !adminCalendarData.days) return {};
  
  const periods = {};
  
  adminCalendarData.days.forEach((day, index) => {
    if (day.isOfficialHoliday && day.officialHolidayName) {
      const date = new Date(day.date);
      const firstDayOfMonth = new Date(calendarCurrentYear, calendarCurrentMonth - 1, 1);
      const daysSinceStart = Math.floor((date - firstDayOfMonth) / (1000 * 60 * 60 * 24));
      const weekRow = Math.floor((firstDayOfMonth.getDay() + daysSinceStart) / 7);
      const key = `${day.officialHolidayName}_week${weekRow}`;
      
      if (!periods[key]) {
        periods[key] = { name: day.officialHolidayName, weekRow: weekRow, days: [] };
      }
      
      periods[key].days.push(day.date);
    }
  });
  
  return periods;
}

/**
 * Create individual day cell with detailed counts
 */
function createDayCell(dayData, today, holidayPeriods) {
  const dayCell = document.createElement('div');
  dayCell.className = 'cal-day';
  
  const cellDate = new Date(dayData.date + 'T00:00:00'); // Force local timezone
  cellDate.setHours(0, 0, 0, 0);
  
  if (cellDate.getTime() === today.getTime()) {
    dayCell.classList.add('cal-day-today');
  }
  
  if (dayData.isOfficialHoliday) {
    dayCell.classList.add('cal-day-official-holiday');
    
    const date = new Date(dayData.date + 'T00:00:00');
    const firstDayOfMonth = new Date(calendarCurrentYear, calendarCurrentMonth - 1, 1);
    const daysSinceStart = Math.floor((date - firstDayOfMonth) / (1000 * 60 * 60 * 24));
    const weekRow = Math.floor((firstDayOfMonth.getDay() + daysSinceStart) / 7);
    const periodKey = `${dayData.officialHolidayName}_week${weekRow}`;
    
    if (holidayPeriods[periodKey]) {
      const period = holidayPeriods[periodKey];
      const isFirstDayInPeriod = period.days[0] === dayData.date;
      
      if (isFirstDayInPeriod) {
        const box = document.createElement('div');
        box.className = 'cal-day-holiday-box';
        dayCell.appendChild(box);
      }
    }
  }
  
  const dayNumber = document.createElement('div');
  dayNumber.className = 'cal-day-number';
  dayNumber.textContent = dayData.dayNumber;
  dayCell.appendChild(dayNumber);
  
  const dayInfo = document.createElement('div');
  dayInfo.className = 'cal-day-info';
  
  // Get counts from backend data
  const counts = dayData.counts || {
    totalActive: 0,
    working: 0,
    approvedLeaves: 0,
    pendingRequests: 0,
    weeklyHolidays: 0,
    officialHolidayOff: 0
  };
  
  // Apply filters if needed
  const filteredCounts = applyFiltersToCount(dayData, counts);
  
  // Working employees count
  if (filteredCounts.working > 0) {
    const workingDiv = document.createElement('div');
    workingDiv.className = 'cal-day-count cal-day-count-working';
    workingDiv.innerHTML = `<i class="fas fa-user-check"></i> ${filteredCounts.working}`;
    workingDiv.title = `${filteredCounts.working} Working`;
    dayInfo.appendChild(workingDiv);
  }
  
  // Approved leaves count
  if (filteredCounts.approvedLeaves > 0) {
    const approvedDiv = document.createElement('div');
    approvedDiv.className = 'cal-day-stat cal-day-stat-approved';
    approvedDiv.innerHTML = `<i class="fas fa-check-circle"></i> ${filteredCounts.approvedLeaves}`;
    approvedDiv.title = `${filteredCounts.approvedLeaves} Approved Leave${filteredCounts.approvedLeaves > 1 ? 's' : ''}`;
    dayInfo.appendChild(approvedDiv);
  }
  
  // Pending requests count
  if (filteredCounts.pendingRequests > 0) {
    const pendingDiv = document.createElement('div');
    pendingDiv.className = 'cal-day-stat cal-day-stat-pending';
    pendingDiv.innerHTML = `<i class="fas fa-clock"></i> ${filteredCounts.pendingRequests}`;
    pendingDiv.title = `${filteredCounts.pendingRequests} Pending Request${filteredCounts.pendingRequests > 1 ? 's' : ''}`;
    dayInfo.appendChild(pendingDiv);
  }
  
  // Weekly holidays count
  if (filteredCounts.weeklyHolidays > 0) {
    const weeklyDiv = document.createElement('div');
    weeklyDiv.className = 'cal-day-stat cal-day-stat-weekly';
    weeklyDiv.innerHTML = `<i class="fas fa-calendar-week"></i> ${filteredCounts.weeklyHolidays}`;
    weeklyDiv.title = `${filteredCounts.weeklyHolidays} Weekly Holiday${filteredCounts.weeklyHolidays > 1 ? 's' : ''}`;
    dayInfo.appendChild(weeklyDiv);
  }
  
  // Official holiday off count (only if it's an official holiday)
  if (dayData.isOfficialHoliday && filteredCounts.officialHolidayOff > 0) {
    const officialDiv = document.createElement('div');
    officialDiv.className = 'cal-day-stat cal-day-stat-official';
    officialDiv.innerHTML = `<i class="fas fa-star"></i> ${filteredCounts.officialHolidayOff}`;
    officialDiv.title = `${filteredCounts.officialHolidayOff} Off for Official Holiday Only`;
    dayInfo.appendChild(officialDiv);
  }
  
  dayCell.appendChild(dayInfo);
  dayCell.onclick = () => showDayModal(dayData);
  
  return dayCell;
}

/**
 * Apply filters to counts (simplified - backend already provides base counts)
 */
function applyFiltersToCount(dayData, baseCounts) {
  // If no filters applied, return base counts
  if (calendarFilters.employee === 'all' && 
      calendarFilters.leaveType === 'all' && 
      calendarFilters.status === 'all') {
    return baseCounts;
  }
  
  // For filtered view, we need to recalculate based on filtered data
  // This is a simplified version - full logic handled in calculateDayCounts
  const detailedCounts = calculateDayCounts(dayData);
  
  return {
    totalActive: baseCounts.totalActive,
    working: detailedCounts.working,
    approvedLeaves: baseCounts.approvedLeaves, // These stay same as backend provides them
    pendingRequests: baseCounts.pendingRequests,
    weeklyHolidays: baseCounts.weeklyHolidays,
    officialHolidayOff: baseCounts.officialHolidayOff
  };
}

/**
 * Calculate counts for a day
 */
function calculateDayCounts(dayData) {
  const counts = { off: 0, working: 0, pending: 0 };
  
  if (!dayData.employeesData) return counts;
  
  const employeeMap = {};
  
  dayData.employeesData.forEach(empData => {
    if (!employeeMap[empData.id]) {
      employeeMap[empData.id] = {
        id: empData.id,
        name: empData.name,
        leaves: [],
        weeklyHoliday: false,
        officialHoliday: false
      };
    }
    
    const emp = employeeMap[empData.id];
    
    if (empData.type === 'Weekly Holidays') {
      if (empData.value === 'true' || empData.value === true) {
        emp.weeklyHoliday = true;
      }
    } else if (empData.type === 'Official Holidays') {
      if (empData.value === 'Off' || empData.value === '') {
        emp.officialHoliday = true;
      }
    } else if (['Annual Leaves', 'Sick Leaves', 'Emergency Leaves'].includes(empData.type)) {
      if (empData.value) {
        emp.leaves.push({
          type: empData.type,
          status: getStatusFromValue(empData.value)
        });
      }
    }
  });
  
  Object.values(employeeMap).forEach(emp => {
    if (calendarFilters.employee !== 'all' && emp.id !== calendarFilters.employee) {
      return;
    }
    
    let isOff = false;
    let isPending = false;
    
    if (emp.weeklyHoliday) {
      if (!calendarFilters.leaveType || calendarFilters.leaveType === 'all' || calendarFilters.leaveType === 'weekly') {
        isOff = true;
      }
    }
    
    if (emp.officialHoliday && dayData.isOfficialHoliday) {
      if (!calendarFilters.leaveType || calendarFilters.leaveType === 'all' || calendarFilters.leaveType === 'official') {
        isOff = true;
      }
    }
    
    emp.leaves.forEach(leave => {
      const leaveTypeFilter = calendarFilters.leaveType;
      const statusFilter = calendarFilters.status;
      
      let matchesLeaveType = leaveTypeFilter === 'all';
      if (!matchesLeaveType) {
        if (leaveTypeFilter === 'annual' && leave.type === 'Annual Leaves') matchesLeaveType = true;
        if (leaveTypeFilter === 'sick' && leave.type === 'Sick Leaves') matchesLeaveType = true;
        if (leaveTypeFilter === 'emergency' && leave.type === 'Emergency Leaves') matchesLeaveType = true;
      }
      
      let matchesStatus = statusFilter === 'all' || statusFilter === leave.status.toLowerCase();
      
      if (matchesLeaveType && matchesStatus) {
        if (leave.status === 'Approved') {
          isOff = true;
        } else if (leave.status === 'Pending') {
          isPending = true;
        }
      }
    });
    
    if (isOff) {
      counts.off++;
    } else {
      counts.working++;
    }
    
    if (isPending) counts.pending++;
  });
  
  return counts;
}

/**
 * Extract status from value string
 */
function getStatusFromValue(value) {
  const valueStr = String(value).toLowerCase();
  if (valueStr.includes('approved')) return 'Approved';
  if (valueStr.includes('rejected')) return 'Rejected';
  if (valueStr.includes('pending')) return 'Pending';
  return 'Unknown';
}

/**

function showDayModal(dayData) {

/**
 * Organize employees into categories for modal
 */
function organizeEmployeesForModal(dayData) {
  const categories = {
    weeklyHolidays: [],
    officialHolidaysOff: [],
    annualLeaves: { approved: [], rejected: [], pending: [] },
    sickLeaves: { approved: [], rejected: [], pending: [] },
    emergencyLeaves: { approved: [], rejected: [], pending: [] },
    summary: { off: 0, working: 0, pending: 0 }
  };
  
  if (!dayData.employeesData) return categories;
  
  const employeeMap = {};
  
  dayData.employeesData.forEach(empData => {
    if (!employeeMap[empData.id]) {
      employeeMap[empData.id] = {
        id: empData.id,
        name: empData.name,
        weeklyHoliday: false,
        officialHolidayOff: false,
        leaves: []
      };
    }
    
    const emp = employeeMap[empData.id];
    
    if (empData.type === 'Weekly Holidays') {
      if (empData.value === 'true' || empData.value === true) {
        emp.weeklyHoliday = true;
      }
    } else if (empData.type === 'Official Holidays') {
      if (empData.value === 'Off' || empData.value === '') {
        emp.officialHolidayOff = true;
      }
    } else if (['Annual Leaves', 'Sick Leaves', 'Emergency Leaves'].includes(empData.type)) {
      if (empData.value) {
        emp.leaves.push({
          type: empData.type,
          status: getStatusFromValue(empData.value)
        });
      }
    }
  });
  
  Object.values(employeeMap).forEach(emp => {
    let isOff = false;
    let hasPending = false;
    
    if (emp.weeklyHoliday) {
      categories.weeklyHolidays.push(emp.name);
      isOff = true;
    }
    
    if (emp.officialHolidayOff && dayData.isOfficialHoliday) {
      categories.officialHolidaysOff.push(emp.name);
      isOff = true;
    }
    
    emp.leaves.forEach(leave => {
      const status = leave.status.toLowerCase();
      
      if (leave.type === 'Annual Leaves') {
        categories.annualLeaves[status].push({ name: emp.name, status: leave.status });
        if (status === 'approved') isOff = true;
        if (status === 'pending') hasPending = true;
      } else if (leave.type === 'Sick Leaves') {
        categories.sickLeaves[status].push({ name: emp.name, status: leave.status });
        if (status === 'approved') isOff = true;
        if (status === 'pending') hasPending = true;
      } else if (leave.type === 'Emergency Leaves') {
        categories.emergencyLeaves[status].push({ name: emp.name, status: leave.status });
        if (status === 'approved') isOff = true;
        if (status === 'pending') hasPending = true;
      }
    });
    
    if (isOff) {
      categories.summary.off++;
    } else {
      categories.summary.working++;
    }
    
    if (hasPending) categories.summary.pending++;
  });
  
  return categories;
}

  let html = `

  html += `</div></div>`;

/**
 * Build leaves section with status breakdown
 */
function buildLeavesSection(title, icon, leavesData) {
  const total = leavesData.approved.length + leavesData.rejected.length + leavesData.pending.length;
  
  if (total === 0) return '';
  
  let html = `
    <div class="cal-modal-section">
      <div class="cal-modal-section-title">
        <i class="fas fa-${icon}"></i> ${title}
      </div>
      <div class="cal-modal-employee-list">
  `;
  
  leavesData.approved.forEach(emp => {
    html += `
      <div class="cal-modal-employee-item">
        <span class="cal-modal-employee-name">${emp.name}</span>
        <span class="cal-modal-employee-status cal-modal-status-approved">
          <i class="fas fa-check-circle"></i> Approved
        </span>
      </div>
    `;
  });
  
  leavesData.rejected.forEach(emp => {
    html += `
      <div class="cal-modal-employee-item">
        <span class="cal-modal-employee-name">${emp.name}</span>
        <span class="cal-modal-employee-status cal-modal-status-rejected">
          <i class="fas fa-times-circle"></i> Rejected
        </span>
      </div>
    `;
  });
  
  leavesData.pending.forEach(emp => {
    html += `
      <div class="cal-modal-employee-item">
        <span class="cal-modal-employee-name">${emp.name}</span>
        <span class="cal-modal-employee-status cal-modal-status-pending">
          <i class="fas fa-clock"></i> Pending
        </span>
      </div>
    `;
  });
  
  html += `</div></div>`;
  
  return html;
}

/**
 * Close day modal
 */
function closeCalendarModal() {
  const modal = document.getElementById('cal-day-modal');
  if (modal) modal.style.display = 'none';
}

/**
 * Initialize calendar for leave requests tab
 */
function initializeCalendarForLeaveRequestsTab() {
  const calendarSubTabButton = document.querySelector('.leave-sub-tab-button[data-subtab="calendar"]');
  
  if (calendarSubTabButton) {
    calendarSubTabButton.disabled = false;
    
    calendarSubTabButton.addEventListener('click', function() {
      setTimeout(() => {
        const calendarPane = document.getElementById('calendar');
        if (calendarPane && calendarPane.classList.contains('active')) {
          loadCalendarSubTab();
        }
      }, 100);
    });
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  initializeCalendarForLeaveRequestsTab();
});
</script>
