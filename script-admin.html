/**
 * NEW: Check for changes in day-by-day assignments
 */
function checkForDayByDayChanges() {
    const changes = [];
    
    activeEmployeesData.forEach(employee => {
        const currentWorkingDays = [];
        
        // Get current state from buttons
        const employeeButtons = document.querySelectorAll(`[data-employee-id="${employee.id}"]`);
        employeeButtons.forEach(button => {
            if (button.classList.contains('working')) {
                const dayIndex = parseInt(button.getAttribute('data-day'));
                currentWorkingDays.push(dayIndex);
            }
        });
        
        // Compare with original
        const originalAssignment = originalAssignments.find(a => a.id == employee.id);
        const originalWorkingDays = originalAssignment ? (originalAssignment.workingDays || []) : [];
        
        // Check if different
        if (JSON.stringify(currentWorkingDays.sort()) !== JSON.stringify(originalWorkingDays.sort())) {
            changes.push({
                employeeId: employee.id,
                employeeName: employee.name,
                oldDays: originalWorkingDays,
                newDays: currentWorkingDays
            });
        }
    });
    
    // Update changes summary
    const changesSummary = document.getElementById('changesSummary');
    const changesList = document.getElementById('changesList');
    const saveButtons = [
        document.getElementById('saveNotifyLaterBtn'),
        document.getElementById('saveNotifyNowBtn')
    ];
    
    if (changes.length > 0) {
        changesSummary.style.display = 'block';
        
        let changesHtml = '<ul class="changes-list">';
        changes.forEach(change => {
            const oldText = change.oldDays.length > 0 ? `Days ${change.oldDays.join(',')}` : 'All Off';
            const newText = change.newDays.length > 0 ? `Days ${change.newDays.join(',')}` : 'All Off';
            
            changesHtml += `
                <li class="change-item">
                    <strong>${change.employeeName}:</strong> ${oldText} → ${newText}
                </li>
            `;
        });
        changesHtml += '</ul>';
        
        changesList.innerHTML = changesHtml;
        
        // Enable save buttons
        saveButtons.forEach(btn => {
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('disabled');
            }
        });
        
    } else {
        changesSummary.style.display = 'none';
        
        // Disable save buttons
        saveButtons.forEach(btn => {
            if (btn) {
                btn.disabled = true;
                btn.classList.add('disabled');
            }
        });
    }
}

/**
 * NEW: Save day-by-day assignments
 */
function saveDayByDayAssignments(sendNotifications) {
    const adminEmail = getCurrentAdminEmail();
    if (!adminEmail) {
        showToast('Session expired. Please login again.', 'error');
        return;
    }
    
    // Collect assignments
    const employees = [];
    const changedEmployees = [];
    
    activeEmployeesData.forEach(employee => {
        const workingDays = [];
        
        // Get working days from buttons
        const employeeButtons = document.querySelectorAll(`[data-employee-id="${employee.id}"]`);
        employeeButtons.forEach(button => {
            if (button.classList.contains('working')) {
                const dayIndex = parseInt(button.getAttribute('data-day'));
                workingDays.push(dayIndex);
            }
        });
        
        employees.push({
            id: employee.id,
            name: employee.name,
            email: employee.email,
            workingDays: workingDays
        });
        
        // Check if changed
        const originalAssignment = originalAssignments.find(a => a.id == employee.id);
        const originalWorkingDays = originalAssignment ? (originalAssignment.workingDays || []) : [];
        
        if (JSON.stringify(workingDays.sort()) !== JSON.stringify(originalWorkingDays.sort())) {
            changedEmployees.push(employee.id);
        }
    });
    
    // Show loading
    const saveButtons = [
        document.getElementById('saveNotifyLaterBtn'),
        document.getElementById('saveNotifyNowBtn')
    ];
    
    saveButtons.forEach(btn => {
        if (btn) {
            setButtonLoading(btn, true, sendNotifications ? 'Saving & Sending...' : 'Saving...');
        }
    });
    
    const assignmentData = {
        holidayIndex: currentHolidayIndex,
        employees: employees,
        changedEmployees: changedEmployees,
        isFirstAssignment: originalAssignments.length === 0,
        sendNotifications: sendNotifications
    };
    
    google.script.run
        .withSuccessHandler(function(result) {
            saveButtons.forEach(btn => {
                if (btn) setButtonLoading(btn, false);
            });
            
            if (result.success) {
                showToast('Day-by-day assignments saved successfully', 'success');
                closeAssignmentModal();
                loadOfficialHolidaysSubTab(); // Reload table
            } else {
                showToast('Failed to save assignments: ' + result.error, 'error');
            }
        })
        .withFailureHandler(function(error) {
            console.error('Error saving assignments:', error);
            saveButtons.forEach(btn => {
                if (btn) setButtonLoading(btn, false);
            });
            showToast('Error saving assignments: ' + error.message, 'error');
        })
        .saveHolidayAssignments(assignmentData, adminEmail);
}

/**
 * Check for assignment changes and update UI
 */
function checkForChanges() {
    const toggleButtons = document.querySelectorAll('.employee-toggle');
    const changes = [];
    
    toggleButtons.forEach(button => {
        const employeeId = button.getAttribute('data-employee-id');
        const currentStatus = button.getAttribute('data-status');
        
        // Find original assignment
        const originalAssignment = originalAssignments.find(a => a.id == employeeId);
        const originalStatus = originalAssignment ? originalAssignment.status : 'day-off';
        
        if (currentStatus !== originalStatus) {
            const employee = activeEmployeesData.find(e => e.id == employeeId);
            changes.push({
                employeeId: employeeId,
                employeeName: employee ? employee.name : `ID ${employeeId}`,
                oldStatus: originalStatus,
                newStatus: currentStatus
            });
        }
    });
    
    // Update changes summary
    const changesSummary = document.getElementById('changesSummary');
    const changesList = document.getElementById('changesList');
    const saveButtons = [
        document.getElementById('saveNotifyLaterBtn'),
        document.getElementById('saveNotifyNowBtn')
    ];
    
    if (changes.length > 0) {
        changesSummary.style.display = 'block';
        
        let changesHtml = '<ul class="changes-list">';
        changes.forEach(change => {
            const oldStatusIcon = change.oldStatus === 'working day' ? '💼' : '🏠';
            const newStatusIcon = change.newStatus === 'working day' ? '💼' : '🏠';
            
            changesHtml += `
                <li class="change-item">
                    <strong>${change.employeeName}</strong>: 
                    <span class="status-change">
                        ${oldStatusIcon} ${change.oldStatus} → ${newStatusIcon} ${change.newStatus}
                    </span>
                </li>
            `;
        });
        changesHtml += '</ul>';
        
        changesList.innerHTML = changesHtml;
        
        // Enable save buttons
        saveButtons.forEach(btn => {
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('disabled');
            }
        });
        
    } else {
        changesSummary.style.display = 'none';
        
        // Disable save buttons
        saveButtons.forEach(btn => {
            if (btn) {
                btn.disabled = true;
                btn.classList.add('disabled');
            }
        });
    }
}

/**
 * Save assignments with or without notifications
 */
function saveAssignments(sendNotifications) {
    const adminEmail = getCurrentAdminEmail();
    if (!adminEmail) {
        showToast('Session expired. Please login again.', 'error');
        return;
    }
    
    // Collect current assignments
    const toggleButtons = document.querySelectorAll('.employee-toggle');
    const employees = [];
    const changedEmployees = [];
    
    toggleButtons.forEach(button => {
        const employeeId = button.getAttribute('data-employee-id');
        const currentStatus = button.getAttribute('data-status');
        const employee = activeEmployeesData.find(e => e.id == employeeId);
        
        if (employee) {
            employees.push({
                id: employeeId,
                name: employee.name,
                email: employee.email,
                status: currentStatus
            });
            
            // Check if this employee's assignment changed
            const originalAssignment = originalAssignments.find(a => a.id == employeeId);
            const originalStatus = originalAssignment ? originalAssignment.status : 'day-off';
            
            if (currentStatus !== originalStatus) {
                changedEmployees.push(employeeId);
            }
        }
    });
    
    // Disable buttons and show loading
    const saveButtons = [
        document.getElementById('saveNotifyLaterBtn'),
        document.getElementById('saveNotifyNowBtn')
    ];
    
    saveButtons.forEach(btn => {
        if (btn) {
            setButtonLoading(btn, true, sendNotifications ? 'Saving & Sending...' : 'Saving...');
        }
    });
    
    const assignmentData = {
        holidayIndex: currentHolidayIndex,
        employees: employees,
        changedEmployees: changedEmployees,
        isFirstAssignment: originalAssignments.length === 0,
        sendNotifications: sendNotifications
    };
    
    google.script.run
        .withSuccessHandler(function(result) {
            saveButtons.forEach(btn => {
                if (btn) setButtonLoading(btn, false);
            });
            
            if (result.success) {
                let message = 'Holiday assignments saved successfully';
                
                if (sendNotifications && result.notificationResult) {
                    if (result.notificationResult.success) {
                        message += '. All notifications sent successfully.';
                    } else {
                        message += `, but some notifications failed: ${result.notificationResult.results?.errors?.join(', ') || 'Unknown error'}`;
                    }
                }
                
                showToast(message, result.notificationResult?.success !== false ? 'success' : 'warning');
                closeAssignmentModal();
                
                // Reload holidays table
                loadOfficialHolidaysSubTab();
                
            } else {
                showToast('Failed to save assignments: ' + result.error, 'error');
            }
        })
        .withFailureHandler(function(error) {
            console.error('Error saving assignments:', error);
            saveButtons.forEach(btn => {
                if (btn) setButtonLoading(btn, false);
            });
            showToast('Error saving assignments: ' + error.message, 'error');
        })
        .saveHolidayAssignments(assignmentData, adminEmail);
}

function handleHelperCardResponse(response) {

    if (response && typeof response === 'string') {
        if (response.startsWith('SUCCESS:')) {

                console.log(`📊 Parsed: ${missingCount} missing out of ${totalCount} total`);
                showHelperCardStatus(missingCount, totalCount, missingNames);
            } else {
                showHelperCardError('Invalid response format');
                clearNotificationBadges(); // Clear badges on error
            }
        } else if (response.startsWith('ERROR:')) {
            const errorMessage = response.replace('ERROR:', '');
            showHelperCardError(errorMessage);
            clearNotificationBadges(); // Clear badges on error
        } else {
            showHelperCardError('Unknown response format');
            clearNotificationBadges(); // Clear badges on error
        }
    } else {
        showHelperCardError('Invalid response type');
        clearNotificationBadges(); // Clear badges on error
    }

/**
 * Parse employees string format for weekly holidays - CORRECTED MAPPING
 */
function parseEmployeesStringForWeeklyHolidays(employeesString) {
    try {
        const employees = [];
        
        // Split by semicolon (based on admin.gs format)
        const employeeArray = employeesString.split(';').filter(item => item.trim() !== '');
        
        employeeArray.forEach(empStr => {
            // Split by pipe character
            const parts = empStr.split('|').map(part => part.trim());
            
            if (parts.length >= 3) {
                employees.push({
                    id: parts[2] || '',           // Employee ID is in parts[2] 
                    name: parts[0] || '',         // Employee Name is in parts[0]
                    email: parts[1] || '',        // Employee Email is in parts[1]
                    displayText: parts[0] + '-' + parts[2] // Name-ID format
                });
            }
        });
        
        console.log('Parsed employees:', employees.length);
        return employees;
        
    } catch (error) {
        console.error('Error parsing employees string:', error);
        return [];
    }
}

/**
 * Get status icon based on status
 */
function getStatusIcon(status) {
    switch (status.toLowerCase()) {
        case 'active':
            return '<i class="fas fa-check-circle"></i>';
        case 'inactive':
            return '<i class="fas fa-pause-circle"></i>';
        case 'expired':
            return '<i class="fas fa-times-circle"></i>';
        default:
            return '<i class="fas fa-question-circle"></i>';
    }
}

/**
 * Format holiday days for display
 */
function formatHolidayDaysForDisplay(holidayDaysStr) {
    if (!holidayDaysStr) return '<em>None</em>';
    
    const days = holidayDaysStr.split(',').filter(day => day.trim() !== '');
    if (days.length === 0) return '<em>None</em>';
    
    // Use short day names
    const dayAbbr = {
        'Friday': 'Fri',
        'Saturday': 'Sat',
        'Sunday': 'Sun',
        'Monday': 'Mon',
        'Tuesday': 'Tue',
        'Wednesday': 'Wed',
        'Thursday': 'Thu'
    };
    
    return days.map(day => `<span class="day-badge">${dayAbbr[day] || day}</span>`).join(' ');
}

/**
 * Validate weekly holiday form
 */
function validateWeeklyHolidayForm() {
    const employeeId = document.getElementById('weeklyHolidayEmployeeId').value;
    const startDate = document.getElementById('weeklyHolidayStartDate').value;
    const endDate = document.getElementById('weeklyHolidayEndDate').value;
    const periodType = document.getElementById('weeklyHolidayPeriodType').value;
    
    // Get selected holiday days
    const selectedDays = [];
    const dayButtons = document.querySelectorAll('.holiday-day-toggle.active');
    dayButtons.forEach(button => {
        selectedDays.push(button.getAttribute('data-day'));
    });
    
    const validationMsg = document.getElementById('weeklyHolidayValidationMsg');
    
    // Validate required fields
    if (!employeeId) {
        validationMsg.textContent = 'Please select an employee.';
        return false;
    }
    
    if (!startDate) {
        validationMsg.textContent = 'Please select a start date.';
        return false;
    }
    
    if (periodType === 'temp' && !endDate) {
        validationMsg.textContent = 'End date is required for temporary periods.';
        return false;
    }
    
    if (selectedDays.length === 0) {
        validationMsg.textContent = 'Please select at least one holiday day.';
        return false;
    }
    
    // Validate date range
    if (periodType === 'temp' && endDate) {
        const startDateObj = new Date(startDate);
        const endDateObj = new Date(endDate);
        
        if (endDateObj <= startDateObj) {
            validationMsg.textContent = 'End date must be after start date.';
            return false;
        }
    }
    
    validationMsg.textContent = '';
    return true;
}

/**
 * Delete weekly holiday period - FIXED BUTTON TARGETING AND MODAL DISPLAY
 */
function deleteWeeklyHolidayPeriod(periodId, employeeName) {
    console.log('🗑️ Deleting weekly holiday period:', periodId);
    
    const adminEmail = getCurrentAdminEmail();
    if (!adminEmail) {
        showToast('Session expired. Please login again.', 'error');
        return;
    }
    
    // Find the delete button by looking for the specific periodId in onclick attribute
    const allRows = document.querySelectorAll('.period-row');
    let targetButton = null;
    
    allRows.forEach(row => {
        const deleteBtn = row.querySelector('.action-btn.delete');
        if (deleteBtn) {
            const onclickValue = deleteBtn.getAttribute('onclick') || '';
            if (onclickValue.includes(`'${periodId}'`)) {
                targetButton = deleteBtn;
            }
        }
    });
    
    // Set loading state on the specific delete button
    if (targetButton) {
        targetButton.disabled = true;
        targetButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        targetButton.style.opacity = '0.6';
        targetButton.style.cursor = 'not-allowed';
    }
    
    google.script.run
        .withSuccessHandler(response => {
            // Reset button state first
            if (targetButton) {
                targetButton.disabled = false;
                targetButton.innerHTML = '<i class="fas fa-trash"></i>';
                targetButton.style.opacity = '1';
                targetButton.style.cursor = 'pointer';
            }
            
            if (response && response.success) {
                showToast(`${employeeName}'s weekly holiday period deleted successfully`, 'success');
                // Refresh the table to show updated data
                refreshWeeklyHolidaysTable();
            } else {
                showToast(response.error || 'Error deleting period', 'error');
            }
        })
        .withFailureHandler(error => {
            // Reset button state first
            if (targetButton) {
                targetButton.disabled = false;
                targetButton.innerHTML = '<i class="fas fa-trash"></i>';
                targetButton.style.opacity = '1';
                targetButton.style.cursor = 'pointer';
            }
            
            console.error('Script execution failed:', error);
            showToast('System error occurred while deleting period', 'error');
        })
        .deleteWeeklyHolidayPeriod(periodId, adminEmail);
}

/**
 * Handle badge data response (simplified - only updates badges)
 */
function handleBadgeDataResponse(response) {
    console.log('📊 Processing badge data:', response);
    
    // Parse the simple string response format
    if (response && typeof response === 'string') {
        if (response.startsWith('SUCCESS:')) {
            const data = response.replace('SUCCESS:', '');
            const parts = data.split('|');
            
            if (parts.length >= 2) {
                const missingCount = parseInt(parts[0]) || 0;
                console.log(`🔔 Badge data parsed: ${missingCount} missing employees`);
                
                // Update badges immediately
                updateNotificationBadges(missingCount);
                
            } else {
                console.warn('⚠️ Invalid badge data format');
                clearNotificationBadges();
            }
        } else if (response.startsWith('ERROR:')) {
            console.warn('⚠️ Badge data error:', response.replace('ERROR:', ''));
            clearNotificationBadges();
        } else {
            console.warn('⚠️ Unknown badge data format:', response);
            clearNotificationBadges();
        }
    } else {
        console.warn('⚠️ Invalid badge data response type');
        clearNotificationBadges();
    }
}

    const respondSubtab = document.getElementById('respond');
    const isRespondTabActive = respondSubtab && respondSubtab.classList.contains('active');
    
    // Only show cards on respond subtab
    if (!isRespondTabActive) {
        cardsContainer.style.display = 'none';
        return;
    } else {
        cardsContainer.style.display = 'grid';
    }
    
    const cards = [
        {
            id: 'all',
            title: 'All Requests',
            icon: 'fas fa-list',
            color: '#3498db',
            total: counts.all?.total || 0,
            responded: counts.all?.responded || 0
        },
        {
            id: 'annual',
            title: 'Annual Leave',
            icon: 'fas fa-calendar-alt',
            color: '#27ae60',
            total: counts.annual?.total || 0,
            responded: counts.annual?.responded || 0
        },
        {
            id: 'sick',
            title: 'Sick Leave',
            icon: 'fas fa-user-md',
            color: '#e74c3c',
            total: counts.sick?.total || 0,
            responded: counts.sick?.responded || 0
        },
        {
            id: 'emergency',
            title: 'Emergency Leave',
            icon: 'fas fa-exclamation-triangle',
            color: '#f39c12',
            total: counts.emergency?.total || 0,
            responded: counts.emergency?.responded || 0
        }
    ];
    
    cardsContainer.innerHTML = cards.map(card => {
        const pending = card.total - card.responded;
        const hasPending = pending > 0;
        
        return `
            <div class="leave-request-card ${currentLeaveFilter === card.id ? 'active' : ''}" 
                 onclick="filterLeaveRequestsByType('${card.id}')" 
                 data-filter="${card.id}">
                <div class="card-header">
                    <i class="${card.icon}"></i>
                    ${hasPending ? `<span class="pending-badge">${pending}</span>` : ''}
                </div>
                <div class="card-body">
                    <h3>${card.title}</h3>
                    <div class="card-stats">
                        <div class="stat-main">${card.total}</div>
                        <div class="stat-label">Total Requests</div>
                        <div class="stat-secondary">${card.responded} responded</div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

/**
 * Update response form state based on selections
 */
function updateResponseFormState() {
    const status = document.getElementById('responseStatus').value;
    const approvedDatesField = document.getElementById('approvedDates');
    const rejectedDatesField = document.getElementById('rejectedDates');
    const approvedDurationField = document.getElementById('approvedDuration');
    const rejectedDurationField = document.getElementById('rejectedDuration');
    
    // Reset required states
    [approvedDatesField, rejectedDatesField, approvedDurationField, rejectedDurationField].forEach(field => {
        if (field) field.required = false;
    });
    
    // Set requirements based on status
    switch (status) {
        case 'Approved':
            if (approvedDatesField) approvedDatesField.required = true;
            if (approvedDurationField) approvedDurationField.required = true;
            break;
        case 'Rejected':
            if (rejectedDatesField) rejectedDatesField.required = true;
            if (rejectedDurationField) rejectedDurationField.required = true;
            break;
        case 'Partially approved':
            if (approvedDatesField) approvedDatesField.required = true;
            if (rejectedDatesField) rejectedDatesField.required = true;
            if (approvedDurationField) approvedDurationField.required = true;
            if (rejectedDurationField) rejectedDurationField.required = true;
            break;
    }
}

            loadLeaveRequestsTable(currentLeaveFilter);
            loadLeaveRequestCounts();
        })
        .sendLeaveResponseNotification(requestId, adminEmail, 'true');
}

/**
 * Helper function to get leave type color
 */
function getLeaveTypeColor(leaveType) {
    switch (leaveType.toLowerCase()) {
        case 'annual': return '#27ae60';
        case 'sick': return '#f39c12';
        case 'emergency': return '#e74c3c';
        default: return '#3498db';
    }
}

/**
 * Helper function to get status class
 */
function getStatusClass(status) {
    const statusLower = status.toLowerCase();
    if (statusLower.includes('approved') && !statusLower.includes('partial')) return 'status-approved';
    if (statusLower.includes('rejected')) return 'status-rejected';
    if (statusLower.includes('partial')) return 'status-partial';
    return 'status-pending';
}

/**
 * Helper function to check if request is urgent
 */
function isUrgentRequest(request) {
    if (request.leaveType === 'Annual') {
        // Annual leave is urgent if start date is within 7 days
        const startDate = new Date(request.startDate);
        const today = new Date();
        const diffDays = Math.ceil((startDate - today) / (1000 * 60 * 60 * 24));
        return diffDays <= 7 && diffDays >= 0 && request.isPending;
    }
    
    // Sick and emergency leaves are always urgent if pending
    return request.isPending;
}

/**
 * Handle response type selection
 */
function selectResponseType(type) {
    // Remove active class from all buttons
    document.querySelectorAll('.response-toggle-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Add active class to selected button
    const activeBtn = document.getElementById(type === 'approve' ? 'approveAllBtn' : 
                                           type === 'reject' ? 'rejectAllBtn' : 'selectDaysBtn');
    if (activeBtn) {
        activeBtn.classList.add('active');
    }
    
    const daySelectionSection = document.getElementById('daySelectionSection');
    
    if (type === 'partial') {
        // Show day selection
        if (daySelectionSection) {
            daySelectionSection.style.display = 'block';
            generateDayToggleButtons();
        }
        document.getElementById('responseStatus').value = 'Partially approved';
    } else {
        // Hide day selection
        if (daySelectionSection) {
            daySelectionSection.style.display = 'none';
        }
        
        if (type === 'approve') {
            selectedDays = [...currentRequestDays];
            document.getElementById('responseStatus').value = 'Approved';
        } else {
            selectedDays = [];
            document.getElementById('responseStatus').value = 'Rejected';
        }
    }
    
    // Update calculations
    updateCalculations();
}

 * Generate day toggle buttons

/**
 * Generate day toggle buttons (FIXED)
 */
function generateDayToggleButtons() {
    const container = document.getElementById('dayToggleButtons');
    if (!container) {
        console.error('dayToggleButtons container not found');
        return;
    }
    
    if (!currentRequestDays || currentRequestDays.length === 0) {
        console.error('No request days available');
        container.innerHTML = '<p>No days to display</p>';
        return;
    }
    
    console.log('Generating buttons for days:', currentRequestDays);
    
    container.innerHTML = currentRequestDays.map(day => {
        const date = new Date(day + 'T00:00:00'); // Add time to avoid timezone issues
        const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
        const dayNum = date.getDate();
        const isHoliday = isWeeklyHoliday(date, weeklyHolidayDay);
        
        return `
            <button type="button" class="day-toggle ${isHoliday ? 'holiday' : ''}" 
                    data-date="${day}" onclick="toggleDay('${day}')">
                <div>${dayName}</div>
                <div>${dayNum}</div>
            </button>
        `;
    }).join('');
    
    console.log('Day buttons generated successfully');
}

/**
 * Toggle individual day selection
 */
function toggleDay(dateStr) {
    const index = selectedDays.indexOf(dateStr);
    const button = document.querySelector(`[data-date="${dateStr}"]`);
    
    if (index === -1) {
        selectedDays.push(dateStr);
        button.classList.add('selected');
    } else {
        selectedDays.splice(index, 1);
        button.classList.remove('selected');
    }
    
    updateCalculations();
}

/**
 * Update real-time calculations
 */
function updateCalculations() {
    const approvedCount = selectedDays.length;
    const rejectedCount = currentRequestDays.length - approvedCount;
    const holidaysInApproved = selectedDays.filter(day => 
        isWeeklyHoliday(new Date(day), weeklyHolidayDay)
    ).length;
    
    // Update display
    document.getElementById('approvedCount').textContent = approvedCount;
    document.getElementById('rejectedCount').textContent = rejectedCount;
    document.getElementById('holidaysCount').textContent = holidaysInApproved;
    
    // Update hidden fields
    document.getElementById('approvedDuration').value = approvedCount;
    document.getElementById('rejectedDuration').value = rejectedCount;
    document.getElementById('weeklyHolidaysInApproved').value = holidaysInApproved;
    
    // Generate date strings
    const approvedDates = approvedCount === currentRequestDays.length ? 'ALL' :
                         approvedCount === 0 ? 'None' :
                         selectedDays.sort().join(',');
    
    const rejectedDates = rejectedCount === currentRequestDays.length ? 'ALL' :
                         rejectedCount === 0 ? 'None' :
                         currentRequestDays.filter(day => !selectedDays.includes(day)).sort().join(',');
    
    document.getElementById('approvedDates').value = approvedDates;
    document.getElementById('rejectedDates').value = rejectedDates;
}

/**
 * Generate array of dates between start and end (FIXED for proper date parsing)
 */
function generateRequestDays(startDate, endDate) {
    const days = [];
    
    console.log('Input dates - Start:', startDate, 'End:', endDate);
    
    // Parse dates from various formats (handle Google Sheets date formats)
    let start, end;
    
    // If it's already a Date object
    if (startDate instanceof Date) {
        start = new Date(startDate);
    } else if (typeof startDate === 'string') {
        // Handle different string formats
        if (startDate.includes('/')) {
            // Format: MM/DD/YYYY or DD/MM/YYYY
            start = new Date(startDate);
        } else if (startDate.includes('-')) {
            // Format: YYYY-MM-DD
            start = new Date(startDate + 'T00:00:00');
        } else {
            // Try to parse as is
            start = new Date(startDate);
        }
    } else {
        // Handle number (Excel serial date) or other formats
        start = new Date(startDate);
    }
    
    if (endDate instanceof Date) {
        end = new Date(endDate);
    } else if (typeof endDate === 'string') {
        if (endDate.includes('/')) {
            end = new Date(endDate);
        } else if (endDate.includes('-')) {
            end = new Date(endDate + 'T00:00:00');
        } else {
            end = new Date(endDate);
        }
    } else {
        end = new Date(endDate);
    }
    
    console.log('Parsed dates - Start:', start, 'End:', end);
    
    // Validate dates
    if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        console.error('Invalid dates provided:', { startDate, endDate, start, end });
        return [];
    }
    
    // Ensure start is not after end
    if (start > end) {
        console.error('Start date is after end date');
        return [];
    }
    
    // Generate days inclusive of both start and end dates
    const current = new Date(start);
    while (current <= end) {
        // Format as YYYY-MM-DD
        const year = current.getFullYear();
        const month = String(current.getMonth() + 1).padStart(2, '0');
        const day = String(current.getDate()).padStart(2, '0');
        days.push(`${year}-${month}-${day}`);
        
        current.setDate(current.getDate() + 1);
    }
    
    console.log('Generated days:', days);
    return days;
}

    if (!card) return;
    
    const safeHolidayId = holidayName.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
    const holiday = holidaysCardData.find(h => h.name === holidayName);
    const assignments = currentCardAssignments[holidayName];
    
    if (!holiday || !assignments) return;
    
    // Calculate working/off count per day
    const dayWorkingCounts = {};
    const dayOffCounts = {};
    
    // Initialize counts for each day
    holiday.dates.forEach((dateStr, index) => {
        dayWorkingCounts[index + 1] = 0;
        dayOffCounts[index + 1] = 0;
    });
    
    // Count employees per day
    Object.values(assignments).forEach(assignment => {
        holiday.dates.forEach((dateStr, index) => {
            const dayNum = index + 1;
            if (assignment.workingDays && assignment.workingDays.includes(dateStr)) {
                dayWorkingCounts[dayNum]++;
            } else {
                dayOffCounts[dayNum]++;
            }
        });
    });
    
    // Update day labels and counts
    const workingDaysEl = document.getElementById(`working-days-${safeHolidayId}`);
    const dayoffDaysEl = document.getElementById(`dayoff-days-${safeHolidayId}`);
    const workingCountsEl = document.getElementById(`working-counts-${safeHolidayId}`);
    const dayoffCountsEl = document.getElementById(`dayoff-counts-${safeHolidayId}`);
    
    if (workingDaysEl) {
        workingDaysEl.innerHTML = holiday.dates.map((_, index) => {
            const dayNum = index + 1;
            return `<div class="oh-card-day-label">Day ${dayNum}</div>`;
        }).join('');
    }
    
    if (dayoffDaysEl) {
        dayoffDaysEl.innerHTML = holiday.dates.map((_, index) => {
            const dayNum = index + 1;
            return `<div class="oh-card-day-label">Day ${dayNum}</div>`;
        }).join('');
    }
    
    if (workingCountsEl) {
        workingCountsEl.innerHTML = holiday.dates.map((_, index) => {
            const dayNum = index + 1;
            const count = dayWorkingCounts[dayNum];
            return `<div class="oh-card-day-count">${count}</div>`;
        }).join('');
    }
    
    if (dayoffCountsEl) {
        dayoffCountsEl.innerHTML = holiday.dates.map((_, index) => {
            const dayNum = index + 1;
            const count = dayOffCounts[dayNum];
            return `<div class="oh-card-day-count">${count}</div>`;
        }).join('');
    }
}

function handleNetworkError(error, context = '') {
    console.error(`🌐 Network error ${context}:`, error);

    if (error.message && error.message.includes('timeout')) {

/**
 * Validate card data before processing
 */
function validateCardData(holidayData) {
    if (!holidayData || typeof holidayData !== 'object') {
        console.error('❌ Invalid holiday data:', holidayData);
        return false;
    }
    
    const requiredFields = ['name', 'startDate', 'endDate', 'duration'];
    for (const field of requiredFields) {
        if (!holidayData[field] && holidayData[field] !== 0) {
            console.error(`❌ Missing required field: ${field}`, holidayData);
            return false;
        }
    }
    
    return true;
}

/**
 * Validate employee assignment data
 */
function validateAssignmentData(assignments) {
    if (!assignments || typeof assignments !== 'object') {
        console.error('❌ Invalid assignment data:', assignments);
        return false;
    }
    
    // Check if all assignments have required properties
    for (const [employeeId, assignment] of Object.entries(assignments)) {
        if (!assignment.status || !['Work', 'Off'].includes(assignment.status)) {
            console.error(`❌ Invalid assignment status for employee ${employeeId}:`, assignment);
            return false;
        }
        
        if (!Array.isArray(assignment.workingDays)) {
            console.error(`❌ Invalid workingDays for employee ${employeeId}:`, assignment);
            return false;
        }
    }
    
    return true;
}

/**
 * Debounce function to limit rapid successive calls
 */
function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

/**
 * Throttle function to limit function calls
 */
function throttle(func, limit) {
    let inThrottle;
    return function() {
        const args = arguments;
        const context = this;
        if (!inThrottle) {
            func.apply(context, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
}

function restoreRequestState(request) {
    const requestId = request.id;
    
    // Set initial card state (collapsed for responded, expanded for pending)
    cardExpandedStates.set(requestId, request.isPending);
    
    // Restore day responses if any exist
    if (!request.isPending) {
        if (!dayResponsesMap.has(requestId)) {
            dayResponsesMap.set(requestId, new Map());
        }
        
        const requestResponsesMap = dayResponsesMap.get(requestId);
        
        // Restore individual day responses
        request.days.forEach(day => {
            if (day.responseStatus && day.responseStatus !== 'Pending') {
                requestResponsesMap.set(day.date, day.responseStatus);
            }
        });
        
        // Restore control button state based on response pattern
        const approvedDays = request.days.filter(day => day.responseStatus === 'Approved').length;
        const rejectedDays = request.days.filter(day => day.responseStatus === 'Rejected').length;
        const totalDays = request.days.length;
        
        if (!controlButtonStates.has(requestId)) {
            controlButtonStates.set(requestId, { mode: null, editable: false });
        }
        
        const controlState = controlButtonStates.get(requestId);
        
        if (approvedDays === totalDays) {
            controlState.mode = 'approve-all';
            controlState.editable = false;
        } else if (rejectedDays === totalDays) {
            controlState.mode = 'reject-all';
            controlState.editable = false;
        } else if (approvedDays > 0 || rejectedDays > 0) {
            controlState.mode = 'select';
            controlState.editable = true;
        }
    }
}

/**

 */
function getResponseSummary(request) {
    if (request.responseStatus === 'Pending') {
        return 'Awaiting admin response';
    }
    
    const approvedCount = parseInt(request.approvedDuration);
    const rejectedCount = parseInt(request.rejectedDuration);
    
    if (request.responseStatus === 'Approved') {
        return `${approvedCount} days approved`;
    } else if (request.responseStatus === 'Rejected') {
        return `${rejectedCount} days rejected`;
    } else if (request.responseStatus === 'Partially approved') {
        return `${approvedCount} approved, ${rejectedCount} rejected`;

    return '';

function toggleCardState(requestId) {
    const currentState = cardExpandedStates.get(requestId);
    const newState = !currentState;
    
    cardExpandedStates.set(requestId, newState);
    
    // Re-render the specific card
    const request = currentLeaveRequestsNew.find(req => req.id === requestId);
    if (!request) return;
    
    const currentCard = document.querySelector(`[data-request-id="${requestId}"]`);
    if (!currentCard) return;
    
    const newCardHTML = newState ? createExpandedCard(request) : createCollapsedCard(request);
    currentCard.outerHTML = newCardHTML;
    
    // Add longer delay and null checks for expanded cards
    if (newState) {
        setTimeout(() => {
            // Check if elements exist before restoring states
            const expandedCard = document.querySelector(`[data-request-id="${requestId}"]`);
            if (expandedCard) {
                restoreButtonStates(requestId);

                preloadWorkingOffCounts(request);

    if (!requestCard) {

    if (controlState && controlState.mode) {

        if (controlButtons.length > 0) {

            const activeButton = requestCard.querySelector(`.${controlState.mode}`);

                activeButton.classList.add('active');

        setCalendarEditable(requestId, controlState.editable);
    }
    
    // Restore decision button states
    const responses = dayResponsesMap.get(requestId);
    if (responses && responses.size > 0) {
        responses.forEach((response, date) => {
            const decisionCell = requestCard.querySelector(`[data-date="${date}"]`);
            if (decisionCell) {
                const decisionButtons = decisionCell.querySelectorAll('.decision-btn-compact');
                if (decisionButtons.length > 0) {

                        if (neutralBtn) neutralBtn.classList.add('active');

/**
 * Check if request is still editable (first day hasn't passed)
 * EXCLUDES sick and emergency leaves from the disable rule
 */
function isRequestEditable(request) {
    if (!request || !request.days || request.days.length === 0) {
        return false;
    }
    
    // Sick and Emergency leaves are ALWAYS editable (can be retroactive)
    if (request.leaveType === 'Sick' || request.leaveType === 'Emergency') {
        return true;
    }
    
    // For Annual leaves: check if start date has passed
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const firstDay = new Date(request.startDate || request.days[0].date);
    firstDay.setHours(0, 0, 0, 0);
    
    return firstDay > today; // Editable only if first day is in the future
}

/**
 * Update request calculations display (CHECK THIS FUNCTION)
 */
function updateRequestCalculations(requestId) {
    const request = currentLeaveRequestsNew.find(req => req.id === requestId);
    if (!request) return;
    
    const responses = dayResponsesMap.get(requestId) || new Map();
    
    // Count approved and rejected days
    let approvedCount = 0;
    let rejectedCount = 0;
    let approvedNetCount = 0;
    
    request.days.forEach(day => {
        const response = responses.get(day.date);
        if (response === 'Approved') {
            approvedCount++;
            if (!day.isWeeklyHoliday) {
                approvedNetCount++;
            }
        } else if (response === 'Rejected') {
            rejectedCount++;
        }
    });
    
    // Update display
    const approvedCountEl = document.getElementById(`approved-count-${requestId}`);
    const rejectedCountEl = document.getElementById(`rejected-count-${requestId}`);
    const netApprovedCountEl = document.getElementById(`net-approved-count-${requestId}`);
    const balanceStatusEl = document.getElementById(`balance-status-${requestId}`);
    
    if (approvedCountEl) approvedCountEl.textContent = approvedCount;
    if (rejectedCountEl) rejectedCountEl.textContent = rejectedCount;
    if (netApprovedCountEl) netApprovedCountEl.textContent = approvedNetCount;
    
    // Update balance status - MAKE SURE THIS USES request.employeeBalance
    if (balanceStatusEl) {
        const employeeBalance = parseInt(request.employeeBalanceAvailable || request.employeeBalance); // USE FROM REQUEST DATA
        const isExceeded = approvedNetCount > employeeBalance;
        
        balanceStatusEl.textContent = isExceeded ? 'EXCEEDED' : 'OK';
        balanceStatusEl.className = isExceeded ? 'exceeded' : 'ok';
        
        // Update card warning class
        const requestCard = document.querySelector(`[data-request-id="${requestId}"]`);
        if (requestCard) {
            if (isExceeded) {
                requestCard.classList.add('balance-warning');
            } else {
                requestCard.classList.remove('balance-warning');
            }
        }
    }
}

/**
 * Save leave response (NEW)
 */
function saveLeaveResponse(requestId, saveType) {
    console.log(`Saving leave response for ${requestId}, type: ${saveType}`);
    
    const responses = dayResponsesMap.get(requestId);
    if (!responses || responses.size === 0) {
        showToast('Please select a response for at least one day', 'error');
        return;
    }
    
    // Get admin comment
    const commentTextarea = document.getElementById(`admin-comment-${requestId}`);
    const adminComment = commentTextarea ? commentTextarea.value.trim() : '';
    
    // Convert responses map to object with string values
    const dayResponsesObj = {};
    responses.forEach((response, date) => {
        dayResponsesObj[date] = String(response);
    });
    
    // Get current admin email
    const adminEmail = getCurrentAdminEmail();
    if (!adminEmail) {
        showToast('Admin session expired. Please login again.', 'error');
        logout();
        return;
    }
    
    // Get button elements and set loading states
    const requestCard = document.querySelector(`[data-request-id="${requestId}"]`);
    const saveOnlyBtn = requestCard?.querySelector('.save-only');
    const saveNotifyBtn = requestCard?.querySelector('.save-notify');
    const cancelBtn = requestCard?.querySelector('.cancel');
    
    // Set loading state based on which button was clicked
    if (saveType === 'save') {
        setActionButtonLoading(saveOnlyBtn, true);
    } else {
        setActionButtonLoading(saveNotifyBtn, true);
    }
    
    // Disable other buttons during save
    if (cancelBtn) cancelBtn.disabled = true;
    
    // Save response
    google.script.run
        .withSuccessHandler(function(result) {
            // Remove loading states
            setActionButtonLoading(saveOnlyBtn, false);
            setActionButtonLoading(saveNotifyBtn, false);
            if (cancelBtn) cancelBtn.disabled = false;
            
            if (result.success) {
                showToast('Response saved successfully', 'success');
                
                // Clear responses map for this request
                dayResponsesMap.delete(requestId);
                
                // Refresh the requests list and counts
                loadLeaveRequestsCardsNew(currentLeaveFilterNew);
                loadLeaveRequestCountsNew();
                
                // Send notification if requested
                if (saveType === 'notify') {
                    sendNotificationAfterSave(requestId, adminEmail);
                }
            } else {
                showToast('Failed to save response: ' + result.error, 'error');
            }
        })
        .withFailureHandler(function(error) {
            // Remove loading states
            setActionButtonLoading(saveOnlyBtn, false);
            setActionButtonLoading(saveNotifyBtn, false);
            if (cancelBtn) cancelBtn.disabled = false;
            
            showToast('Error saving response: ' + error.message, 'error');
        })
        .updateLeaveRequestResponseNew(requestId, dayResponsesObj, adminComment, saveType, adminEmail);
}

function setActionButtonLoading(buttonElement, isLoading) {
    if (!buttonElement) return;
    
    if (isLoading) {
        buttonElement.classList.add('btn-loading');
        buttonElement.disabled = true;
    } else {
        buttonElement.classList.remove('btn-loading');
        buttonElement.disabled = false;
    }
}

/**
 * Send notification after successful save (NEW)
 */
function sendNotificationAfterSave(requestId, adminEmail) {
    google.script.run
        .withSuccessHandler(function(result) {
            if (result.success) {
                showToast('Employee notification sent successfully', 'success');
            } else {
                showToast('Response saved but notification failed: ' + result.error, 'warning');
            }
        })
        .withFailureHandler(function(error) {
            showToast('Response saved but notification error: ' + error.message, 'warning');
        })
        .sendLeaveResponseNotificationNew(requestId, adminEmail, 'true');
}

        controlButtonStates.set(requestId, { mode: null, editable: false });
    }
    
    const currentState = controlButtonStates.get(requestId);
    const requestCard = document.querySelector(`[data-request-id="${requestId}"]`);
    if (!requestCard) return;
    
    // Get all control buttons for this request
    const controlButtons = requestCard.querySelectorAll('.control-btn-compact');
    
    // If clicking the same button that's already active, do nothing
    if (currentState.mode === buttonType) {
        return;
    }
    
    // Clear all active states
    controlButtons.forEach(btn => {
        if (btn && btn.classList) {
            btn.classList.remove('active');
        }
    });
    
    // Update state and handle button logic
    switch (buttonType) {
        case 'approve-all':
            currentState.mode = 'approve-all';
            currentState.editable = false;
            const approveAllBtn = requestCard.querySelector('.approve-all');
            if (approveAllBtn && approveAllBtn.classList) {
                approveAllBtn.classList.add('active');
            }
            setAllDaysResponseSmart(requestId, 'Approved');
            setCalendarEditable(requestId, false);
            break;
            
        case 'reject-all':
            currentState.mode = 'reject-all';
            currentState.editable = false;
            const rejectAllBtn = requestCard.querySelector('.reject-all');
            if (rejectAllBtn && rejectAllBtn.classList) {
                rejectAllBtn.classList.add('active');
            }
            setAllDaysResponseSmart(requestId, 'Rejected');
            setCalendarEditable(requestId, false);
            break;
            
        case 'select':
            currentState.mode = 'select';
            currentState.editable = true;
            const selectBtn = requestCard.querySelector('.select-calendar');
            if (selectBtn && selectBtn.classList) {
                selectBtn.classList.add('active');
            }
            setCalendarEditable(requestId, true);
            break;
    }
    
    // Update state
    controlButtonStates.set(requestId, currentState);
}

/**
 * Load working/off counts and show tooltip on hover
 * NEW FUNCTION - ADD TO script-admin.html
 */
function loadWorkingOffTooltip(element, date, type) {
    // Check if data is already loaded
    if (element.dataset.loaded === 'true') {
        showTooltip(element, type);
        return;
    }
    
    // Show loading state
    element.querySelector('.count-loading').textContent = '...';
    
    // Load data from backend
    google.script.run
        .withSuccessHandler(function(result) {
            if (result) {
                // Store data in element
                element.dataset.workingCount = result.workingCount;
                element.dataset.offCount = result.offCount;
                element.dataset.workingEmployees = JSON.stringify(result.workingEmployees);
                element.dataset.offEmployees = JSON.stringify(result.offEmployees);
                element.dataset.loaded = 'true';
                
                // Update display
                if (type === 'working') {
                    element.querySelector('.count-loading').textContent = result.workingCount;
                } else {
                    element.querySelector('.count-loading').textContent = result.offCount;
                }
                
                // Show tooltip
                showTooltip(element, type);
            } else {
                element.querySelector('.count-loading').textContent = '0';
            }
        })
        .withFailureHandler(function(error) {
            console.error('Error loading working/off counts:', error);
            element.querySelector('.count-loading').textContent = '0';
        })
        .getWorkingOffCounts(date);
}

/**
 * Show tooltip with employee details
 * NEW FUNCTION - ADD TO script-admin.html
 */
function showTooltip(element, type) {
    // Remove any existing tooltips
    hideAllTooltips();
    
    const workingEmployees = JSON.parse(element.dataset.workingEmployees || '[]');
    const offEmployees = JSON.parse(element.dataset.offEmployees || '[]');
    
    let tooltipContent = '';
    
    if (type === 'working') {
        if (workingEmployees.length === 0) {
            tooltipContent = 'No employees working';
        } else {
            tooltipContent = workingEmployees.map(emp => {
                if (emp.pendingRequest) {
                    return `${emp.name} (${emp.pendingRequest})`;
                } else {
                    return emp.name;
                }
            }).join('<br>');
        }
    } else { // off
        if (offEmployees.length === 0) {
            tooltipContent = 'No employees off';
        } else {
            tooltipContent = offEmployees.map(emp => {
                return `${emp.name} (${emp.reason})`;
            }).join('<br>');
        }
    }
    
    // Create tooltip element
    const tooltip = document.createElement('div');
    tooltip.className = 'working-off-tooltip';
    tooltip.innerHTML = tooltipContent;
    
    // Position tooltip
    const rect = element.getBoundingClientRect();
    tooltip.style.position = 'absolute';
    tooltip.style.left = (rect.left + window.scrollX) + 'px';
    tooltip.style.top = (rect.top + window.scrollY - tooltip.offsetHeight - 10) + 'px';
    tooltip.style.zIndex = '10000';
    
    // Add to document
    document.body.appendChild(tooltip);
    
    // Store reference for cleanup
    element.tooltip = tooltip;
}

/**
 * Hide tooltip when mouse leaves
 * NEW FUNCTION - ADD TO script-admin.html
 */
function hideTooltip(element) {
    setTimeout(() => {
        if (element.tooltip) {
            element.tooltip.remove();
            element.tooltip = null;
        }
    }, 300); // Small delay to prevent flickering
}

/**
 * Hide all tooltips
 * NEW FUNCTION - ADD TO script-admin.html
 */
function hideAllTooltips() {
    document.querySelectorAll('.working-off-tooltip').forEach(tooltip => {
        tooltip.remove();
    });
}

/**
 * Load working/off counts for all days in a request (background loading)
 * NEW FUNCTION - ADD TO script-admin.html
 */
function preloadWorkingOffCounts(request) {
    // Load counts for all days in background
    request.days.forEach(day => {
        google.script.run
            .withSuccessHandler(function(result) {
                if (result) {
                    // Find all cells for this date and update them
                    document.querySelectorAll(`[data-date="${day.date}"]`).forEach(cell => {
                        if (cell.dataset.tooltipType === 'working') {
                            cell.dataset.workingCount = result.workingCount;
                            cell.dataset.offCount = result.offCount;
                            cell.dataset.workingEmployees = JSON.stringify(result.workingEmployees);
                            cell.dataset.offEmployees = JSON.stringify(result.offEmployees);
                            cell.dataset.loaded = 'true';
                            cell.querySelector('.count-loading').textContent = result.workingCount;
                        } else if (cell.dataset.tooltipType === 'off') {
                            cell.dataset.workingCount = result.workingCount;
                            cell.dataset.offCount = result.offCount;
                            cell.dataset.workingEmployees = JSON.stringify(result.workingEmployees);
                            cell.dataset.offEmployees = JSON.stringify(result.offEmployees);
                            cell.dataset.loaded = 'true';
                            cell.querySelector('.count-loading').textContent = result.offCount;
                        }
                    });
                }
            })
            .withFailureHandler(function(error) {
                console.error('Error preloading working/off counts:', error);
            })
            .getWorkingOffCounts(day.date);
    });
}

/**

 * Requires current password, new password, and confirmation
 */
function handleAdminPasswordChange() {
  console.log('🔐 Initiating logged-in admin password change...');
  
  const currentAdminEmail = getCurrentAdminEmail();
  if (!currentAdminEmail) {
    showToast('Session expired. Please login again.', 'error');
    return;
  }
  
  // Get form values
  const currentPassword = document.getElementById('currentPassword').value.trim();
  const newPassword = document.getElementById('newPassword').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  const changeBtn = document.querySelector('#adminPasswordChangeForm .btn-primary');
  
  // Validation
  if (!currentPassword) {
    showToast('Please enter your current password', 'error');
    document.getElementById('currentPassword').focus();
    return;
  }
  
  if (!newPassword || !confirmPassword) {
    showToast('Please fill in all password fields', 'error');
    return;
  }
  
  if (newPassword.length < 4) {
    showToast('Password must be at least 4 characters long', 'error');
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showToast('New passwords do not match', 'error');
    return;
  }
  
  // Set loading state
  setButtonLoading(changeBtn, true, 'Changing Password...');
  
  // Call backend
  google.script.run
    .withSuccessHandler(function(result) {
      setButtonLoading(changeBtn, false, '<i class="fas fa-shield-alt"></i> Change Password');
      
      if (result && result.success) {
        showToast('Password changed successfully! A confirmation email has been sent.', 'success');
        // Clear form
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      } else {
        const errorMsg = result && result.error ? result.error : 'Failed to change password';
        showToast(errorMsg, 'error');
      }
    })
    .withFailureHandler(function(error) {
      setButtonLoading(changeBtn, false, '<i class="fas fa-shield-alt"></i> Change Password');
      showToast('Error: ' + (error.message || 'Network error'), 'error');
    })
    .changeAdminPasswordLoggedIn(currentAdminEmail, currentPassword, newPassword);

/**
 * Handle forgot password from homepage
 * @param {string} userType - 'admin' or 'employee'
 */
function handleForgotPassword(userType) {
  const emailSelect = document.getElementById(userType + 'EmailSelect');
  
  if (!emailSelect) {
    showToast('Error: Email selector not found', 'error');
    return;
  }
  
  const email = emailSelect.value.trim();
  
  if (!email) {
    showToast('Please select your email address first', 'error');
    emailSelect.focus();
    return;
  }
  
  // Store current reset context
  window.currentPasswordReset = {
    email: email,
    userType: userType
  };
  
  showToast('Sending verification PIN to your email...', 'info');
  
  // Send PIN
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.success) {
        // Show forgot password modal
        document.getElementById('forgotPasswordModal').style.display = 'block';
        showToast('Verification PIN sent to your email', 'success');
        
        // Store reset token
        window.currentPasswordReset.token = result.token;
        
        // Focus on PIN input
        setTimeout(() => {
          document.getElementById('resetPinInput').focus();
        }, 500);
      } else {
        const errorMsg = result && result.error ? result.error : 'Failed to send PIN';
        showToast('Failed to send PIN: ' + errorMsg, 'error');
        console.error('Forgot password failed:', result);
      }
    })
    .withFailureHandler(function(error) {
      const errorMsg = error && error.message ? error.message : 'Network error';
      showToast('Error sending PIN: ' + errorMsg, 'error');
      console.error('Forgot password error:', error);
    })
    .sendForgotPasswordPIN(email, userType);
}

/**
 * Reset password using PIN (from homepage modal)
 */
function resetPasswordWithPIN() {
  const modal = document.getElementById('forgotPasswordModal');
  const pinInput = modal.querySelector('#resetPinInput');
  const newPasswordInput = modal.querySelector('#newPassword');
  const confirmPasswordInput = modal.querySelector('#confirmPassword');
  const resetBtn = modal.querySelector('#resetPasswordBtn');
  
  const pin = pinInput.value.trim();
  const newPassword = newPasswordInput.value.trim();
  const confirmPassword = confirmPasswordInput.value.trim();
  
  // Validation
  if (!pin || pin.length !== 6) {
    showToast('Please enter a valid 6-digit PIN', 'error');
    pinInput.focus();
    return;
  }
  
  if (!newPassword) {
    showToast('Please enter a new password', 'error');
    newPasswordInput.focus();
    return;
  }
  
  if (newPassword.length < 4) {
    showToast('Password must be at least 4 characters long', 'error');
    newPasswordInput.focus();
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showToast('Passwords do not match', 'error');
    confirmPasswordInput.focus();
    return;
  }
  
  if (!window.currentPasswordReset) {
    showToast('Password reset session expired. Please try again.', 'error');
    closeForgotPasswordModal();
    return;
  }
  
  setButtonLoading(resetBtn, true, 'Resetting...');
  
  google.script.run
    .withSuccessHandler(function(result) {
      setButtonLoading(resetBtn, false, '<i class="fas fa-check"></i> Reset Password');
      
      if (result && result.success) {
        showToast('Password reset successful! You can now login with your new password.', 'success');
        closeForgotPasswordModal();
      } else {
        const errorMsg = result && result.error ? result.error : 'Password reset failed';
        showToast('Password reset failed: ' + errorMsg, 'error');
      }
    })
    .withFailureHandler(function(error) {
      setButtonLoading(resetBtn, false, '<i class="fas fa-check"></i> Reset Password');
      const errorMsg = error && error.message ? error.message : 'Network error';
      showToast('Error: ' + errorMsg, 'error');
    })

      pin,
      window.currentPasswordReset.token,
      window.currentPasswordReset.email,
      newPassword,
      window.currentPasswordReset.userType
    );
}

// Apply loading state
function setOhCardButtonLoading(button, isLoading) {
  if (!button) return;
  
  if (isLoading) {
    button.classList.add('oh-card-btn-loading');
    button.disabled = true;
    
    // Change icon to spinner if it exists
    const icon = button.querySelector('i');
    if (icon) {
      icon.dataset.originalClass = icon.className;
      icon.className = 'fas fa-spinner';
    }
  } else {
    button.classList.remove('oh-card-btn-loading');
    button.disabled = false;
    
    // Restore original icon
    const icon = button.querySelector('i');
    if (icon && icon.dataset.originalClass) {
      icon.className = icon.dataset.originalClass;
      delete icon.dataset.originalClass;
    }
  }
}
