/**
 * Setup main tab navigation
 */
function setupTabNavigation() {
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabPanes = document.querySelectorAll('.tab-pane');

    tabButtons.forEach(button => {
        button.addEventListener('click', function() {
            const targetTab = this.getAttribute('data-tab');
            
            // Remove active class from all buttons and panes
            tabButtons.forEach(btn => btn.classList.remove('active'));
            tabPanes.forEach(pane => pane.classList.remove('active'));
            
            // Add active class to clicked button and corresponding pane
            this.classList.add('active');
            document.getElementById(targetTab).classList.add('active');
            
            // Load tab-specific content
            loadTabContent(targetTab);
        });
    });
}


function setupHolidaySubTabNavigation() {
    const subTabButtons = document.querySelectorAll('.sub-tab-button[data-subtab]');
    const subTabPanes = document.querySelectorAll('.sub-tab-pane');

    subTabButtons.forEach(button => {
        button.addEventListener('click', function() {
            const targetSubTab = this.getAttribute('data-subtab');
            
            console.log('Holiday subtab clicked:', targetSubTab);
            
            // Remove active class from all sub-tab buttons and panes
            subTabButtons.forEach(btn => btn.classList.remove('active'));
            subTabPanes.forEach(pane => pane.classList.remove('active'));
            
            // Add active class to clicked button and corresponding pane
            this.classList.add('active');
            const targetPane = document.getElementById(targetSubTab);
            if (targetPane) {
                targetPane.classList.add('active');
            }
            
            // Load sub-tab specific content
            loadSubTabContent(targetSubTab);
        });
    });
}

/**
 * HELPER: Find the logged-in admin email from any available global variable
 */
function newSR_getEffectiveAdminEmail() {
  // List of potential variables where the user might be stored
  const candidates = [
    typeof currentLoggedInAdmin !== 'undefined' ? currentLoggedInAdmin : null,
    typeof currentAdmin !== 'undefined' ? currentAdmin : null,
    typeof currentUser !== 'undefined' ? currentUser : null
  ];

  for (let candidate of candidates) {
    if (candidate) {
      // Case A: Candidate is just a string (e.g., "admin@example.com")
      if (typeof candidate === 'string') {
        return candidate;
      }
      // Case B: Candidate is an object (e.g., { email: "admin@example.com" })
      if (typeof candidate === 'object' && candidate.email) {
        return candidate.email;
      }
    }
  }
  return null; // No identity found
}

/**
 * Step 1: Verify Password (ROBUST VERSION)
 */
function newSR_verifyPassword() {
  const passwordInput = document.getElementById('newSR_PasswordInput');
  const password = passwordInput ? passwordInput.value : '';
  const buttonId = 'newSR_VerifyBtn'; 

  // 1. Get Admin Email safely
  const adminEmail = newSR_getEffectiveAdminEmail();

  // --- DIAGNOSTIC ALERT ---
  // If this alerts "null", we know the user is not logged in properly on the frontend.
  if (!adminEmail) {
    console.error('Identity Error: Could not find admin email in any global variable.');
    alert('System Error: The system cannot detect who is logged in.\n\nPlease refresh the page and log in again.');
    return;
  }
  console.log('Verifying Action for Admin:', adminEmail); // Debugging

  // 2. Validate Password
  if (!password) {
    if (typeof showToast === 'function') showToast('Please enter password', 'error');
    else alert('Please enter password');
    return;
  }

  // 3. UI Loading
  if (typeof showLoading === 'function') {
    showLoading(buttonId);
  } else {
    const btn = document.getElementById(buttonId);
    if (btn) {
      btn.dataset.originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
      btn.disabled = true;
    }
  }
  
  // 4. Server Call
  google.script.run
    .withSuccessHandler(function(response) {
      // Restore UI
      if (typeof hideLoading === 'function') hideLoading(buttonId);
      else {
        const btn = document.getElementById(buttonId);
        if (btn) {
          btn.innerHTML = btn.dataset.originalText || 'Verify & Next <i class="fas fa-arrow-right"></i>';
          btn.disabled = false;
        }
      }

      // Handle Response
      if (response.success) {
        newSR_loadStep2();
      } else {
        if (typeof showToast === 'function') showToast(response.error, 'error');
        else alert('Verification Failed: ' + response.error);
      }
    })
    .withFailureHandler(function(err) {
      // Restore UI
      if (typeof hideLoading === 'function') hideLoading(buttonId);
      else {
        const btn = document.getElementById(buttonId);
        if (btn) {
          btn.innerHTML = btn.dataset.originalText || 'Verify & Next <i class="fas fa-arrow-right"></i>';
          btn.disabled = false;
        }
      }
      alert('Connection Error: ' + err.message);
    })
    .newSR_verifyAdminPassword(password, adminEmail); // <-- Passing the clean email string
}

function newSR_loadStep2() {
  if (typeof showLoading === 'function') showLoading('newSR_VerifyBtn');

  google.script.run

      if (typeof hideLoading === 'function') hideLoading('newSR_VerifyBtn');

        // Switch Views
        document.getElementById('newSR_Step1_Auth').style.display = 'none';
        document.getElementById('newSR_Step2_Review').style.display = 'block';
        
        const tbody = document.getElementById('newSR_EmployeeTableBody');
        tbody.innerHTML = '';
        
        if (response.employees.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="padding:15px; text-align:center;">No active employees found</td></tr>';
        } else {
          
          response.employees.forEach(emp => {
            const tr = document.createElement('tr');
            
            // Helper: Creates the Input Field + Current Balance display
            const createInputCell = (currentVal, defaultVal, inputName) => {
              // Ensure defaultVal is not undefined
              const def = (defaultVal !== undefined && defaultVal !== null) ? defaultVal : 0;
              return `
                <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
                  <span style="font-size: 0.75rem; color: #7f8c8d;">Remaining Bal.: <strong>${currentVal}</strong></span>
                  <input type="number" 
                         class="form-control newSR_balance_input" 
                         data-empid="${emp.id}" 
                         data-type="${inputName}"
                         value="${def}" 
                         style="width: 70px; padding: 4px; text-align: center; font-size: 0.9rem; border: 1px solid #bdc3c7; border-radius: 15px; "
                  >
                </div>
              `;
            };

            // Tooltip Logic
            let outstandingHtml = '<span style="color: #27ae60;">0</span>';
            if (emp.outstandingLeaves > 0) {
              const detailsText = (emp.outstandingDetails && emp.outstandingDetails.length > 0) 
                                  ? emp.outstandingDetails.join('<br>') : 'Details unavailable';
              outstandingHtml = `
                <div class="newSR_tooltip_wrapper">
                  ${emp.outstandingLeaves}
                  <span class="newSR_tooltip_content">${detailsText}</span>
                </div>
              `;
            }

            // Styles
            const baseStyle = "padding: 10px; border-bottom: 1px solid #eee;";
            const centerStyle = baseStyle + " text-align: center; vertical-align: middle;";
            const leftStyle = baseStyle + " text-align: left; vertical-align: middle; color: #2c3e50; font-weight: 500;";

            tr.innerHTML = `
              <td style="${leftStyle}">${emp.name}</td>
              <td style="${centerStyle}">${createInputCell(emp.annualBal, response.defaults.annual, 'annual')}</td>
              <td style="${centerStyle}">${createInputCell(emp.sickBal, response.defaults.sick, 'sick')}</td>
              <td style="${centerStyle}">${createInputCell(emp.emergencyBal, response.defaults.emergency, 'emergency')}</td>
              <td style="${centerStyle}">${outstandingHtml}</td>
            `;
            
            tbody.appendChild(tr);
          });
        }
        
      } else {
        sys_showError('Load Error', response.error);
      }
    })
    .withFailureHandler(function(err) {
      if (typeof hideLoading === 'function') hideLoading('newSR_VerifyBtn');
      sys_showError('Connection Error', err.message);
    })
    .newSR_getPreResetData();
}

/**
 * Phase 2 Trigger: Executed via the "Confirm Reset" Button
 */
function newSR_triggerFinalReset() {
  const newStart = document.getElementById('newSR_NewStartDate').value;
  const newEnd = document.getElementById('newSR_NewEndDate').value;
  
  // 1. Basic Validation
  if (!newStart || !newEnd) {
    if (typeof showToast === 'function') showToast('Please select New System Dates first.', 'warning');
    else sys_showError('Missing Dates', 'Please select New System Dates first.');
    return;
  }
  
  // 2. Gather Balance Data from Inputs
  const balanceMap = {};
  const inputs = document.querySelectorAll('.newSR_balance_input');
  
  inputs.forEach(input => {
    const empId = input.getAttribute('data-empid');
    const type = input.getAttribute('data-type');
    const val = input.value;
    
    if (!balanceMap[empId]) {
      balanceMap[empId] = { annual: 0, sick: 0, emergency: 0 };
    }
    
    if (type === 'annual') balanceMap[empId].annual = val;
    if (type === 'sick') balanceMap[empId].sick = val;
    if (type === 'emergency') balanceMap[empId].emergency = val;
  });

  // 3. Confirm & Execute (Using Custom Modal)
  sys_showConfirm(
    'FINAL WARNING: Reset System?',
    `<div style="color: #c0392b; font-weight: bold; margin-bottom: 10px;">This action is destructive and cannot be undone.</div>
     <ul style="text-align: left; margin-left: 20px;">
       <li>Old leave history outside the new dates will be deleted.</li>
       <li>Inactive employees will be removed.</li>
       <li>Active employees will get the new Opening Balances you entered.</li>
       <li>System Dates will be updated.</li>
     </ul>
     <br>Are you absolutely sure you want to proceed?`,
     
    // Callback: Executed ONLY if user clicks "Confirm Action"
    function() {
      if (typeof showLoading === 'function') showLoading('newSR_FinalResetBtn');
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (typeof hideLoading === 'function') hideLoading('newSR_FinalResetBtn');
          
          if (response.success) {
            newSR_closeModal();
            sys_showSuccess(
              'System Reset Complete!',
              'The system has been successfully transitioned to the new year.<br>All balances and dates have been updated.<br><br>The page will now reload.'
            );
            // Reload page to reflect changes
            setTimeout(() => location.reload(), 3000);
          } else {
            sys_showError('Reset Failed', response.error);
          }
        })
        .withFailureHandler(function(err) {
          if (typeof hideLoading === 'function') hideLoading('newSR_FinalResetBtn');
          sys_showError('System Error', err.message);
        })
        .newSR_finalizeReset(newStart, newEnd, balanceMap);
    }
  );
}

/**
 * Step 3: Execute Archive (Phase 1 End)
 * REVISED: Uses Custom Success Modal instead of basic alert
 */
function newSR_executeArchive() {
  const newStart = document.getElementById('newSR_NewStartDate').value;
  const newEnd = document.getElementById('newSR_NewEndDate').value;
  
  // 1. Validation
  if (!newStart || !newEnd) {
    if (typeof sys_showError === 'function') sys_showError('Missing Dates', 'Please select both New Start and End dates.');
    else alert('Please select both New Start and End dates.');
    return;
  }
  
  const adminEmail = newSR_getEffectiveAdminEmail();
  if (!adminEmail) {
    sys_showError('Authentication Error', 'Could not identify admin user. Please reload the page.');
    return;
  }

  // 2. Custom Confirmation Dialog
  sys_showConfirm(
    'Confirm System Archive',
    'Are you sure you want to create a generic archive?<br><br>This will save the current system state to a backup file and record it in the versions log.',
    
    // Callback: Executed ONLY if user clicks "Confirm Action"
    function() {
      if (typeof showLoading === 'function') showLoading('newSR_ArchiveBtn');
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (typeof hideLoading === 'function') hideLoading('newSR_ArchiveBtn');
          
          if (response.success) {
            
            // --- UI TRANSITION: Phase 1 -> Phase 2 ---
            // 1. Hide Archive Button
            const archiveBtn = document.getElementById('newSR_ArchiveBtn');
            if(archiveBtn) archiveBtn.style.display = 'none';
            
            // 2. Show Reset Button
            const resetBtn = document.getElementById('newSR_FinalResetBtn');
            if(resetBtn) resetBtn.style.display = 'inline-block';
            
            // 3. Lock the checkbox
            const checkbox = document.getElementById('newSR_ConfirmArchive');
            if(checkbox) checkbox.disabled = true;

            // --- SUCCESS MODAL (Fixed) ---
            sys_showSuccess(
              'Archive Created Successfully',
              `<strong>Archive Name:</strong><br>${response.archiveName}<br><br>
               Step 1 is complete.<br>
               You can now review the balances below and click <span style="color:#c0392b; font-weight:bold;">"Confirm Reset"</span> to finalize.`
            );
            
          } else {
            sys_showError('Archive Failed', response.error);
          }
        })
        .withFailureHandler(function(err) {
          if (typeof hideLoading === 'function') hideLoading('newSR_ArchiveBtn');
          sys_showError('System Error', err.message);
        })
        .newSR_archiveSystem(newStart, newEnd, adminEmail);
    }
  );
}

/**
 * Open System Versions Modal
 */

  // Assuming 'currentLoggedInAdmin' object has a 'permission' or similar field
  // If you don't have that object handy, the backend call is safe anyway.

                <div style="font-weight: bold; color: #2c3e50;">${ver.dateFrom}</div>
                <div style="font-size: 0.85rem; color: #7f8c8d;">to ${ver.dateTo}</div>
              </td>
              <td style="padding: 10px;">
                <div style="font-size: 0.9rem;">${ver.resetDate}</div>
                <div style="font-size: 0.8rem; color: #95a5a6;">by ${ver.resetBy}</div>
              </td>
              <td style="text-align: center;">

                  <i class="fas fa-external-link-alt"></i> Open
                </a>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
      } else {
        tbody.innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Error: ${response.error}</td></tr>`;
      }
    })
    .withFailureHandler(function(err) {
      loader.style.display = 'none';
      tbody.innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">System Error: ${err.message}</td></tr>`;
    })
    .getSystemVersionsLog();
}
/* ============================================================================
   SYSTEM DIALOG HELPER FUNCTIONS
   ============================================================================ */

function sys_closeDialog() {
  document.getElementById('sys_dialog_modal').style.display = 'none';
}

/**
 * Show a Confirmation Modal (Replaces native confirm())
 * @param {string} title - Header title
 * @param {string} message - Body text (can be HTML)
 * @param {function} yesCallback - Function to run if user clicks "Confirm"
 */
function sys_showConfirm(title, message, yesCallback) {
  const modal = document.getElementById('sys_dialog_modal');
  const header = document.getElementById('sys_dialog_header');
  const titleEl = document.getElementById('sys_dialog_title');
  const bodyEl = document.getElementById('sys_dialog_body');
  const footerEl = document.getElementById('sys_dialog_footer');

  // Theme: WARNING / CONFIRM (Orange)
  header.style.backgroundColor = '#f39c12'; 
  titleEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${title}`;
  bodyEl.innerHTML = message;
  
  // Clear previous buttons
  footerEl.innerHTML = '';
  
  // Cancel Button
  const btnNo = document.createElement('button');
  btnNo.className = 'btn-secondary';
  btnNo.innerHTML = 'Cancel';
  btnNo.onclick = sys_closeDialog;
  btnNo.style.marginRight = '10px';
  
  // Confirm Button
  const btnYes = document.createElement('button');
  btnYes.className = 'btn-primary'; // You can change to btn-danger if needed
  btnYes.innerHTML = 'Confirm Action';
  btnYes.onclick = function() {
    sys_closeDialog();
    if(yesCallback) yesCallback();
  };
  
  footerEl.appendChild(btnNo);
  footerEl.appendChild(btnYes);
  
  modal.style.display = 'block';
}

/**
 * Show a Success Modal (Replaces native alert() for success)
 * @param {string} title - Header title
 * @param {string} message - Body text
 */
function sys_showSuccess(title, message) {
  const modal = document.getElementById('sys_dialog_modal');
  const header = document.getElementById('sys_dialog_header');
  const titleEl = document.getElementById('sys_dialog_title');
  const bodyEl = document.getElementById('sys_dialog_body');
  const footerEl = document.getElementById('sys_dialog_footer');

  // Theme: SUCCESS (Green)
  header.style.backgroundColor = '#27ae60'; 
  titleEl.innerHTML = `<i class="fas fa-check-circle"></i> ${title}`;
  bodyEl.innerHTML = message;
  
  footerEl.innerHTML = '';
  
  // OK Button
  const btnOk = document.createElement('button');
  btnOk.className = 'btn-primary'; // or btn-success
  btnOk.innerHTML = 'OK';
  btnOk.onclick = sys_closeDialog;
  
  footerEl.appendChild(btnOk);
  
  modal.style.display = 'block';
}

/**
 * Show an Error Modal (Replaces native alert() for errors)
 * @param {string} title - Header title
 * @param {string} message - Body text
 */
function sys_showError(title, message) {
  const modal = document.getElementById('sys_dialog_modal');
  const header = document.getElementById('sys_dialog_header');
  const titleEl = document.getElementById('sys_dialog_title');
  const bodyEl = document.getElementById('sys_dialog_body');
  const footerEl = document.getElementById('sys_dialog_footer');

  // Theme: ERROR (Red)
  header.style.backgroundColor = '#e74c3c'; 
  titleEl.innerHTML = `<i class="fas fa-times-circle"></i> ${title}`;
  bodyEl.innerHTML = message;
  
  footerEl.innerHTML = '';
  
  const btnClose = document.createElement('button');
  btnClose.className = 'btn-secondary';
  btnClose.innerHTML = 'Close';
  btnClose.onclick = sys_closeDialog;
  
  footerEl.appendChild(btnClose);
  
  modal.style.display = 'block';
}

/**
 * Load notification preferences
 */
function loadNotificationPreferences() {
    google.script.run
        .withSuccessHandler(function(result) {
            if (result.success) {
                const toggle = document.getElementById('notificationToggle');
                const daysInput = document.getElementById('reminderDays');
                const daysGroup = document.getElementById('daysInputGroup');
                
                toggle.checked = result.data.notifyEnabled || false;
                daysInput.value = result.data.reminderDays || 7;
                
                if (toggle.checked) {
                    daysGroup.classList.add('active');
                    daysInput.disabled = false;
                } else {
                    daysGroup.classList.remove('active');
                    daysInput.disabled = true;

function parseEmployeesResponse(response) {
    console.log('parseEmployeesResponse called with:', response);
    
    try {
        if (!response || typeof response !== 'string') {
            console.error('Invalid response format:', typeof response);
            return { success: false, error: 'Invalid response format' };
        }
        
        if (response.startsWith('ERROR:')) {
            const error = response.substring(6);
            console.error('Backend error:', error);
            return { success: false, error: error };
        }
        
        if (response === 'SUCCESS:EMPTY') {
            console.log('Empty response received');
            return { success: true, data: [], stats: { total: 0, active: 0, inactive: 0 } };
        }
        
        if (!response.startsWith('SUCCESS:')) {
            console.error('Unknown response format:', response);
            return { success: false, error: 'Unknown response format' };
        }
        
        const dataString = response.substring(8); // Remove "SUCCESS:"
        console.log('Data string to parse:', dataString);
        
        const employeeStrings = dataString.split(';');
        console.log('Employee strings:', employeeStrings);
        
        const employees = [];
        let activeCount = 0;
        let inactiveCount = 0;
        
        employeeStrings.forEach((empStr, index) => {
            console.log(`Parsing employee string ${index}:`, empStr);
            
            if (!empStr.trim()) {
                console.log('Empty employee string, skipping');
                return;
            }
            
            const parts = empStr.split('|');
            console.log('Employee parts:', parts);
            
            if (parts.length >= 10) {
                const employee = {
                    ID: parts[0] || '',
                    Name: parts[1] || '',
                    'E-mail': parts[2] || '',
                    'Opening Balance': parts[3] || '0',
                    'Usable from': parts[4] || '',
                    'Usable to': parts[5] || '',
                    'Added on': parts[6] || '',
                    'Email status': parts[7] || 'Pending',
                    'Deactivated on': parts[8] || '',
                    'Last Login': parts[9] || '',
                    'Emergency Leaves': parts[10] || '0',
                    'Sick Leaves': parts[11] || '0',
                    'Weekly Holiday': parts[12] || '',
                    'Added by': parts[13] || '',
                    'Reactivated on': parts[14] || ''
                };
                
                // Simple status calculation
                if (parts[8] && parts[8] !== '') {
                    // Has deactivation date
                    if (parts[14] && parts[14] !== '') {
                        // Has reactivation date - compare them
                        try {
                            const deactivated = new Date(parts[8]);
                            const reactivated = new Date(parts[14]);
                            employee.CalculatedStatus = reactivated > deactivated ? 'Active' : 'Inactive';
                        } catch (e) {
                            employee.CalculatedStatus = 'Inactive';
                        }
                    } else {
                        employee.CalculatedStatus = 'Inactive';
                    }
                } else {
                    employee.CalculatedStatus = 'Active';
                }
                
                console.log('Parsed employee:', employee);
                
                if (employee.CalculatedStatus === 'Active') {
                    activeCount++;
                } else {
                    inactiveCount++;
                }
                
                employees.push(employee);
            } else {
                console.warn('Employee data incomplete, skipping:', parts);
            }
        });
        
        const stats = {
            total: employees.length,
            active: activeCount,
            inactive: inactiveCount
        };
        
        console.log('Final parsed result:', { employees, stats });
        
        return { success: true, data: employees, stats: stats };
        
    } catch (error) {
        console.error('Error parsing employees response:', error);
        return { success: false, error: 'Error parsing response: ' + error.toString() };
    }
}

function calculateEmployeeStatusFromStrings(addedOn, deactivatedOn, reactivatedOn) {
    // If never deactivated, always active
    if (!deactivatedOn || deactivatedOn === '') {
        return 'Active';
    }
    
    // If no reactivation, inactive
    if (!reactivatedOn || reactivatedOn === '') {
        return 'Inactive';
    }
    
    // Compare dates to see which is later
    try {
        const deactivatedDate = new Date(deactivatedOn);
        const reactivatedDate = new Date(reactivatedOn);
        
        if (reactivatedDate > deactivatedDate) {
            return 'Active';
        } else {
            return 'Inactive';
        }
    } catch (error) {
        // If date parsing fails, default to inactive if deactivated
        return 'Inactive';
    }
}

/**
 * Show loading spinner and SAVE original text
 */
function showLoading(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        // 1. Save original text to a data attribute (only if not already saved)
        if (!element.dataset.originalText) {
            element.dataset.originalText = element.innerHTML;
        }
        
        // 2. Disable button to prevent double-clicks
        element.disabled = true;
        
        // 3. Show spinner
        element.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
    }
}

/**
 * Hide loading spinner and RESTORE original text
 */
function hideLoading(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        // 1. Restore text from the data attribute
        if (element.dataset.originalText) {
            element.innerHTML = element.dataset.originalText;
            
            // Clear the saved text so it updates correctly next time
            delete element.dataset.originalText; 
        }
        
        // 2. Re-enable the button
        element.disabled = false;
    }
}

/**
 * Set button loading state
 */
function setButtonLoading(button, isLoading, text = '') {
    if (!button) return;
    
    if (isLoading) {
        button.disabled = true;
        button.classList.add('btn-loading');
        if (text) {
            button.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
        }
    } else {
        button.disabled = false;
        button.classList.remove('btn-loading');
        if (text) {
            button.innerHTML = text;
        }
    }
}

/**
 * Format date for display - SIMPLIFIED for string dates
 */
function formatDateForDisplay(dateStr) {
    try {
        if (!dateStr) return 'Invalid Date';
        
        // If it's already a string in YYYY-MM-DD format, parse it
        if (typeof dateStr === 'string') {
            const date = new Date(dateStr);
            if (!isNaN(date.getTime())) {
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            }
        }
        
        // If it's a Date object, format it
        if (dateStr instanceof Date && !isNaN(dateStr.getTime())) {
            return dateStr.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
        
        return 'Invalid Date';
    } catch (error) {
        console.error('Date formatting error:', error);
        return 'Invalid Date';
    }
}

/**
 * Format date for input field (YYYY-MM-DD)
 */
function formatDateForInput(date) {
    if (!date) return '';
    
    try {
        const d = new Date(date);
        return d.toISOString().split('T')[0];
    } catch (error) {
        return '';
    }
}

/**
 * Format datetime for input field (YYYY-MM-DDTHH:MM)
 */
function formatDateTimeForInput(date) {
    if (!date) return '';
    
    try {
        const d = new Date(date);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const hours = String(d.getHours()).padStart(2, '0');
        const minutes = String(d.getMinutes()).padStart(2, '0');
        
        return `${year}-${month}-${day}T${hours}:${minutes}`;
    } catch (error) {
        return '';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    // Close modals when clicking outside
    const modals = document.querySelectorAll('.modal');
    modals.forEach(modal => {
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                if (modal.id === 'systemResetModal') {
                    closeSystemResetModal();
                } else if (modal.id === 'otpModal') {
                    cancelOTPProcess();
                } else if (modal.id === 'executionModal') {
                    cancelExecution();
                }
            }
        });
    });
    
    // Setup Enter key handling for OTP input
    const otpInput = document.getElementById('otpInput');
    if (otpInput) {
        otpInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyOTP();
            }
        });
        
        // Auto-format OTP input (numbers only)
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').substring(0, 6);
        });
    }
    
    // Setup date validation
    const newStartDate = document.getElementById('newStartDate');
    const newEndDate = document.getElementById('newEndDate');
    
    if (newStartDate && newEndDate) {
        newStartDate.addEventListener('change', function() {
            if (this.value && newEndDate.value && new Date(this.value) >= new Date(newEndDate.value)) {
                newEndDate.value = '';
                showToast('Please select an end date after the start date', 'warning');
            }
        });
        
        newEndDate.addEventListener('change', function() {
            if (this.value && newStartDate.value && new Date(this.value) <= new Date(newStartDate.value)) {
                this.value = '';
                showToast('End date must be after the start date', 'warning');
            }
        });
    }
});

function formatDisplayDate(dateString) {
    if (!dateString) return 'N/A';
    
    try {
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });
    } catch (e) {
        return dateString;
    }
}

/**
 * Calculate days between two dates
 */
function calculateDaysBetween(startDate, endDate) {
    const timeDiff = endDate.getTime() - startDate.getTime();
    return Math.ceil(timeDiff / (1000 * 3600 * 24)) + 1;
}

/**
 * Save all holiday edits
 */
function saveAllHolidayEdits(index) {
    const editBtn = document.getElementById(`editBtn${index}`);
    const nameInput = document.getElementById(`editNameInput${index}`);
    const startDateInput = document.getElementById(`editStartDateInput${index}`);
    const endDateInput = document.getElementById(`editEndDateInput${index}`);
    
    // Validation
    const newName = nameInput.value.trim();
    const newStartDate = startDateInput.value;
    const newEndDate = endDateInput.value;
    
    if (!newName) {
        showToast('Holiday name cannot be empty', 'error');
        nameInput.focus();
        return;
    }
    
    if (!newStartDate) {
        showToast('Start date cannot be empty', 'error');
        startDateInput.focus();
        return;
    }
    
    if (!newEndDate) {
        showToast('End date cannot be empty', 'error');
        endDateInput.focus();
        return;
    }
    
    if (new Date(newStartDate) > new Date(newEndDate)) {
        showToast('End date cannot be before start date', 'error');
        endDateInput.focus();
        return;
    }
    
    // Show professional loading state
    setButtonLoadingEnhanced(editBtn, true, 'Saving...');
    
    const updatedHoliday = {
        name: newName,
        startDate: newStartDate,
        endDate: newEndDate
    };
    
    google.script.run
        .withSuccessHandler(function(result) {
            setButtonLoadingEnhanced(editBtn, false);
            
            if (result.success) {
                showToast('Holiday updated successfully', 'success');
                currentEditingIndex = -1;
                loadExistingHolidays(); // Refresh table
            } else {
                showToast('Failed to update holiday: ' + result.error, 'error');
            }
        })
        .withFailureHandler(function(error) {
            setButtonLoadingEnhanced(editBtn, false);
            showToast('Error updating holiday: ' + error.message, 'error');
        })
        .updateOfficialHoliday(index, updatedHoliday);
}

/**
 * Cancel all holiday edits
 */
function cancelAllHolidayEdits(index) {
    // Reset editing state
    resetEditingState(index);
    currentEditingIndex = -1;

    loadExistingHolidays();

}

/**
 * Enhanced button loading state with professional animation
 */
function setButtonLoadingEnhanced(button, isLoading, text = '') {
    if (!button) return;
    
    if (isLoading) {
        button.disabled = true;
        button.classList.add('loading');
        if (text) {
            button.innerHTML = `<i class="fas fa-circle-notch"></i> ${text}`;
        }
    } else {
        button.disabled = false;
        button.classList.remove('loading');
        
        // Reset to normal edit button state
        const index = parseInt(button.id.replace('editBtn', ''));
        resetEditingState(index);
        currentEditingIndex = -1;
    }
}

/**

 */
function loadGmailAliases() {
    const senderSelect = document.getElementById('senderEmailSelect');
    const refreshBtn = document.getElementById('refreshSenderBtn');
    
    senderSelect.disabled = true;
    senderSelect.classList.add('loading');
    senderSelect.innerHTML = '<option value="">Loading email addresses...</option>';
    setButtonLoading(refreshBtn, true);
    
    google.script.run
        .withSuccessHandler(function(result) {

            senderSelect.disabled = false;
            senderSelect.classList.remove('loading');
            senderSelect.classList.add('error');
            setButtonLoading(refreshBtn, false);
            
            senderSelect.innerHTML = '<option value="">Failed to load email addresses</option>';
            showToast('Failed to load Gmail aliases: ' + error.message, 'error');
        })
        .getGmailAliases();
}

/**
 * Populate sender email dropdown options
 */
function populateSenderOptions(aliases) {
    const senderSelect = document.getElementById('senderEmailSelect');
    
    // Clear existing options
    senderSelect.innerHTML = '';
    
    // Add default option
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.textContent = 'Use primary email address (default)';
    defaultOption.setAttribute('data-default', 'true');
    senderSelect.appendChild(defaultOption);
    
    // Add aliases
    aliases.forEach((alias, index) => {
        const option = document.createElement('option');
        option.value = alias.email;
        
        if (alias.isPrimary) {
            option.textContent = `${alias.email} (Primary)`;
            option.setAttribute('data-primary', 'true');
        } else {
            option.textContent = alias.email;
            option.setAttribute('data-alias', 'true');
        }
        
        // Add name if available
        if (alias.name && alias.name !== alias.email) {
            option.textContent = `${alias.name} <${alias.email}>`;
        }
        
        senderSelect.appendChild(option);
    });
    
    // Add change event listener
    senderSelect.addEventListener('change', function() {
        updateSenderPreview(this.value);
    });
    
    console.log(`Loaded ${aliases.length} Gmail aliases`);
}

/**
 * Update sender email preview
 */
function updateSenderPreview(email) {
    const preview = document.getElementById('senderPreview');
    const previewFromName = document.getElementById('previewFromName');
    const previewFromEmail = document.getElementById('previewFromEmail');
    
    if (!email) {
        preview.style.display = 'none';
        return;
    }
    
    // Extract name and email if in format "Name <email>"
    let displayName = 'Holiday Management System';
    let displayEmail = email;
    
    const match = email.match(/^(.+?)\s*<(.+?)>$/);
    if (match) {
        displayName = match[1].trim();
        displayEmail = match[2].trim();
    }
    
    previewFromName.textContent = displayName;
    previewFromEmail.textContent = displayEmail;
    preview.style.display = 'block';
}

function parseBackendResponse(response) {
    console.log('🔍 PARSING RESPONSE:', response);
    
    if (!response || typeof response !== 'string') {
        console.error('❌ Invalid response:', response);
        return { success: false, error: 'Invalid response from server' };
    }
    
    if (response.startsWith('SUCCESS:')) {
        const data = response.replace('SUCCESS:', '');
        console.log('✅ SUCCESS PARSED:', data);
        return { success: true, data: data, message: data };
    } else if (response.startsWith('ERROR:')) {
        const error = response.replace('ERROR:', '');
        console.log('❌ ERROR PARSED:', error);
        return { success: false, error: error };
    } else {
        console.warn('⚠️ Unknown response format:', response);
        return { success: false, error: 'Unknown response format' };
    }
}

/**
 * Parse admin data from string
 */
function parseAdminData(dataString) {
    const parts = dataString.split('|');
    return {
        name: parts[0] || 'Administrator',
        email: parts[1] || '',
        fullPermission: parts[2] === 'true',
        receiveRequests: parts[3] === 'true',
        lastLogin: new Date()
    };
}

/**
 * Parse employee data from string
 */
function parseEmployeeData(dataString) {
    const parts = dataString.split('|');
    return {
        id: parts[0] || '',
        name: parts[1] || 'Employee',
        email: parts[2] || '',
        openingBalance: parseInt(parts[3]) || 0,
        lastLogin: new Date()
    };
}

/**
 * Parse employees list from string
 */
function parseEmployeesList(dataString) {
    if (!dataString) return [];
    
    const employees = [];
    const employeeStrings = dataString.split(';');
    
    employeeStrings.forEach(empStr => {
        const parts = empStr.split('|');
        if (parts.length >= 3) {
            employees.push({
                name: parts[0] || 'Unknown',
                email: parts[1] || '',
                id: parts[2] || ''
            });
        }
    });
    
    return employees.sort((a, b) => a.name.localeCompare(b.name));
}

/**
 * Parse admins list from string
 */
function parseAdminsList(dataString) {
    if (!dataString) return [];
    
    const admins = [];
    const adminStrings = dataString.split(';');
    
    adminStrings.forEach(adminStr => {
        const parts = adminStr.split('|');
        if (parts.length >= 2) {
            admins.push({
                name: parts[0] || 'Unknown',
                email: parts[1] || ''
            });
        }
    });
    
    return admins.sort((a, b) => a.name.localeCompare(b.name));

/**
 * Parse admins string data into objects
 */
function parseAdminsStringData(dataString) {
    console.log('🔄 Parsing admins string data:', dataString);
    
    if (!dataString || typeof dataString !== 'string') {
        console.error('❌ Invalid data string provided');
        return [];
    }
    
    const adminsArray = [];
    
    try {
        // Split by semicolon to get individual admin strings
        const adminStrings = dataString.split(';');
        console.log('📝 Admin strings found:', adminStrings.length);
        
        adminStrings.forEach((adminString, index) => {
            if (!adminString || adminString.trim() === '') return;
            
            console.log(`🔍 Parsing admin ${index}: ${adminString}`);
            
            // Split by pipe to get individual fields
            const fields = adminString.split('|');
            
            if (fields.length >= 10) {
                const admin = {
                    name: fields[0] || 'Unknown',
                    email: fields[1] || '',
                    fullPermission: fields[2] === 'true',
                    receiveRequests: fields[3] === 'true',
                    dateCreated: fields[4] || '',
                    createdBy: fields[5] || 'System',
                    lastLogin: fields[6] || null,
                    status: fields[7] || 'active',
                    statusChangedOn: fields[8] || null,
                    rowIndex: parseInt(fields[9]) || 0
                };
                
                adminsArray.push(admin);
                console.log(`✅ Parsed admin: ${admin.name} (${admin.email})`);
            } else {
                console.warn(`⚠️ Insufficient fields for admin ${index}: ${fields.length} fields`);
            }
        });
        
    } catch (error) {
        console.error('❌ Error parsing admins data:', error);
    }
    
    console.log('📊 Total parsed admins:', adminsArray.length);
    return adminsArray;
}

        if (!dateStr || dateStr === 'null' || dateStr === '') return 'Never';
        try {
            return formatShortDate(new Date(dateStr));
        } catch (e) {
            return dateStr;
        }
    };
    
    const formatFullDateTooltip = (dateStr, createdBy = '') => {
        if (!dateStr || dateStr === 'null' || dateStr === '') return '';
        try {
            const fullDate = formatFullDate(new Date(dateStr));
            return createdBy ? `Created on ${fullDate} by ${createdBy}` : `Changed on ${fullDate}`;
        } catch (e) {
            return dateStr;
        }
    };
    
    row.innerHTML = `
        <td>
            <input type="text" class="inline-edit" value="${escapeHtml(admin.name)}" 
                   onchange="updateAdminField(${index}, 'name', this.value)"
                   ${admin.status === 'inactive' ? 'disabled' : ''}>

            </div>
        </td>
        <td>
            <div class="permission-icon ${admin.receiveRequests ? 'active notifications' : 'inactive'}" 
                 onclick="toggleAdminPermission(${index}, 'receiveRequests')">
                <i class="fas ${admin.receiveRequests ? 'fa-bell' : 'fa-bell-slash'}"></i>
            </div>
        </td>
        <td>
            <div class="date-display">
                ${formatDate(admin.dateCreated)}
                ${admin.dateCreated && admin.dateCreated !== 'null' && admin.dateCreated !== '' ? 
                    `<div class="date-tooltip">
                        ${formatFullDateTooltip(admin.dateCreated, admin.createdBy)}
                    </div>` : ''}
            </div>
        </td>
        <td>${formatDate(admin.lastLogin)}</td>
        <td>
            <span class="status-badge ${admin.status}">
                <i class="fas ${admin.status === 'active' ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                ${admin.status}

/**

 */
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

        email: email,
        fullPermission: fullPermission,
        receiveRequests: receiveRequests,
        mode: mode,
        index: mode === 'edit' ? currentEditingAdminIndex : -1
    };
    
    const saveBtn = document.getElementById('saveAdminBtn');
    
    // Use standard loading
    setButtonLoading(saveBtn, true, mode === 'edit' ? 'Updating...' : 'Adding...');
    
    google.script.run
        .withSuccessHandler(function(result) {
            setButtonLoading(saveBtn, false, 
                mode === 'edit' ? '<i class="fas fa-save"></i> Update Administrator' : 
                '<i class="fas fa-user-plus"></i> Add Administrator');
            
            const parsedResult = parseBackendResponse(result);
            
            if (parsedResult.success) {
                closeAdminFormModal();
                loadAdminsTable();
                showToast(
                    mode === 'edit' ? 'Administrator updated successfully' : 
                    'Administrator added successfully. Welcome email sent.', 
                    'success'
                );
            } else {
                showToast(`Failed to ${mode} administrator: ${parsedResult.error}`, 'error');
            }
        })
        .withFailureHandler(function(error) {
            setButtonLoading(saveBtn, false, 
                mode === 'edit' ? '<i class="fas fa-save"></i> Update Administrator' : 
                '<i class="fas fa-user-plus"></i> Add Administrator');
            showToast(`Error ${mode}ing administrator: ${error.message}`, 'error');
        })
        .saveAdminData(adminData, actingAdminEmail);
}

/**

 */
function deactivateAdmin(index) {
    const admin = adminsData[index];
    
    // Prevent self-deactivation
    if (currentAdmin && admin.email === currentAdmin.email) {
        showToast('You cannot deactivate your own account', 'error');
        return;
    }
    
    showConfirmationDialog(
        '<i class="fas fa-user-times text-danger"></i> Deactivate Administrator',
        `Are you sure you want to <strong>deactivate</strong> the administrator account for:<br>
         <strong>${admin.name}</strong> (${admin.email})<br><br>
         This will prevent them from accessing the admin portal.`,
        'deactivate',
        () => executeAdminStatusChange(index, 'inactive')
    );

/**

 */
function activateAdmin(index) {
    const admin = adminsData[index];
    
    showConfirmationDialog(
        '<i class="fas fa-user-check text-success"></i> Activate Administrator',
        `Are you sure you want to <strong>activate</strong> the administrator account for:<br>
         <strong>${admin.name}</strong> (${admin.email})<br><br>
         They will receive a new password via email and regain access to the admin portal.`,
        'activate',

 */

/**
 * Format short date
 */
function formatShortDate(dateValue) {
    if (!dateValue) return 'N/A';
    
    const date = new Date(dateValue);
    if (isNaN(date.getTime())) return 'Invalid Date';
    
    return date.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
    });
}

/**
 * Format full date with time
 */
function formatFullDate(dateValue) {
    if (!dateValue) return 'N/A';
    
    const date = new Date(dateValue);
    if (isNaN(date.getTime())) return 'Invalid Date';
    
    return date.toLocaleString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });
}

/**
 * Validate email format
 */
function validateEmailFormat(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailRegex.test(email);
}

/**
 * Reset all employee balances - Updated for 19-column structure
 */
function resetEmployeeBalances() {
  try {
    const employeesSheet = getSheet('Employees');
    
    if (!employeesSheet) {
      return {
        success: false,
        error: 'Employees sheet not found'
      };
    }
    
    const lastRow = employeesSheet.getLastRow();
    if (lastRow <= 1) {
      return { success: true }; // No employees to reset
    }
    
    // Reset opening balance to default (this could be configurable)
    const defaultBalance = 21; // Default annual leave balance
    const defaultEmergencyLeaves = 3; // Default emergency leaves
    const defaultSickLeaves = 3; // Default sick leaves
    const currentDate = new Date();
    const nextYear = new Date(currentDate.getFullYear() + 1, currentDate.getMonth(), currentDate.getDate());
    
    // Update balance, usable from, usable to dates, and leave balances for all ACTIVE employees only
    for (let i = 2; i <= lastRow; i++) {
      // Check if employee is deactivated (column J - Deactivated on)
      const deactivatedDate = employeesSheet.getRange(i, 10).getValue();
      
      if (!deactivatedDate) { // Only reset for active employees
        employeesSheet.getRange(i, 4).setValue(defaultBalance); // D - Opening Balance
        employeesSheet.getRange(i, 5).setValue(currentDate); // E - Usable from
        employeesSheet.getRange(i, 6).setValue(nextYear); // F - Usable to
        employeesSheet.getRange(i, 13).setValue(defaultEmergencyLeaves); // M - Opening emergency leaves
        employeesSheet.getRange(i, 14).setValue(defaultSickLeaves); // N - Opening Sick Leaves
      }
    }
    
    return { success: true };
    
  } catch (error) {
    console.error('Error resetting employee balances:', error);
    return {
      success: false,
      error: error.toString()
    };
  }
}

/**
 * Get employee statistics for dashboard - New function for 19-column structure
 */
function getEmployeeStatistics() {
  try {
    const employeesSheet = getSheet('Employees');
    
    if (!employeesSheet) {
      return {
        success: false,
        error: 'Employees sheet not found'
      };
    }
    
    const data = employeesSheet.getDataRange().getValues();
    
    if (data.length <= 1) {
      return {
        success: true,
        stats: {
          total: 0,
          active: 0,
          deactivated: 0,
          recentlyAdded: 0,
          pendingEmails: 0
        }
      };
    }
    
    let total = 0;
    let active = 0;
    let deactivated = 0;
    let recentlyAdded = 0;
    let pendingEmails = 0;
    
    const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
    
    for (let i = 1; i < data.length; i++) {
      total++;
      
      // Check if deactivated (Column J)
      const deactivatedDate = data[i][9];
      if (deactivatedDate) {
        deactivated++;
      } else {
        active++;
      }
      
      // Check if recently added (Column H)
      const addedDate = data[i][7];
      if (addedDate && new Date(addedDate) > oneWeekAgo) {
        recentlyAdded++;
      }
      
      // Check email status (Column I)
      const emailStatus = data[i][8];
      if (emailStatus && emailStatus.toString().toLowerCase() === 'pending') {
        pendingEmails++;
      }
    }
    
    return {
      success: true,
      stats: {
        total: total,
        active: active,
        deactivated: deactivated,
        recentlyAdded: recentlyAdded,
        pendingEmails: pendingEmails
      }
    };
    
  } catch (error) {
    console.error('Error getting employee statistics:', error);
    return {
      success: false,
      error: 'Error retrieving employee statistics: ' + error.toString()
    };
  }
}

/**
 * Generate employee report - New function for 19-column structure
 */
function generateEmployeeReport() {
  try {
    const employeesSheet = getSheet('Employees');
    
    if (!employeesSheet) {
      return {
        success: false,
        error: 'Employees sheet not found'
      };
    }
    
    const data = employeesSheet.getDataRange().getValues();
    
    if (data.length <= 1) {
      return {
        success: true,
        report: 'No employees found'
      };
    }
    
    let report = 'EMPLOYEE REPORT\n';
    report += '================\n\n';
    
    // Count statistics
    let activeCount = 0;
    let deactivatedCount = 0;
    const weeklyHolidayCounts = {};
    const emergencyLeaveTotals = { total: 0, count: 0 };
    const sickLeaveTotals = { total: 0, count: 0 };
    const annualLeaveTotals = { total: 0, count: 0 };
    
    for (let i = 1; i < data.length; i++) {
      const deactivatedDate = data[i][9]; // J - Deactivated on
      const weeklyHoliday = data[i][14] || 'Not Set'; // O - Weekly Holiday
      const emergencyLeaves = data[i][12] || 0; // M - Emergency Leaves
      const sickLeaves = data[i][13] || 0; // N - Sick Leaves
      const annualLeaves = data[i][3] || 0; // D - Opening Balance
      
      if (deactivatedDate) {
        deactivatedCount++;
      } else {
        activeCount++;
        
        // Only count active employees for leave totals
        emergencyLeaveTotals.total += Number(emergencyLeaves);
        emergencyLeaveTotals.count++;
        
        sickLeaveTotals.total += Number(sickLeaves);
        sickLeaveTotals.count++;
        
        annualLeaveTotals.total += Number(annualLeaves);
        annualLeaveTotals.count++;
      }
      
      weeklyHolidayCounts[weeklyHoliday] = (weeklyHolidayCounts[weeklyHoliday] || 0) + 1;
    }
    
    report += `Total Employees: ${data.length - 1}\n`;
    report += `Active: ${activeCount}\n`;
    report += `Deactivated: ${deactivatedCount}\n\n`;
    
    report += 'LEAVE BALANCE STATISTICS (Active Employees Only):\n';
    report += `Average Annual Leave: ${activeCount > 0 ? (annualLeaveTotals.total / annualLeaveTotals.count).toFixed(1) : 0} days\n`;
    report += `Average Emergency Leave: ${activeCount > 0 ? (emergencyLeaveTotals.total / emergencyLeaveTotals.count).toFixed(1) : 0} days\n`;
    report += `Average Sick Leave: ${activeCount > 0 ? (sickLeaveTotals.total / sickLeaveTotals.count).toFixed(1) : 0} days\n\n`;
    
    report += 'WEEKLY HOLIDAY DISTRIBUTION:\n';
    for (const [day, count] of Object.entries(weeklyHolidayCounts)) {
      report += `${day}: ${count} employees\n`;
    }
    
    report += '\n\nGenerated on: ' + new Date().toLocaleString();
    
    return {
      success: true,
      report: report
    };
    
  } catch (error) {
    console.error('Error generating employee report:', error);
    return {
      success: false,
      error: 'Error generating report: ' + error.toString()
    };
  }
}

/**
 * Bulk update employee leave balances - New function for 19-column structure
 */
function bulkUpdateLeaveBalances(leaveType, newBalance) {
  try {
    const employeesSheet = getSheet('Employees');
    
    if (!employeesSheet) {
      return {
        success: false,
        error: 'Employees sheet not found'
      };
    }
    
    const validLeaveTypes = ['annual', 'emergency', 'sick'];
    if (!validLeaveTypes.includes(leaveType.toLowerCase())) {
      return {
        success: false,
        error: 'Invalid leave type. Must be: annual, emergency, or sick'
      };
    }
    
    if (newBalance < 0 || newBalance > 50) {
      return {
        success: false,
        error: 'Leave balance must be between 0 and 50 days'
      };
    }
    
    const lastRow = employeesSheet.getLastRow();
    if (lastRow <= 1) {
      return { success: true }; // No employees to update
    }
    
    let columnIndex;
    let leaveTypeName;
    
    switch (leaveType.toLowerCase()) {
      case 'annual':
        columnIndex = 4; // D - Opening Balance
        leaveTypeName = 'Annual Leave';
        break;
      case 'emergency':
        columnIndex = 13; // M - Opening emergency leaves
        leaveTypeName = 'Emergency Leave';
        break;
      case 'sick':
        columnIndex = 14; // N - Opening Sick Leaves
        leaveTypeName = 'Sick Leave';
        break;
    }
    
    // Update leave balance for all ACTIVE employees only
    let updatedCount = 0;
    for (let i = 2; i <= lastRow; i++) {
      // Check if employee is deactivated (column J - Deactivated on)
      const deactivatedDate = employeesSheet.getRange(i, 10).getValue();
      
      if (!deactivatedDate) { // Only update for active employees
        employeesSheet.getRange(i, columnIndex).setValue(newBalance);
        updatedCount++;
      }
    }
    
    // Log action
    logAdminAction('Bulk Leave Balance Update', `${leaveTypeName}: ${newBalance} days for ${updatedCount} employees`);
    
    return {
      success: true,
      message: `${leaveTypeName} balance updated to ${newBalance} days for ${updatedCount} active employees`
    };
    
  } catch (error) {
    console.error('Error bulk updating leave balances:', error);
    return {
      success: false,
      error: 'Error updating leave balances: ' + error.toString()
    };
  }
}

/**
 * Calculate employee status based on latest timestamp - PHASE 1 CORE LOGIC
 */
function calculateEmployeeStatus(employee) {
    // Get timestamps
    const addedOn = employee['Added on'] ? new Date(employee['Added on']) : null;
    const deactivatedOn = employee['Deactivated on'] ? new Date(employee['Deactivated on']) : null;
    const reactivatedOn = employee['Reactivated on'] ? new Date(employee['Reactivated on']) : null;
    
    // If never deactivated, always active
    if (!deactivatedOn) {
        return 'Active';
    }
    
    // If no reactivation, check if deactivated
    if (!reactivatedOn) {
        return 'Inactive';
    }
    
    // Compare deactivation vs reactivation timestamps
    // Latest action determines status
    if (reactivatedOn > deactivatedOn) {
        return 'Active';
    } else {
        return 'Inactive';
    }
}

function formatWeeklyHolidayString(weeklyHolidayStr) {
    if (!weeklyHolidayStr || weeklyHolidayStr === '') {
        return '<span style="color: #999;">Not Set</span>';
    }
    
    // Handle comma-separated multiple days
    const days = weeklyHolidayStr.split(',').map(day => day.trim()).filter(day => day !== '');
    
    if (days.length === 0) {
        return '<span style="color: #999;">Not Set</span>';
    }
    
    // Map to short names for display
    const dayShortNames = {
        'Sunday': 'Sun', 'Monday': 'Mon', 'Tuesday': 'Tue', 
        'Wednesday': 'Wed', 'Thursday': 'Thu', 'Friday': 'Fri', 'Saturday': 'Sat'
    };
    
    const displayDays = days.map(day => dayShortNames[day] || day).join(', ');
    
    return `<span class="weekly-holiday-badge">${displayDays}</span>`;
}

function formatDateString(dateString) {
    if (!dateString || dateString === '') return 'Never';
    
    try {
        return new Date(dateString).toLocaleString();
    } catch (error) {
        return dateString;
    }
}

/**
 * Validate email uniqueness
 */
function validateEmailUniqueness() {
    const emailInput = document.getElementById('employeeEmail');
    const email = emailInput.value.trim();
    const msgElement = document.getElementById('emailValidationMsg');
    
    // Clear previous timeout
    if (emailValidationTimeout) {
        clearTimeout(emailValidationTimeout);
    }
    
    if (!email) {
        msgElement.textContent = '';
        isEmailUnique = false;
        return;
    }
    
    // Basic email format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        msgElement.textContent = 'Please enter a valid email address';
        msgElement.className = 'validation-message error';
        isEmailUnique = false;
        return;
    }
    
    // Show checking message
    msgElement.textContent = 'Checking email availability...';
    msgElement.className = 'validation-message';
    
    // Debounced validation
    emailValidationTimeout = setTimeout(() => {
        google.script.run
            .withSuccessHandler(function(result) {
                if (result.isUnique) {
                    msgElement.textContent = '✓ Email is available';
                    msgElement.className = 'validation-message success';
                    isEmailUnique = true;
                } else {
                    msgElement.textContent = '✗ Email already exists in system';
                    msgElement.className = 'validation-message error';
                    isEmailUnique = false;
                }
            })
            .withFailureHandler(function(error) {
                msgElement.textContent = 'Error checking email: ' + error.message;
                msgElement.className = 'validation-message error';
                isEmailUnique = false;
            })
            .checkEmailUniqueness(email);
    }, 500);
}

function validateEmployeeForm() {

    const usableTo = document.getElementById('usableTo').value;
    const annualDays = document.getElementById('annualDays').value;
    const emergencyDays = document.getElementById('emergencyDays').value;
    const sickDays = document.getElementById('sickDays').value;

    if (!name) {
        showToast('Please enter employee name', 'error');
        document.getElementById('employeeName').focus();
        return false;
    }
    
    if (!email) {
        showToast('Please enter employee email', 'error');
        document.getElementById('employeeEmail').focus();
        return false;
    }
    
    // Validate email format
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        showToast('Please enter a valid email address', 'error');
        document.getElementById('employeeEmail').focus();
        return false;
    }
    
    // Validate email uniqueness
    if (!isEmailUnique) {
        showToast('This email address is already in use', 'error');
        document.getElementById('employeeEmail').focus();
        return false;
    }
    
    // Validate weekly holidays selection
    if (selectedHolidays.length === 0) {
        showToast('Please select at least one weekly holiday', 'error');
        document.getElementById('holidayValidationMsg').textContent = 'Please select at least one day';
        return false;
    }
    
    // Validate dates
    if (!usableFrom) {
        showToast('Please select usable from date', 'error');
        document.getElementById('usableFrom').focus();
        return false;
    }
    
    if (!usableTo) {
        showToast('Please select usable to date', 'error');
        document.getElementById('usableTo').focus();
        return false;
    }
    
    // Validate date range
    const fromDate = new Date(usableFrom);
    const toDate = new Date(usableTo);
    
    if (toDate <= fromDate) {
        showToast('Usable to date must be after usable from date', 'error');
        document.getElementById('usableTo').focus();
        return false;
    }
    
    // Validate numeric fields
    if (!annualDays || parseInt(annualDays) < 0) {
        showToast('Please enter valid annual leave days', 'error');
        document.getElementById('annualDays').focus();
        return false;
    }
    
    if (!emergencyDays || parseInt(emergencyDays) < 0) {
        showToast('Please enter valid emergency leave days', 'error');
        document.getElementById('emergencyDays').focus();
        return false;
    }
    
    if (!sickDays || parseInt(sickDays) < 0) {
        showToast('Please enter valid sick leave days', 'error');
        document.getElementById('sickDays').focus();
        return false;
    }
    
    return true;

/**
 * Validate email uniqueness for edit (exclude current employee)
 */
function validateEditEmailUniqueness() {
    const emailInput = document.getElementById('editEmployeeEmail');
    const originalEmail = emailInput.defaultValue; // Original email
    const newEmail = emailInput.value.trim();
    const msgElement = document.getElementById('editEmailValidationMsg');
    
    // If email hasn't changed, it's valid
    if (newEmail === originalEmail) {
        msgElement.textContent = '';
        isEditEmailUnique = true;
        return;
    }
    
    // Clear previous timeout
    if (emailValidationTimeout) {
        clearTimeout(emailValidationTimeout);
    }
    
    if (!newEmail) {
        msgElement.textContent = '';
        isEditEmailUnique = false;
        return;
    }
    
    // Basic email format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(newEmail)) {
        msgElement.textContent = 'Please enter a valid email address';
        msgElement.className = 'validation-message error';
        isEditEmailUnique = false;
        return;
    }
    
    // Show checking message
    msgElement.textContent = 'Checking email availability...';
    msgElement.className = 'validation-message';
    
    // Debounced validation
    emailValidationTimeout = setTimeout(() => {
        google.script.run
            .withSuccessHandler(function(result) {
                if (result.isUnique) {
                    msgElement.textContent = '✓ Email is available';
                    msgElement.className = 'validation-message success';
                    isEditEmailUnique = true;
                } else {
                    msgElement.textContent = '✗ Email already exists in system';
                    msgElement.className = 'validation-message error';
                    isEditEmailUnique = false;
                }
            })
            .withFailureHandler(function(error) {
                msgElement.textContent = 'Error checking email: ' + error.message;
                msgElement.className = 'validation-message error';
                isEditEmailUnique = false;
            })
            .checkEmailUniqueness(newEmail);
    }, 500);
}

function executeCustomConfirmation() {

function toggleEmployeeStatus(employeeId, currentAdminString) {
  try {
    if (!currentAdminString) {
      return {
        success: false,
        error: 'Admin context missing - please refresh and try again'
      };
    }
    
    const employeesSheet = getSheet('Employees');
    if (!employeesSheet) {
      return {
        success: false,
        error: 'Employees sheet not found'
      };
    }
    
    console.log('Employee status change requested by admin:', currentAdminString);
    
    // Find employee row
    const lastRow = employeesSheet.getLastRow();
    const data = employeesSheet.getRange(2, 1, lastRow - 1, 19).getValues();
    
    for (let i = 0; i < data.length; i++) {
      if (data[i][0] == employeeId) {
        const rowNum = i + 2;
        const row = data[i];
        
        // Determine current status based on latest timestamps
        const deactivatedOn = row[9];  // J - Deactivated on
        const reactivatedOn = row[17]; // R - Reactivated on
        
        let currentStatus = 'Active';
        if (deactivatedOn && (!reactivatedOn || new Date(deactivatedOn) > new Date(reactivatedOn))) {
          currentStatus = 'Inactive';
        }
        
        const currentDateTime = new Date();
        
        if (currentStatus === 'Active') {
          // Deactivate employee
          employeesSheet.getRange(rowNum, 10).setValue(currentDateTime);     // J - Deactivated on
          employeesSheet.getRange(rowNum, 17).setValue(currentAdminString);  // Q - Deactivated By
          employeesSheet.getRange(rowNum, 12).setValue('Inactive');          // L - Active/Inactive
          
          // Log action
          logAdminActionWithString(currentAdminString, 'Employee Deactivated', `ID: ${employeeId}, Name: ${row[1]}`);
          
          return {
            success: true,
            message: 'Employee deactivated successfully',
            newStatus: 'Inactive'
          };
        } else {
          // Reactivate employee
          employeesSheet.getRange(rowNum, 18).setValue(currentDateTime);     // R - Reactivated on
          employeesSheet.getRange(rowNum, 19).setValue(currentAdminString);  // S - Reactivated BY
          employeesSheet.getRange(rowNum, 12).setValue('Active');            // L - Active/Inactive
          
          // Log action
          logAdminActionWithString(currentAdminString, 'Employee Reactivated', `ID: ${employeeId}, Name: ${row[1]}`);
          
          return {
            success: true,
            message: 'Employee reactivated successfully',
            newStatus: 'Active'
          };
        }
      }
    }
    
    return {
      success: false,
      error: 'Employee not found'
    };
    
  } catch (error) {
    console.error('Error toggling employee status:', error);
    return {
      success: false,
      error: 'Error updating employee status: ' + error.toString()
    };
  }
}

/**

function buildHolidaysTable(holidays, isReadOnly) {
    if (!holidays || !Array.isArray(holidays)) {
        console.error('❌ Invalid holidays data for table building:', holidays);
        return '<p class="error-message">Invalid holiday data</p>';
    }
    
    console.log(`🔨 Building table for ${holidays.length} holidays (readonly: ${isReadOnly})`);
    
    let tableHtml = `
        <table class="holidays-assignment-table">
            <thead>
                <tr>
                    <th><i class="fas fa-tag"></i> Holiday Name</th>
                    <th><i class="fas fa-calendar"></i> Start Date</th>
                    <th><i class="fas fa-calendar-check"></i> End Date</th>
                    <th><i class="fas fa-clock"></i> Duration</th>
                    <th><i class="fas fa-users"></i> Assignments</th>
                    <th><i class="fas fa-envelope"></i> Status</th>
                    <th><i class="fas fa-cogs"></i> Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    try {
        holidays.forEach((holiday, index) => {
            // Safely parse dates
            let startDate, endDate, duration = 1, durationText = '1 day';
            
            try {
                startDate = new Date(holiday.startDate);
                endDate = new Date(holiday.endDate);
                
                if (!isNaN(startDate.getTime()) && !isNaN(endDate.getTime())) {
                    duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                    durationText = duration === 1 ? '1 day' : `${duration} days`;
                }
            } catch (dateError) {
                console.warn('⚠️ Date parsing error for holiday:', holiday.name, dateError);
            }
            
            // Parse assignments safely
            const assignmentCount = holiday.assignments ? 
                holiday.assignments.split('|').filter(a => a.trim()).length : 0;
            
            const assignmentText = holiday.hasAssignments && assignmentCount > 0 ? 
                `${assignmentCount} employee${assignmentCount !== 1 ? 's' : ''} assigned` :
                'No assignments';
            
            // Email status display
            let emailStatusHtml = '';
            if (holiday.hasAssignments && holiday.emailStatus) {
                try {
                    const statuses = holiday.emailStatus.split('|').filter(s => s.trim());
                    const sentCount = statuses.filter(s => s.trim() === 'sent').length;
                    const pendingCount = statuses.filter(s => s.trim() === 'pending').length;
                    const failedCount = statuses.filter(s => s.trim() === 'failed').length;
                    
                    emailStatusHtml = `
                        <div class="email-status-summary">
                            ${sentCount > 0 ? `<span class="status-badge success">${sentCount} sent</span>` : ''}
                            ${pendingCount > 0 ? `<span class="status-badge warning">${pendingCount} pending</span>` : ''}
                            ${failedCount > 0 ? `<span class="status-badge danger">${failedCount} failed</span>` : ''}
                        </div>
                    `;
                } catch (statusError) {
                    console.warn('⚠️ Email status parsing error:', statusError);
                    emailStatusHtml = '<span class="text-muted">Status unavailable</span>';
                }
            } else {
                emailStatusHtml = '<span class="text-muted">No notifications</span>';
            }
            
            // Action buttons
            let actionsHtml = '';
            if (isReadOnly) {
                actionsHtml = `
                    <div class="action-buttons">
                        <button class="btn-action btn-view" onclick="viewHolidayAssignments(${holiday.index})" title="View Assignments">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </div>
                `;
            } else {
                const notifyBtnClass = holiday.hasPendingNotifications ? 'btn-warning' : 'btn-secondary';
                const notifyBtnDisabled = !holiday.hasPendingNotifications;
                
                actionsHtml = `
                    <div class="action-buttons">
                        <button class="btn-action btn-primary" onclick="openAssignmentModal(${holiday.index})" title="Manage Assignments">
                            <i class="fas fa-users-cog"></i> Assign
                        </button>
                        <button class="btn-action ${notifyBtnClass}" 
                                onclick="sendPendingNotifications(${holiday.index})" 
                                ${notifyBtnDisabled ? 'disabled' : ''}
                                title="${holiday.hasPendingNotifications ? 'Send pending notifications' : 'No pending notifications'}">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                `;
            }
            
            tableHtml += `
                <tr class="holiday-row ${isReadOnly ? 'readonly' : ''}">
                    <td>
                        <div class="holiday-name">
                            <strong>${holiday.name || 'Unnamed Holiday'}</strong>
                        </div>
                    </td>
                    <td>${formatDateForDisplay(holiday.startDate) || 'Invalid Date'}</td>
                    <td>${formatDateForDisplay(holiday.endDate) || 'Invalid Date'}</td>
                    <td>${durationText}</td>
                    <td>

                    </td>
                    <td>${emailStatusHtml}</td>

    return tableHtml;
}

/**
 * NEW: Parse employees string format
 */
function parseEmployeesString(employeesResult) {
    if (employeesResult === 'SUCCESS:EMPTY') {
        return [];
    }
    
    const employeesString = employeesResult.replace('SUCCESS:', '');
    const employeeArray = employeesString.split(';');
    
    const employees = [];
    employeeArray.forEach(empStr => {
        const parts = empStr.split('|'); // name|email|id|weeklyHoliday
        if (parts.length >= 4) {
            employees.push({
                id: parts[2],
                name: parts[0],
                email: parts[1],
                weeklyHoliday: parts[3]
            });
        }
    });
    
    return employees;
}
